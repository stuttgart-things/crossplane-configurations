---
name: Verify Crossplane Configurations
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.find.outputs.configs }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - id: diff
        name: Compute changed files vs base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi
          # New branch / initial push: diff against the empty tree
          if [ "$base" = "0000000000000000000000000000000000000000" ] || [ -z "$base" ]; then
            base=$(git hash-object -t tree /dev/null)
          fi
          git diff --name-only "$base" "$head" > changed.txt
          echo "Changed files:"
          cat changed.txt || true

      - id: find
        name: Intersect changed paths with Configuration directories
        run: |
          # All Configuration directories: any crossplane.yaml that is NOT in an examples/ subtree
          # (examples/configuration.yaml is the runtime install manifest, not a Configuration package).
          all=$(find . -type f -name crossplane.yaml \
                  -not -path './.git/*' \
                  -not -path '*/examples/*' \
                -printf '%h\n' \
                | sed 's|^\./||' \
                | sort -u)
          configs_json=$(
            while IFS= read -r c; do
              [ -z "$c" ] && continue
              if grep -q "^${c}/" changed.txt; then
                echo "$c"
              fi
            done <<< "$all" \
            | sort -u \
            | jq -R -s -c 'split("\n") | map(select(length>0))'
          )
          echo "configs=${configs_json}" >> "$GITHUB_OUTPUT"
          echo "Configurations to verify:"
          echo "${configs_json}" | jq -r '.[]'

  verify:
    needs: discover
    if: needs.discover.outputs.configs != '[]'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.discover.outputs.configs) }}
    uses: stuttgart-things/github-workflow-templates/.github/workflows/call-crossplane-verify.yaml@main
    with:
      src: ${{ matrix.config }}
    secrets: inherit
