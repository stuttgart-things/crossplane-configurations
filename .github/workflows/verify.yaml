---
name: Verify Crossplane Configurations
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.find.outputs.configs }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - id: diff
        name: Compute changed files vs base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi
          # New branch / initial push: diff against the empty tree
          if [ "$base" = "0000000000000000000000000000000000000000" ] || [ -z "$base" ]; then
            base=$(git hash-object -t tree /dev/null)
          fi
          git diff --name-only "$base" "$head" > changed.txt
          echo "Changed files:"
          cat changed.txt || true

      - id: find
        name: Intersect changed paths with Configuration directories
        run: |
          # All Configuration directories: any crossplane.yaml that is NOT in an examples/ subtree
          # (examples/configuration.yaml is the runtime install manifest, not a Configuration package).
          all=$(find . -type f -name crossplane.yaml \
                  -not -path './.git/*' \
                  -not -path '*/examples/*' \
                -printf '%h\n' \
                | sed 's|^\./||' \
                | sort -u)
          configs_json=$(
            while IFS= read -r c; do
              [ -z "$c" ] && continue
              if grep -q "^${c}/" changed.txt; then
                echo "$c"
              fi
            done <<< "$all" \
            | sort -u \
            | jq -R -s -c 'split("\n") | map(select(length>0))'
          )
          echo "configs=${configs_json}" >> "$GITHUB_OUTPUT"
          echo "Configurations to verify:"
          echo "${configs_json}" | jq -r '.[]'

  pre-commit:
    uses: stuttgart-things/github-workflow-templates/.github/workflows/call-pre-commit.yaml@main
    secrets: inherit

  verify:
    needs: discover
    if: needs.discover.outputs.configs != '[]'
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.discover.outputs.configs) }}
    uses: stuttgart-things/github-workflow-templates/.github/workflows/call-crossplane-verify.yaml@main
    with:
      src: ${{ matrix.config }}
    secrets: inherit

  # Phase 1 of the CI/CD roadmap (docs/ci-cd-roadmap.md): per-changed-Configuration
  # preview packages. Build each changed config and push it to the public,
  # ephemeral ttl.sh registry, then surface a copy-paste install manifest as a
  # sticky PR comment. ttl.sh is anonymous → no secrets, safe for fork PRs.
  preview:
    needs: discover
    if: github.event_name == 'pull_request' && needs.discover.outputs.configs != '[]'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.discover.outputs.configs) }}
    runs-on: ubuntu-latest
    env:
      # 24h is ttl.sh's maximum TTL — long enough to outlive a review cycle.
      TTL: "24h"
      # v0.118.0: the crossplane module's push-preview function builds a
      # Configuration, pushes it anonymously to ttl.sh, and returns the
      # install manifest — replacing the task/gum/curl bootstrap below.
      # v0.118.0 pins crank to v2.2.2 + tolerates the release bucket's
      # mismatched crank.sha256 (stuttgart-things/dagger#295).
      # v0.118.1 runs render Functions as Dagger services instead of nested
      # Docker containers, fixing the function-kcl render-sandbox failure
      # (DeadlineExceeded / connection refused) — stuttgart-things/dagger#300.
      CROSSPLANE_MODULE_VERSION: v0.118.1
    steps:
      - uses: actions/checkout@v6.0.2

      - id: meta
        name: Compute preview prefix
        run: |
          set -euo pipefail
          pr='${{ github.event.pull_request.number }}'
          sha='${{ github.event.pull_request.head.sha }}'
          config='${{ matrix.config }}'
          # Encode PR# + short SHA in the ttl.sh path so each commit publishes a
          # fresh, traceable preview that never collides with another PR's.
          echo "prefix=stuttgart-things/crossplane-configurations-pr${pr}-${sha:0:7}" >> "$GITHUB_OUTPUT"
          # Flatten the config path for a unique, filesystem-safe artifact name.
          echo "safe=$(printf '%s' "$config" | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Build & push ttl.sh preview
        id: push
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # v8.4.1
        with:
          version: "0.20.8"
          verb: call
          module: github.com/stuttgart-things/dagger/crossplane@${{ env.CROSSPLANE_MODULE_VERSION }}
          # push-preview reads the package name from crossplane.yaml and pushes
          # anonymously (ttl.sh needs no creds). Its stdout is the install
          # manifest, exposed as steps.push.outputs.output.
          args: >-
            push-preview
            --src ${{ matrix.config }}
            --prefix ${{ steps.meta.outputs.prefix }}
            --ttl ${{ env.TTL }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - name: Compose preview snippet
        env:
          MANIFEST: ${{ steps.push.outputs.output }}
          CONFIG: ${{ matrix.config }}
          SAFE: ${{ steps.meta.outputs.safe }}
        run: |
          set -euo pipefail
          # spec.package holds the pushed ttl.sh ref; surface it in the summary.
          dest=$(printf '%s\n' "$MANIFEST" | awk '/^  package:/{print $2}')
          {
            echo "<details>"
            echo "<summary>📦 <code>${CONFIG}</code> → <code>${dest}</code></summary>"
            echo
            echo '```yaml'
            printf '%s\n' "$MANIFEST"
            echo '```'
            echo
            echo "</details>"
          } > "preview-${SAFE}.md"

      - uses: actions/upload-artifact@v4
        with:
          name: preview-${{ steps.meta.outputs.safe }}
          path: preview-*.md
          if-no-files-found: error

  # Aggregate every changed config's snippet into one sticky PR comment. Split
  # from `preview` so the matrix stays secret-free (fork-safe) and the single
  # write-scoped step runs once instead of racing across matrix legs.
  preview-comment:
    needs: [discover, preview]
    if: ${{ always() && github.event_name == 'pull_request' && needs.discover.outputs.configs != '[]' }}
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: previews
          pattern: preview-*
          merge-multiple: true

      - name: Compose comment body
        run: |
          set -euo pipefail
          marker='<!-- crossplane-ttl-preview -->'
          {
            echo "$marker"
            echo "## 📦 ttl.sh preview packages"
            echo
            echo "Preview OCI packages for the Configurations changed in this PR, pushed to the public, ephemeral [ttl.sh](https://ttl.sh) registry. No auth required — install on any Crossplane v2 cluster:"
            echo
            if ls previews/preview-*.md >/dev/null 2>&1; then
              cat previews/preview-*.md
            else
              echo "_No preview packages were produced (the push step failed for every changed config — see the \`preview\` job logs)._"
            fi
            echo
            echo "> [!NOTE]"
            echo "> Images expire **24h** after the last push (ttl.sh's maximum TTL); push a new commit to refresh them. The Configuration name is suffixed \`-preview\` so it won't clash with a canonical install."
          } > body.md
          cat body.md

      - name: Post or update sticky comment
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          marker='<!-- crossplane-ttl-preview -->'
          id=$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
            --jq "map(select(.body | contains(\"$marker\"))) | .[0].id // empty")
          if [ -n "$id" ]; then
            gh api -X PATCH "repos/$REPO/issues/comments/$id" -F body=@body.md >/dev/null
            echo "Updated sticky comment $id"
          else
            gh api -X POST "repos/$REPO/issues/$PR/comments" -F body=@body.md >/dev/null
            echo "Created sticky comment"
          fi
