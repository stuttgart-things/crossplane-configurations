---
apiVersion: meta.pkg.crossplane.io/v1
kind: Configuration
metadata:
  name: cloud-config
  annotations:
    # Local convention used by `task push` to bump and re-publish.
    # Not a Crossplane-standard field — the true package version is the OCI tag.
    meta.crossplane.io/version: v0.5.3
    meta.crossplane.io/maintainer: patrick.hermann@sva.de
    meta.crossplane.io/source: github.com/stuttgart-things/crossplane-configurations
    meta.crossplane.io/license: Apache-2.0
    meta.crossplane.io/description: |
      Renders cloud-init userdata as a Kubernetes Secret from a namespaced
      CloudInit XR, and manages the target namespace.
    meta.crossplane.io/readme: |
      # cloud-config

      A Crossplane Configuration that transforms a `CloudInit` namespaced XR
      (group `resources.stuttgart-things.com`) into a Kubernetes Secret
      containing cloud-init userdata (and optional networkdata) for VM
      provisioning.

      The Composition manages two resources via `provider-kubernetes`:

      1. The target namespace (`spec.namespace`, default `vms`), with
         `managementPolicies: [Observe, Create]` — a pre-existing namespace is
         adopted unchanged and is never modified or deleted by Crossplane.
      2. A Kubernetes Secret in that namespace containing the rendered
         cloud-init `userdata` and (if set) `networkdata`.

      ## Preconditions

      A `ClusterProviderConfig` for `provider-kubernetes` whose name matches
      `spec.providerConfigRef` on the XR must exist on the target cluster
      (examples reference `in-cluster`).

      ## Spec fields

      Required: `providerConfigRef`, `vmName`, `hostname`.
      Optional: `namespace` (default `vms`), `domain` (default `local`),
      `timezone`, `users[]`, `packages[]`, `writeFiles[]`, `runcmd[]`,
      `bootcmd[]`, `packageUpdate` (default true), `packageUpgrade` (default
      false), `sshPasswordAuth` (default false), `disableRoot` (default true),
      `networkConfig`.
spec:
  crossplane:
    version: ">=v2.1.3"
  dependsOn:
    - provider: xpkg.crossplane.io/crossplane-contrib/provider-kubernetes
      version: ">=v1.2.0,<v2.0.0"
    # Functions used by this Configuration's Composition pipeline.
    - function: xpkg.crossplane.io/crossplane-contrib/function-go-templating
      version: ">=v0.12.1,<v0.13.0"
    - function: xpkg.crossplane.io/crossplane-contrib/function-auto-ready
      version: ">=v0.6.5,<v0.7.0"
