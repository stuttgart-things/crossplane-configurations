---
apiVersion: meta.pkg.crossplane.io/v1
kind: Configuration
metadata:
  name: volume-claim
  annotations:
    # Local convention used by `task push` to bump and re-publish.
    # Not a Crossplane-standard field — the true package version is the OCI tag.
    meta.crossplane.io/version: v0.1.0
    meta.crossplane.io/maintainer: patrick.hermann@sva.de
    meta.crossplane.io/source: github.com/stuttgart-things/crossplane-configurations
    meta.crossplane.io/license: Apache-2.0
    meta.crossplane.io/description: |
      Provisions a Kubernetes PersistentVolumeClaim from a namespaced
      VolumeClaim XR, with optional labels/annotations, label selector
      for pre-provisioned PVs and dataSource for snapshot restore /
      PVC cloning.
    meta.crossplane.io/readme: |
      # volume-claim

      A Crossplane Configuration that turns a `VolumeClaim` namespaced
      XR (group `resources.stuttgart-things.com`) into a Kubernetes
      `PersistentVolumeClaim` on a target cluster.

      The Composition emits, via `provider-kubernetes` (a namespaced
      `kubernetes.m.crossplane.io/v1alpha1` Object):

      - A `PersistentVolumeClaim` named `spec.pvcName` in
        `spec.namespace` (default `default`), with the requested
        `spec.storage`, `spec.accessModes`, `spec.volumeMode` and
        optional `spec.labels` / `spec.annotations`.
      - When `spec.storageClassName` is unset the field is omitted
        from the PVC and Kubernetes falls back to the cluster's
        default StorageClass.
      - Optional `spec.selector` (matchLabels / matchExpressions) for
        binding to pre-provisioned PVs.
      - Optional `spec.dataSource` for snapshot restore or PVC cloning.

      ## Preconditions

      A `ClusterProviderConfig` for `provider-kubernetes` whose name
      matches `spec.providerConfigRef` on the XR must exist on the
      target cluster (examples reference `in-cluster`).

      ## Spec fields

      Required: `providerConfigRef`, `pvcName`.
      Optional: `namespace` (default `default`), `storageClassName`
      (default: cluster default SC), `storage` (default `10Gi`),
      `accessModes` (default `[ReadWriteOnce]`), `volumeMode`
      (default `Filesystem`), `labels`, `annotations`, `selector`,
      `dataSource`.
spec:
  crossplane:
    version: ">=v2.1.3"
  dependsOn:
    - provider: xpkg.crossplane.io/crossplane-contrib/provider-kubernetes
      version: ">=v1.2.0,<v2.0.0"
    # Functions used by this Configuration's Composition pipeline.
    - function: xpkg.crossplane.io/crossplane-contrib/function-go-templating
      version: ">=v0.12.1,<v0.13.0"
    - function: xpkg.crossplane.io/crossplane-contrib/function-auto-ready
      version: ">=v0.6.5,<v0.7.0"
