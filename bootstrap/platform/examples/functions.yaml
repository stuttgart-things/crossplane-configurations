---
# Short-form Function names on purpose — a long-named CR pointing at the same
# package duplicates a node in Crossplane's package lock graph and freezes the
# dependency resolver cluster-wide. See CLAUDE.md.
apiVersion: pkg.crossplane.io/v1beta1
kind: Function
metadata:
  name: function-kcl
spec:
  package: xpkg.crossplane.io/crossplane-contrib/function-kcl:v0.12.0
---
apiVersion: pkg.crossplane.io/v1beta1
kind: Function
metadata:
  name: function-auto-ready
spec:
  package: xpkg.crossplane.io/crossplane-contrib/function-auto-ready:v0.6.5
---
# Not used by this Composition's pipeline — required by the composed flux-init
# Composition, which loads the flux-defaults EnvironmentConfig.
apiVersion: pkg.crossplane.io/v1beta1
kind: Function
metadata:
  name: function-environment-configs
spec:
  package: xpkg.crossplane.io/crossplane-contrib/function-environment-configs:v0.7.0
