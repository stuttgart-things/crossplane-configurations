---
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: platforms.config.stuttgart-things.com
spec:
  group: config.stuttgart-things.com
  defaultCompositeDeletePolicy: Foreground
  scope: Namespaced
  names:
    kind: Platform
    plural: platforms
    singular: platform
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              x-kubernetes-validations:
                - rule: "has(self.clusterName) || (has(self.helmProviderConfigRef) && has(self.kubernetesProviderConfigRef))"
                  message: either clusterName, or both helmProviderConfigRef and kubernetesProviderConfigRef, must be set
              properties:
                # --- Shared cluster identity: set once here, passed to every component ---
                clusterName:
                  type: string
                  description: >-
                    Target cluster's RemoteCluster name. When set, the provider
                    config refs default to {clusterName}-helm and
                    {clusterName}-kubernetes. This is the primary shared input —
                    every component of the platform targets this cluster.
                helmProviderConfigRef:
                  type: string
                  description: >-
                    Helm ClusterProviderConfig for the target cluster. Optional
                    when clusterName is set (defaults to {clusterName}-helm).
                kubernetesProviderConfigRef:
                  type: string
                  description: >-
                    Kubernetes ClusterProviderConfig for the target cluster.
                    Optional when clusterName is set (defaults to {clusterName}-kubernetes).
                observeProviderConfigRef:
                  type: string
                  default: in-cluster
                  description: >-
                    Kubernetes ClusterProviderConfig (InjectedIdentity) used to
                    observe resources on the management cluster.
                namespace:
                  type: string
                  default: flux-system
                  description: >-
                    Target namespace on the cluster for platform components.
                    Distinct from metadata.namespace (where the XR itself lives).
                # --- Components: one block per wrapped Configuration ---
                fluxInit:
                  type: object
                  description: >-
                    Flux bootstrap, delegated to the flux-init Configuration
                    (composes a FluxInit XR). Fields mirror FluxInit.spec; the
                    shared cluster identity above is injected automatically.
                  properties:
                    enabled:
                      type: boolean
                      default: true
                      description: Compose a FluxInit XR for this platform
                    operatorChart:
                      type: object
                      properties:
                        version:
                          type: string
                        repoURL:
                          type: string
                    instance:
                      type: object
                      properties:
                        distribution:
                          type: string
                        components:
                          type: array
                          items:
                            type: string
                        sources:
                          type: array
                          description: Optional list of OCI/Git sources - if omitted, Flux controllers are installed without sources
                          items:
                            type: object
                            required:
                              - name
                              - url
                            properties:
                              name:
                                type: string
                              kind:
                                type: string
                                enum:
                                  - GitRepository
                                  - OCIRepository
                                default: OCIRepository
                              url:
                                type: string
                              ref:
                                type: string
                                default: latest
                              path:
                                type: string
                                default: "."
                              pullSecret:
                                type: string
                    kustomize:
                      type: object
                      description: Passed through verbatim to FluxInit.spec.kustomize.
                      x-kubernetes-preserve-unknown-fields: true
                    sops:
                      type: object
                      description: Passed through verbatim to FluxInit.spec.sops.
                      x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                shared:
                  type: object
                  description: >-
                    The resolved shared contract of this platform. Written once,
                    read by every component (and by humans / downstream XRs):
                    the refs each component was handed, plus facts discovered
                    from the cluster itself (clusterType). Additional components
                    consume these instead of re-deriving them.
                  properties:
                    clusterName:
                      type: string
                    helmProviderConfigRef:
                      type: string
                      description: Resolved ref (explicit, or derived from clusterName)
                    kubernetesProviderConfigRef:
                      type: string
                      description: Resolved ref (explicit, or derived from clusterName)
                    observeProviderConfigRef:
                      type: string
                    namespace:
                      type: string
                    clusterType:
                      type: string
                      description: >-
                        Distribution observed from the target RemoteCluster,
                        surfaced up from the FluxInit child.
                components:
                  type: object
                  description: Per-component readiness and outputs, keyed by component name.
                  properties:
                    fluxInit:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                        ready:
                          type: boolean
                        operatorReady:
                          type: boolean
                        instanceReady:
                          type: boolean
                        sourcesReady:
                          type: boolean
                        sourceCount:
                          type: integer
                componentCount:
                  type: integer
                  description: Number of enabled components
                readyComponents:
                  type: integer
                  description: Number of enabled components that are Ready
                ready:
                  type: boolean
                  description: True when every enabled component is Ready
