---
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: platforms.config.stuttgart-things.com
spec:
  group: config.stuttgart-things.com
  defaultCompositeDeletePolicy: Foreground
  scope: Namespaced
  names:
    kind: Platform
    plural: platforms
    singular: platform
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              x-kubernetes-validations:
                - rule: "has(self.clusterName) || (has(self.helmProviderConfigRef) && has(self.kubernetesProviderConfigRef))"
                  message: either clusterName, or both helmProviderConfigRef and kubernetesProviderConfigRef, must be set
                # Apps reference Flux sources that the FluxInit child creates, so
                # enabling one without fluxInit can never converge. Rejected here,
                # at apply time, rather than as a composition error later.
                - rule: "!(has(self.apps) && self.apps.exists(k, self.apps[k].enabled) && has(self.fluxInit) && has(self.fluxInit.enabled) && !self.fluxInit.enabled)"
                  message: apps are enabled but fluxInit is disabled — fluxInit creates the Flux sources every app references; enable fluxInit or disable all apps
              properties:
                # --- Shared cluster identity: set once here, passed to every component ---
                clusterName:
                  type: string
                  description: >-
                    Target cluster's RemoteCluster name. When set, the provider
                    config refs default to {clusterName}-helm and
                    {clusterName}-kubernetes. This is the primary shared input —
                    every component of the platform targets this cluster.
                helmProviderConfigRef:
                  type: string
                  description: >-
                    Helm ClusterProviderConfig for the target cluster. Optional
                    when clusterName is set (defaults to {clusterName}-helm).
                kubernetesProviderConfigRef:
                  type: string
                  description: >-
                    Kubernetes ClusterProviderConfig for the target cluster.
                    Optional when clusterName is set (defaults to {clusterName}-kubernetes).
                observeProviderConfigRef:
                  type: string
                  default: in-cluster
                  description: >-
                    Kubernetes ClusterProviderConfig (InjectedIdentity) used to
                    observe resources on the management cluster.
                namespace:
                  type: string
                  default: flux-system
                  description: >-
                    Target namespace on the cluster for platform components.
                    Distinct from metadata.namespace (where the XR itself lives).
                # --- Apps: catalog-driven, delegated to the flux-apps Configuration ---
                apps:
                  type: object
                  description: >-
                    Apps to deploy, keyed by catalog name (see the
                    xplane-flux-catalog KCL module). Enabling one emits BOTH the
                    OCIRepository source on the FluxInit child and the
                    Kustomization entries on the FluxApps child — the source name
                    and the app are the same fact, because stuttgart-things/flux
                    publishes one OCI artifact per app. A map, not a list, so
                    per-app overrides merge. Unknown names are rejected.
                  additionalProperties:
                    type: object
                    properties:
                      enabled:
                        type: boolean
                        default: true
                        description: Deploy this app. false prunes it (the Kustomization and its workload are removed)
                      version:
                        type: string
                        description: OCI tag of the app artifact; defaults to the catalog's defaultVersion
                      targetNamespace:
                        type: string
                        description: Namespace all of this app's resources are applied to
                      substitute:
                        type: object
                        description: postBuild.substitute applied to every component of this app. Values are environment-specific and deliberately live here, not in the catalog.
                        x-kubernetes-preserve-unknown-fields: true
                      components:
                        type: object
                        description: Per-component overrides, keyed by the catalog's component name (e.g. control-plane)
                        additionalProperties:
                          type: object
                          properties:
                            enabled:
                              type: boolean
                              default: true
                            timeout:
                              type: string
                              description: Overrides the catalog's timeout for this component
                            targetNamespace:
                              type: string
                            substitute:
                              type: object
                              description: Merged over the app-level substitute; wins on conflict
                              x-kubernetes-preserve-unknown-fields: true
                            substituteFrom:
                              type: array
                              description: >-
                                postBuild.substituteFrom for this component only.
                                Component-scoped on purpose — it resolves at build
                                time and a missing Secret fails the build, so an
                                app-wide one would break components that do not need it.
                              items:
                                type: object
                                required:
                                  - kind
                                  - name
                                properties:
                                  kind:
                                    type: string
                                    enum:
                                      - ConfigMap
                                      - Secret
                                  name:
                                    type: string
                                  optional:
                                    type: boolean
                # --- Components: one block per wrapped Configuration ---
                fluxInit:
                  type: object
                  description: >-
                    Flux bootstrap, delegated to the flux-init Configuration
                    (composes a FluxInit XR). Fields mirror FluxInit.spec; the
                    shared cluster identity above is injected automatically.
                  properties:
                    enabled:
                      type: boolean
                      default: true
                      description: Compose a FluxInit XR for this platform
                    operatorChart:
                      type: object
                      properties:
                        version:
                          type: string
                        repoURL:
                          type: string
                    instance:
                      type: object
                      properties:
                        distribution:
                          type: string
                        components:
                          type: array
                          items:
                            type: string
                        sources:
                          type: array
                          description: Optional list of OCI/Git sources - if omitted, Flux controllers are installed without sources
                          items:
                            type: object
                            required:
                              - name
                              - url
                            properties:
                              name:
                                type: string
                              kind:
                                type: string
                                enum:
                                  - GitRepository
                                  - OCIRepository
                                default: OCIRepository
                              url:
                                type: string
                              ref:
                                type: string
                                default: latest
                              path:
                                type: string
                                default: "."
                              pullSecret:
                                type: string
                    kustomize:
                      type: object
                      description: Passed through verbatim to FluxInit.spec.kustomize.
                      x-kubernetes-preserve-unknown-fields: true
                    sops:
                      type: object
                      description: Passed through verbatim to FluxInit.spec.sops.
                      x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                shared:
                  type: object
                  description: >-
                    The resolved shared contract of this platform. Written once,
                    read by every component (and by humans / downstream XRs):
                    the refs each component was handed, plus facts discovered
                    from the cluster itself (clusterType). Additional components
                    consume these instead of re-deriving them.
                  properties:
                    clusterName:
                      type: string
                    helmProviderConfigRef:
                      type: string
                      description: Resolved ref (explicit, or derived from clusterName)
                    kubernetesProviderConfigRef:
                      type: string
                      description: Resolved ref (explicit, or derived from clusterName)
                    observeProviderConfigRef:
                      type: string
                    namespace:
                      type: string
                    clusterType:
                      type: string
                      description: >-
                        Distribution observed from the target RemoteCluster,
                        surfaced up from the FluxInit child.
                components:
                  type: object
                  description: Per-component readiness and outputs, keyed by component name.
                  properties:
                    fluxInit:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                        ready:
                          type: boolean
                        operatorReady:
                          type: boolean
                        instanceReady:
                          type: boolean
                        sourcesReady:
                          type: boolean
                        sourceCount:
                          type: integer
                    fluxApps:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                        ready:
                          type: boolean
                        appCount:
                          type: integer
                        readyCount:
                          type: integer
                componentCount:
                  type: integer
                  description: Number of enabled components
                readyComponents:
                  type: integer
                  description: Number of enabled components that are Ready
                ready:
                  type: boolean
                  description: True when every enabled component is Ready
