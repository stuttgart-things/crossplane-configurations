---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: platform
  labels:
    crossplane.io/xrd: platforms.config.stuttgart-things.com
    service: platform
spec:
  compositeTypeRef:
    apiVersion: config.stuttgart-things.com/v1alpha1
    kind: Platform
  mode: Pipeline
  pipeline:
    # Compose one child XR per enabled component and patch the shared status in a
    # single pass. On the first reconcile `ocds` is empty, so status.ready starts
    # false and converges as the child XRs become Ready.
    #
    # The logic lives in the xplane-platform KCL module (which depends on
    # xplane-flux-catalog for the app definitions) rather than inline here: inline
    # KCL cannot be unit-tested, and the app-catalog rules — apps require fluxInit,
    # a component may not depend on a disabled sibling, dependsOn is rewritten to
    # the emitted names — are exactly the logic that should be tested before it
    # reaches a cluster. Same pattern as flux-init and flux-apps.
    #
    # The Cni child (opt-in) additionally GATES the others: until it reports
    # ready the target cluster's nodes are NotReady, so a Helm install aimed at
    # it times out and retries rather than failing fast. The gate is one-way —
    # once a child exists it keeps being emitted, since not emitting it is what
    # makes Crossplane delete it.
    - step: platform
      functionRef:
        name: function-kcl
      input:
        apiVersion: krm.kcl.dev/v1alpha1
        kind: KCLInput
        metadata:
          name: platform
        spec:
          source: oci://ghcr.io/stuttgart-things/xplane-platform:0.3.0
    - step: automatically-detect-ready-composed-resources
      functionRef:
        name: function-auto-ready
