---
apiVersion: meta.pkg.crossplane.io/v1
kind: Configuration
metadata:
  name: platform
  annotations:
    # Local convention used by `task push` to bump and re-publish.
    # Not a Crossplane-standard field — the true package version is the OCI tag.
    meta.crossplane.io/version: v0.3.0
    meta.crossplane.io/maintainer: patrick.hermann@sva.de
    meta.crossplane.io/source: github.com/stuttgart-things/crossplane-configurations
    meta.crossplane.io/license: Apache-2.0
    meta.crossplane.io/description: |
      Umbrella Configuration that assembles a cluster's platform from the
      bootstrap building blocks. A namespaced `Platform` XR carries the
      shared cluster identity (clusterName, provider config refs, namespace)
      once and composes one child XR per enabled component — today `cni`
      (`Cni`, opt-in) and `flux-init` (`FluxInit`), with further
      Configurations to follow.
      The XR status publishes the resolved shared contract plus per-component
      readiness and outputs.
    meta.crossplane.io/readme: |
      # platform

      A Crossplane v2 Configuration that wraps the bootstrap building-block
      Configurations behind a single namespaced `Platform` XR (group
      `config.stuttgart-things.com`).

      The Composition is a `function-kcl` step that composes one **child XR**
      per enabled component — currently a `Cni` (the
      [cni](https://github.com/stuttgart-things/crossplane-configurations/tree/main/bootstrap/cni)
      Configuration, opt-in) and a `FluxInit` (the
      [flux-init](https://github.com/stuttgart-things/crossplane-configurations/tree/main/bootstrap/flux-init)
      Configuration). The wrapped Configurations stay independently usable;
      `platform` only supplies the shared inputs and aggregates the results.

      ## Blank clusters

      With `cni.enabled: true` a platform can take over a cluster that was
      provisioned deliberately **without a CNI** — this fleet's
      ansible-built kind clusters — and bring up networking before anything
      else. The other components are gated on it: a cluster with no CNI has
      NotReady nodes, so a Helm install aimed at it does not fail fast, it
      times out and retries. Default is off, because installing a second CNI
      on a cluster that already has one breaks it.

      ## The shared contract

      The point of this Configuration is `status.shared`. The cluster identity
      is stated **once** on `spec` (`clusterName`, or explicit
      `helmProviderConfigRef` / `kubernetesProviderConfigRef`), resolved by the
      Composition, injected into every child XR, and published on
      `status.shared` — together with facts discovered from the cluster
      (`clusterType`, lifted up from the FluxInit child). Components added later
      consume that contract instead of re-deriving it, and `status.components`
      carries each child's readiness and outputs.

      ## Cluster preconditions

      Those of the wrapped Configurations — `platform` adds none of its own:

      - A Helm `ClusterProviderConfig` (`helm.m.crossplane.io/v1beta1`) named
        `{clusterName}-helm` (or whatever `spec.helmProviderConfigRef` says).
      - A Kubernetes `ClusterProviderConfig`
        (`kubernetes.m.crossplane.io/v1alpha1`) named `{clusterName}-kubernetes`.
      - A `flux-defaults` EnvironmentConfig — consumed by the flux-init
        Composition, not by this one.
spec:
  crossplane:
    version: ">=v2.1.3"
  dependsOn:
    # Building-block Configurations this package composes. Installing platform
    # pulls these; they remain usable on their own.
    - configuration: ghcr.io/stuttgart-things/crossplane-configurations/cni
      version: ">=v0.1.0"
    - configuration: ghcr.io/stuttgart-things/crossplane-configurations/flux-init
      version: ">=v0.3.0"
    # Providers the composed Configurations apply managed resources with.
    # Pulled transitively via the Configurations above; pinned here too so the
    # package states its full runtime surface.
    - provider: xpkg.crossplane.io/crossplane-contrib/provider-helm
      version: ">=v1.0.0,<v2.0.0"
    - provider: xpkg.crossplane.io/crossplane-contrib/provider-kubernetes
      version: ">=v1.2.0,<v2.0.0"
    # Functions used by this Composition's pipeline (kcl, auto-ready) and by
    # the composed Configurations' pipelines (environment-configs).
    - function: xpkg.crossplane.io/crossplane-contrib/function-kcl
      version: ">=v0.12.0,<v0.13.0"
    - function: xpkg.crossplane.io/crossplane-contrib/function-environment-configs
      version: ">=v0.7.0,<v0.8.0"
    - function: xpkg.crossplane.io/crossplane-contrib/function-auto-ready
      version: ">=v0.6.5,<v0.7.0"
