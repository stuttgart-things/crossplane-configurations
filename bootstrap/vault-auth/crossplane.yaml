---
apiVersion: meta.pkg.crossplane.io/v1
kind: Configuration
metadata:
  name: vault-auth
  annotations:
    # Local convention used by `task push` to bump and re-publish.
    # Not a Crossplane-standard field — the true package version is the OCI tag.
    meta.crossplane.io/version: v0.1.0
    meta.crossplane.io/maintainer: patrick.hermann@sva.de
    meta.crossplane.io/source: github.com/stuttgart-things/crossplane-configurations
    meta.crossplane.io/license: Apache-2.0
    meta.crossplane.io/description: |
      Bootstraps Vault Kubernetes auth backends (and optional
      backend_config) from a namespaced `VaultK8sAuth` XR via the OpenTofu
      provider. One `opentofu.m.upbound.io/v1beta1` Workspace is generated
      per `spec.k8sAuths` entry.
    meta.crossplane.io/readme: |
      # vault-auth

      A Crossplane v2 Configuration that creates Vault Kubernetes auth
      backends from a namespaced `VaultK8sAuth` XR (group
      `config.stuttgart-things.com`).

      The Composition is a thin `function-kcl` wrapper around the
      `xplane-vault-auth` KCL module (pulled from OCI at render time). It
      emits one `opentofu.m.upbound.io/v1beta1` Workspace per `k8sAuths`
      entry; each Workspace runs the Vault Terraform provider to configure
      the Kubernetes auth backend (`<clusterName>-<authName>`), a role, and
      — when `backendConfig` is set — a `vault_kubernetes_auth_backend_config`.

      ## Cluster preconditions

      - An OpenTofu `ClusterProviderConfig` whose name matches the XR's
        `spec.providerConfigName` (examples reference `default`).
      - A Secret (co-located in the XR's namespace) holding
        `terraform.tfvars` with `vault_token = "hvs...."` — name from
        `spec.vaultTokenSecret` (default `vault`).
      - When any `k8sAuths` entry sets `backendConfig`, the referenced
        ServiceAccount-token Secret must already exist (see README).
spec:
  crossplane:
    version: ">=v2.1.3"
  dependsOn:
    # Vault auth is provisioned via the OpenTofu/Terraform provider.
    # provider-opentofu is published only on the Upbound mirror.
    - provider: xpkg.upbound.io/upbound/provider-opentofu
      version: ">=v1.0.3,<v2.0.0"
    # Functions used by this Configuration's Composition pipeline.
    - function: xpkg.crossplane.io/crossplane-contrib/function-kcl
      version: ">=v0.12.0,<v0.13.0"
    - function: xpkg.crossplane.io/crossplane-contrib/function-auto-ready
      version: ">=v0.6.5,<v0.7.0"
