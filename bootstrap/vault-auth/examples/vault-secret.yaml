---
# Secret referenced by the generated Workspace's varFiles entry. Must be
# co-located in the same namespace as the VaultK8sAuth (Crossplane v2
# secretKeyRef is namespace-local).
apiVersion: v1
kind: Secret
metadata:
  name: vault
  namespace: default
type: Opaque
stringData:
  terraform.tfvars: |
    vault_token = "hvs.EXAMPLE-TOKEN-REPLACE-WITH-REAL-VALUE" # pragma: allowlist secret
