---
# RBAC precondition for flux-init when the target is reached via an in-cluster
# (InjectedIdentity) provider-kubernetes ClusterProviderConfig.
#
# The provider-kubernetes ServiceAccount must be allowed to manage the Flux
# CRDs that the FluxInstance / source Objects wrap. On the stuttgart-things
# fleet clusters that SA is effectively cluster-admin and this is unnecessary;
# on tighter clusters (e.g. a kind dev cluster) grant it explicitly, otherwise
# the FluxInstance Object stalls with:
#   observe failed: ... cannot get resource "fluxinstances" in API group
#   "fluxcd.controlplane.io" ... is forbidden
#
# The subject below assumes the provider ServiceAccount name is pinned to
# `provider-kubernetes` via a DeploymentRuntimeConfig — see
# ../../platform/examples/rbac.yaml, which applies the complete grant for
# flux-init + flux-apps (including kustomize.toolkit, which this file does NOT
# cover) in one file and is the recommended way to do this. Without that pin
# the SA name carries the package-revision hash (resolve with
# `kubectl get sa -n crossplane-system -o name | grep provider-kubernetes`) and
# the binding breaks on every provider upgrade.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: provider-kubernetes-flux
rules:
  - apiGroups: ["fluxcd.controlplane.io"] # FluxInstance
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["source.toolkit.fluxcd.io"] # OCIRepository / GitRepository sources
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: provider-kubernetes-flux
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: provider-kubernetes-flux
subjects:
  - kind: ServiceAccount
    name: provider-kubernetes
    namespace: crossplane-system
