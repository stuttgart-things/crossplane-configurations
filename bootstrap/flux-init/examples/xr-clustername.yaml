---
# FluxInit targeting a registered RemoteCluster by name. The provider config
# refs default to {clusterName}-helm / {clusterName}-kubernetes (the naming
# provider-kubeconfig creates), and the RemoteCluster is observed to gate the
# install until it resolves — no explicit provider refs needed.
apiVersion: config.stuttgart-things.com/v1alpha1
kind: FluxInit
metadata:
  name: k3s-2-flux
  namespace: crossplane-system
spec:
  clusterName: k3s-2
  instance:
    sources:
      - name: fleet-infra
        url: oci://ghcr.io/stuttgart-things/fleet-infra
        ref: latest
        path: clusters/k3s-2
