---
# Realistic FluxInit — the copy-paste template. Installs Flux and syncs from a
# single OCI source. Chart version/distribution/components come from the
# flux-defaults EnvironmentConfig.
apiVersion: config.stuttgart-things.com/v1alpha1
kind: FluxInit
metadata:
  name: staging-flux
  namespace: crossplane-system
spec:
  helmProviderConfigRef: staging-helm
  kubernetesProviderConfigRef: staging-kubernetes
  instance:
    sources:
      - name: fleet-infra
        kind: OCIRepository
        url: oci://ghcr.io/stuttgart-things/fleet-infra
        ref: latest
        path: clusters/staging
