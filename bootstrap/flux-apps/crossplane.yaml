---
apiVersion: meta.pkg.crossplane.io/v1
kind: Configuration
metadata:
  name: flux-apps
  annotations:
    # Local convention used by `task push` to bump and re-publish.
    # Not a Crossplane-standard field — the true package version is the OCI tag.
    meta.crossplane.io/version: v0.1.2
    meta.crossplane.io/maintainer: patrick.hermann@sva.de
    meta.crossplane.io/source: github.com/stuttgart-things/crossplane-configurations
    meta.crossplane.io/license: Apache-2.0
    meta.crossplane.io/description: |
      Deploys a set of Flux Kustomizations ("apps") onto a target cluster from
      a namespaced `FluxApps` XR. One managed resource per `spec.apps` entry —
      each a `kustomize.toolkit.fluxcd.io/v1` Kustomization wrapped in a
      provider-kubernetes Object, referencing an existing Flux source.
    meta.crossplane.io/readme: |
      # flux-apps

      A Crossplane v2 Configuration that deploys application
      [Flux](https://fluxcd.io/) Kustomizations onto a target cluster from a
      namespaced `FluxApps` XR (group `config.stuttgart-things.com`).

      The Composition is a thin `function-kcl` wrapper around the
      `xplane-flux-apps` KCL module (pulled from OCI at render time). For every
      entry in `spec.apps` it emits a `kubernetes.m.crossplane.io/v1alpha1`
      Object holding a `kustomize.toolkit.fluxcd.io/v1` Kustomization applied to
      the target cluster. It is the generic, data-driven counterpart to the
      [`flux-app-kustomizations`](https://github.com/stuttgart-things/kcl/tree/main/flux/flux-app-kustomizations)
      module — the hardcoded tekton/crossplane Kustomizations become `spec.apps`
      entries.

      Each Kustomization references an **existing** Flux source
      (`GitRepository`/`OCIRepository`/`Bucket`) named by `spec.sourceRef`
      (default `flux-apps`), typically bootstrapped by the `flux-init`
      Configuration. Shared reconcile defaults come from a `flux-apps-defaults`
      EnvironmentConfig; per-XR `spec.*` and per-app `spec.apps[].*` fields win.

      ## Cluster preconditions

      - A Kubernetes `ClusterProviderConfig`
        (`kubernetes.m.crossplane.io/v1alpha1`) whose name matches the XR's
        `spec.kubernetesProviderConfigRef`.
      - A Flux source (`GitRepository`/`OCIRepository`/`Bucket`) on the target
        cluster matching `spec.sourceRef` — e.g. installed by `flux-init`.
      - Optionally a `flux-apps-defaults` EnvironmentConfig
        (see `examples/environment-config.yaml`).
spec:
  crossplane:
    version: ">=v2.1.3"
  dependsOn:
    # Kustomization Objects are applied to the target cluster via the
    # namespaced Kubernetes provider.
    - provider: xpkg.crossplane.io/crossplane-contrib/provider-kubernetes
      version: ">=v1.2.0,<v2.0.0"
    # Functions used by this Configuration's Composition pipeline.
    - function: xpkg.crossplane.io/crossplane-contrib/function-kcl
      version: ">=v0.12.0,<v0.13.0"
    - function: xpkg.crossplane.io/crossplane-contrib/function-environment-configs
      version: ">=v0.7.0,<v0.8.0"
    - function: xpkg.crossplane.io/crossplane-contrib/function-auto-ready
      version: ">=v0.6.5,<v0.7.0"
