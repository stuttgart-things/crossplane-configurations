---
# Shared reconcile defaults consumed by the Composition's load-environment step.
# REQUIRED — the step references this by name and a missing EnvironmentConfig
# fails the pipeline. Per-XR spec.* and per-app spec.apps[].* fields override
# these.
#
# This is also where the effective sourceRef default lives: the XRD's
# sourceRef.kind default only materialises if the XR actually sets
# `sourceRef: {}` (CRD defaulting does not create absent objects), so for an XR
# that omits sourceRef entirely, the value below is what every app gets.
apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: flux-apps-defaults
data:
  namespace: flux-system
  interval: "1h"
  retryInterval: "1m"
  timeout: "10m"
  sourceRef:
    kind: OCIRepository
    name: flux-apps
