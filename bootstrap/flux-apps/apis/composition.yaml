---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: flux-apps
  labels:
    crossplane.io/xrd: fluxapps.config.stuttgart-things.com
    provider-kubernetes: "true"
    service: flux-apps
spec:
  compositeTypeRef:
    apiVersion: config.stuttgart-things.com/v1alpha1
    kind: FluxApps
  mode: Pipeline
  pipeline:
    # Load shared reconcile defaults (namespace, intervals, sourceRef) into the
    # environment context. REQUIRED — `type: Reference` has no `optional` field
    # in function-environment-configs v0.7.x (it is rejected at unmarshal), so a
    # missing flux-apps-defaults fails the whole pipeline with
    # `Required environment config "flux-apps-defaults" not found`.
    - step: load-environment
      functionRef:
        name: function-environment-configs
      input:
        apiVersion: environmentconfigs.fn.crossplane.io/v1beta1
        kind: Input
        spec:
          environmentConfigs:
            - type: Reference
              ref:
                name: flux-apps-defaults
    # Render one Kustomization Object per spec.apps entry and patch XR status
    # (single pass) via the xplane-flux-apps KCL module pulled from OCI.
    - step: flux-apps
      functionRef:
        name: function-kcl
      input:
        apiVersion: krm.kcl.dev/v1alpha1
        kind: KCLInput
        metadata:
          name: flux-apps
        spec:
          source: oci://ghcr.io/stuttgart-things/xplane-flux-apps:0.1.0
    - step: automatically-detect-ready-composed-resources
      functionRef:
        name: function-auto-ready
