---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: ip-reservation
  labels:
    crossplane.io/xrd: xipreservations.resources.stuttgart-things.com
    provider-kubernetes: "true"
    service: ip-reservation
spec:
  compositeTypeRef:
    apiVersion: resources.stuttgart-things.com/v1alpha1
    kind: XIPReservation
  mode: Pipeline
  pipeline:
    # Render the Observe + IPReservation Objects and patch XR status (single
    # pass) via the xplane-ip-reservation KCL module pulled from OCI.
    - step: ip-reservation
      functionRef:
        name: function-kcl
      input:
        apiVersion: krm.kcl.dev/v1alpha1
        kind: KCLInput
        metadata:
          name: ip-reservation
        spec:
          source: oci://ghcr.io/stuttgart-things/xplane-ip-reservation:0.1.0
    - step: automatically-detect-ready-composed-resources
      functionRef:
        name: function-auto-ready
