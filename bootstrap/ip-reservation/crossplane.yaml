---
apiVersion: meta.pkg.crossplane.io/v1
kind: Configuration
metadata:
  name: ip-reservation
  annotations:
    # Local convention used by `task push` to bump and re-publish.
    # Not a Crossplane-standard field — the true package version is the OCI tag.
    meta.crossplane.io/version: v0.1.0
    meta.crossplane.io/maintainer: patrick.hermann@sva.de
    meta.crossplane.io/source: github.com/stuttgart-things/crossplane-configurations
    meta.crossplane.io/license: Apache-2.0
    meta.crossplane.io/description: |
      Reserves IP addresses (and optional wildcard DNS) from clusterbook for a
      target cluster, from a namespaced `XIPReservation` XR. The network is
      derived automatically from the target's `RemoteCluster.internalNetworkKey`.
    meta.crossplane.io/readme: |
      # ip-reservation

      A Crossplane v2 Configuration that reserves IP addresses from
      clusterbook (`provider-clusterbook`) for a target cluster, keyed on the
      `internalNetworkKey` discovered from that cluster's `RemoteCluster`
      (`provider-kubeconfig`), from a namespaced `XIPReservation` XR (group
      `resources.stuttgart-things.com`).

      The Composition is a thin `function-kcl` wrapper around the
      `xplane-ip-reservation` KCL module (pulled from OCI at render time). It
      emits an Observe `Object` that reads the RemoteCluster network key, then a
      second `Object` wrapping an `IPReservation` (clusterbook). Both Objects use
      the in-cluster provider config; the reservation status (IPs, DNS FQDN/zone)
      is patched back onto the XR.

      ## Cluster preconditions

      - `provider-kubeconfig` installed, with a `RemoteCluster` for the target
        cluster whose status exposes `internalNetworkKey`.
      - `provider-clusterbook` installed, with a `ClusterProviderConfig`
        matching `spec.clusterbookProviderConfigRef` (default `default`).
      - An in-cluster `ClusterProviderConfig` (`kubernetes.m`, InjectedIdentity)
        named per `spec.kubernetesProviderConfigRef` (default `in-cluster`).
      - RBAC for the provider-kubernetes SA: `get,list,watch,patch` on
        `remoteclusters` (kubeconfig) and full CRUD on `ipreservations`
        (clusterbook).
spec:
  crossplane:
    version: ">=v2.1.3"
  dependsOn:
    # The Observe + IPReservation MRs are applied via the namespaced
    # Kubernetes provider. provider-kubeconfig and provider-clusterbook are
    # fleet-specific cluster preconditions (see readme), not package deps.
    - provider: xpkg.crossplane.io/crossplane-contrib/provider-kubernetes
      version: ">=v1.2.0,<v2.0.0"
    - function: xpkg.crossplane.io/crossplane-contrib/function-kcl
      version: ">=v0.12.0,<v0.13.0"
    - function: xpkg.crossplane.io/crossplane-contrib/function-auto-ready
      version: ">=v0.6.5,<v0.7.0"
