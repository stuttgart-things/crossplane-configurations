---
# SOURCE Secrets on the control-plane cluster, in the VaultPkiSecret XR's
# namespace. The token and the CA bundle live in SEPARATE Secrets (matching how
# the platform stores them — cert-manager's ClusterIssuer references two
# separate Secrets too). The XR points at both via spec.tokenSecretRef and
# spec.caBundleSecretRef; the Composition copies their values onto the target
# cluster.
#
# Values are base64 (standard Secret data):
#   token  = base64 of the raw Vault token (hvs.…)
#   ca.crt = base64 of the PEM CA bundle
apiVersion: v1
kind: Secret
metadata:
  name: vault-pki-source-token # pragma: allowlist secret
  namespace: default
type: Opaque
data:
  token: "aHZzLkVYQU1QTEUtVE9LRU4tUkVQTEFDRS1XSVRILVJFQUwtVkFMVUU=" # pragma: allowlist secret
---
apiVersion: v1
kind: Secret
metadata:
  name: vault-pki-source-ca
  namespace: default
type: Opaque
data:
  ca.crt: "" # pragma: allowlist secret
