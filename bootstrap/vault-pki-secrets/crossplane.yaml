---
apiVersion: meta.pkg.crossplane.io/v1
kind: Configuration
metadata:
  name: vault-pki-secrets
  annotations:
    # Local convention used by `task push` to bump and re-publish.
    # Not a Crossplane-standard field — the true package version is the OCI tag.
    meta.crossplane.io/version: v0.1.4
    meta.crossplane.io/maintainer: patrick.hermann@sva.de
    meta.crossplane.io/source: github.com/stuttgart-things/crossplane-configurations
    meta.crossplane.io/license: Apache-2.0
    meta.crossplane.io/description: |
      Provisions the out-of-band prerequisite Secrets for a Vault-backed
      cert-manager `ClusterIssuer` (the `vault-pki` issuer that the
      stuttgart-things Argo CD ApplicationSet fans onto network-platform
      clusters). A namespaced `VaultPkiSecret` XR references two source Secrets
      (it carries no credentials itself); the Composition reads the token + CA
      bundle from them and pushes them onto a target cluster via
      provider-kubernetes — replacing the legacy Terraform `vault-cert-issuer`
      step. Target Secret names/namespace default per-environment from an
      EnvironmentConfig (mirroring the clusterbook annotations). The
      `ClusterIssuer` itself stays owned by Argo CD.
    meta.crossplane.io/readme: |
      # vault-pki-secrets

      A Crossplane v2 Configuration that creates the **prerequisite Secrets**
      a Vault-backed cert-manager `ClusterIssuer` references — the CA bundle
      (`vault-pki-ca` / `ca.crt`) and the Vault token (`vault-pki-token` /
      `token`) — in the `cert-manager` namespace of a target cluster, via the
      namespaced provider-kubernetes API (`kubernetes.m.crossplane.io`).

      It is the Crossplane replacement for the out-of-band Terraform step the
      Helm chart `infra/cert-manager/vault-pki` documents: that chart (driven
      by the `cert-manager-vault-pki` Argo CD ApplicationSet) renders ONLY the
      `ClusterIssuer` and assumes these two Secrets already exist. This
      Configuration deliberately does NOT render the `ClusterIssuer` — Argo CD
      owns it — so the two never conflict.

      The XR holds no credentials: it references two source Secrets
      (`spec.tokenSecretRef` + `spec.caBundleSecretRef`) and the Composition
      copies their token + CA-bundle values (read via function-go-templating
      ExtraResources, kept base64 throughout) onto the target cluster.

      Target Secret names, keys, namespace and the providerConfigRef default
      per-environment from an EnvironmentConfig (selected by the config-scoped
      label `vault-pki-secrets.config.stuttgart-things.com/environment`), so the
      XR shrinks to per-cluster values (the token + CA bundle). XR spec always
      wins over the EnvironmentConfig.

      ## Cluster preconditions

      - provider-kubernetes installed, with a `ClusterProviderConfig` whose
        name matches the resolved `providerConfigRef` (examples use
        `in-cluster`). Target a *remote/managed* cluster by pointing it at a
        bridged kubeconfig ClusterProviderConfig.
      - provider-kubernetes' ServiceAccount must be able to create Secrets in
        the target namespace (default `cert-manager`).
spec:
  crossplane:
    version: ">=v2.1.3"
  dependsOn:
    # Secrets are pushed to the target cluster via the namespaced
    # provider-kubernetes API (kubernetes.m.crossplane.io/v1alpha1 Object).
    - provider: xpkg.crossplane.io/crossplane-contrib/provider-kubernetes
      version: ">=v1.2.0,<v2.0.0"
    # Functions used by this Configuration's Composition pipeline.
    - function: xpkg.crossplane.io/crossplane-contrib/function-environment-configs
      version: ">=v0.7.0,<v0.8.0"
    - function: xpkg.crossplane.io/crossplane-contrib/function-go-templating
      version: ">=v0.12.1,<v0.13.0"
    - function: xpkg.crossplane.io/crossplane-contrib/function-auto-ready
      version: ">=v0.6.5,<v0.7.0"
