---
apiVersion: meta.pkg.crossplane.io/v1
kind: Configuration
metadata:
  name: cni
  annotations:
    # Local convention used by `task push` to bump and re-publish.
    # Not a Crossplane-standard field — the true package version is the OCI tag.
    meta.crossplane.io/version: v0.1.0
    meta.crossplane.io/maintainer: patrick.hermann@sva.de
    meta.crossplane.io/source: github.com/stuttgart-things/crossplane-configurations
    meta.crossplane.io/license: Apache-2.0
    meta.crossplane.io/description: |
      Installs a CNI on a target cluster from a namespaced `Cni` XR — cilium
      today. Emits the CNI Helm Release, gated on the target cluster's
      RemoteCluster resolving, and reports readiness on `status.ready` so
      components that need to schedule pods can wait for the network instead
      of racing it.
    meta.crossplane.io/readme: |
      # cni

      A Crossplane v2 Configuration that installs a CNI on a target cluster
      from a namespaced `Cni` XR (group `config.stuttgart-things.com`).

      The Composition is a thin `function-kcl` wrapper around the
      `xplane-cni` KCL module (pulled from OCI at render time). It emits a
      `kubernetes.m.crossplane.io/v1alpha1` Object that observes the target
      `RemoteCluster` (the gate) and a `helm.m.crossplane.io/v1beta1` Release
      carrying the CNI chart.

      ## Why a cluster waits on this

      A cluster with no CNI has NotReady nodes, so nothing schedules — and a
      Helm install aimed at it does not fail fast, it times out and retries.
      `status.ready` is the signal other components gate on; the
      [platform](https://github.com/stuttgart-things/crossplane-configurations/tree/main/bootstrap/platform)
      Configuration holds its FluxInit/FluxApps children until it flips.

      ## kube-proxy and the API server address

      This fleet's kind clusters run **without kube-proxy**, so cilium has to
      replace it. It then cannot reach the API server through the `10.96.0.1`
      service VIP — nothing programs that VIP until cilium itself is up.
      `spec.cilium.k8sServiceHost` breaks the circle by naming the
      control-plane directly and defaults to `{clusterName}-control-plane`,
      exactly the container kind creates. The Composition rejects
      `kubeProxyReplacement` with no resolvable address rather than letting
      the cluster deadlock silently.

      ## Cluster preconditions

      - A Helm `ClusterProviderConfig` (`helm.m.crossplane.io/v1beta1`) whose
        name matches `spec.helmProviderConfigRef` (or `{clusterName}-helm`).
      - With `spec.clusterName`: a `RemoteCluster` of that name on the
        management cluster, and RBAC letting provider-kubernetes observe it.
spec:
  crossplane:
    version: ">=v2.1.3"
  dependsOn:
    # The Release is applied to the target cluster via the namespaced Helm
    # provider; the RemoteCluster observe gate uses provider-kubernetes.
    - provider: xpkg.crossplane.io/crossplane-contrib/provider-helm
      version: ">=v1.0.0,<v2.0.0"
    - provider: xpkg.crossplane.io/crossplane-contrib/provider-kubernetes
      version: ">=v1.2.0,<v2.0.0"
    # Functions used by this Configuration's Composition pipeline.
    - function: xpkg.crossplane.io/crossplane-contrib/function-kcl
      version: ">=v0.12.0,<v0.13.0"
    - function: xpkg.crossplane.io/crossplane-contrib/function-auto-ready
      version: ">=v0.6.5,<v0.7.0"
