---
# Maximum example: every XRD spec field exercised at least once.
# Useful for catching templating breakage when KCL module inputs change.
apiVersion: resources.stuttgart-things.com/v1alpha1
kind: AnsibleRun
metadata:
  name: ansible-run-max
  namespace: default
spec:
  # Pipeline Configuration
  pipelineRunName: run-ansible-max
  namespace: tekton-ci

  # Storage Configuration
  storageSize: 100Mi
  storageAccessModes: ReadWriteOnce
  storageClass: openebs-hostpath

  # Ansible Configuration
  ansibleWorkingImage: ghcr.io/stuttgart-things/sthings-ansible:13.5.0-test
  createInventory: "true"
  ansibleTargetHost: all
  ansibleVerbosity: "3"
  validateInventory: "true"

  # Git Configuration (clone pipeline — required for SOPS decrypt below)
  gitRepoUrl: https://github.com/stuttgart-things/stage-time.git
  gitRevision: main
  gitPath: pipelines/execute-ansible-playbooks.yaml
  gitWorkspaceSubdirectory: /ansible/workdir/

  # SOPS decryption (runs after the git clone, before ansible). Only valid with
  # the clone pipeline (gitPath above); the KCL module asserts this.
  decryptSops: "true"
  sopsFiles: ""
  sopsFilePattern: "*.sops.yaml"
  sopsAgeKeyFile: age.agekey
  sopsAgeKeySecretName: sops-age-key # pragma: allowlist secret

  # Credentials
  ansibleCredentialsSecretName: ansible-credentials # pragma: allowlist secret
  ansibleCredentialsUserKey: ANSIBLE_USER # pragma: allowlist secret
  ansibleCredentialsPasswordKey: ANSIBLE_PASSWORD # pragma: allowlist secret

  # Runtime
  userHome: /home/nonroot
  vaultSecretName: vault # pragma: allowlist secret

  # Ansible Roles and Collections
  installExtraRoles: "true"
  ansibleExtraRoles:
    - "https://github.com/stuttgart-things/install-requirements.git,2024.05.11"
    - "https://github.com/stuttgart-things/ansible-roles-system.git,2024.06.01"

  installExtraCollections: "true"
  ansibleExtraCollections:
    - "community.general:10.1.0"
    - "ansible.posix:1.5.4"
    - "https://github.com/stuttgart-things/ansible/releases/download/sthings-baseos-26.6.449.tar.gz/sthings-baseos-26.6.449.tar.gz"
    - "https://github.com/stuttgart-things/ansible/releases/download/sthings-container-26.0.1099.tar.gz/sthings-container-26.0.1099.tar.gz"
    - "https://github.com/stuttgart-things/ansible/releases/download/sthings-rke-26.1.561.tar.gz/sthings-rke-26.1.561.tar.gz"

  # Playbooks and Variables
  ansiblePlaybooks:
    - sthings.baseos.setup
    - sthings.baseos.harden

  ansibleVarsFile:
    - manage_filesystem+-true
    - update_packages+-true
    - ansible_become+-true
    - ansible_become_method+-sudo
    - reboot_after_update+-false

  ansibleVarsInventory:
    - 'all+["10.31.102.107","10.31.102.108"]'
    - 'webservers+["10.31.102.107"]'

  # Static inventory / vars file, both base64-encoded. Exercised here for
  # completeness; `inventory` takes effect only when createInventory is "false".
  inventory: W2FsbF0KMTAuMzEuMTAyLjEwNwoxMC4zMS4xMDIuMTA4Cg== # pragma: allowlist secret
  varsFile: bWFuYWdlX2ZpbGVzeXN0ZW06IHRydWUK # pragma: allowlist secret

  # Shared per-environment defaults (selects the EnvironmentConfig labelled
  # ansible-run.resources.stuttgart-things.com/environment=default)
  environmentConfig: default

  # Become Ready only once the PipelineRun's Succeeded condition is True
  deriveReadiness: true

  # Crossplane Configuration
  wrapInCrossplane: true
  crossplaneObjectName: run-ansible-max
  crossplaneNamespace: default
  crossplaneProviderConfig: in-cluster
  crossplaneTimeout: "120"

  # Target Cluster
  targetCluster:
    name: in-cluster
    scope: Namespaced
