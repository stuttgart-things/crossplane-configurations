---
# Minimum example: the two XRD-required fields (pipelineRunName,
# ansiblePlaybooks) plus the single wrap-Object input that bare
# `crossplane render` needs.
#
# Everything else falls through to the EnvironmentConfig and/or the
# kcl-tekton-pr module defaults:
#   - namespace, gitRepoUrl, gitRevision, gitPath, storageClass,
#     ansibleWorkingImage, ansibleCredentialsSecretName,
#     ansibleExtraCollections  -> EnvironmentConfig (see environmentconfig.yaml)
#   - storage=20Mi/ReadWriteOnce, credentials keys ANSIBLE_USER/
#     ANSIBLE_PASSWORD, install*={true}, crossplaneNamespace=default,
#     crossplaneObjectName=pipelineRunName  -> KCL module defaults
#
# On a cluster the API server also applies the XRD defaults
# (wrapInCrossplane=true, crossplaneProviderConfig=in-cluster), so there
# you could omit wrapInCrossplane too. `crossplane render` does NOT apply
# XRD defaults, and the KCL module's own wrapInCrossplane default is false,
# so it is set explicitly here to exercise the wrapping-Object path.
apiVersion: resources.stuttgart-things.com/v1alpha1
kind: AnsibleRun
metadata:
  name: ansible-run-min
  namespace: default
spec:
  pipelineRunName: run-ansible-min
  ansiblePlaybooks:
    - sthings.baseos.setup
  wrapInCrossplane: true
