---
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: ansibleruns.resources.stuttgart-things.com
spec:
  group: resources.stuttgart-things.com
  defaultCompositeDeletePolicy: Foreground
  scope: Namespaced
  names:
    kind: AnsibleRun
    plural: ansibleruns
    singular: ansiblerun
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                # Pipeline Configuration
                pipelineRunName:
                  type: string
                  description: Name of the Tekton PipelineRun
                namespace:
                  type: string
                  description: |
                    Namespace where the pipeline will run. No XRD default and
                    not required on purpose so the EnvironmentConfig's
                    `namespace` is authoritative (an XRD default would mask it,
                    and a required field can't be satisfied by the
                    EnvironmentConfig — it is applied after admission);
                    precedence is explicit XR value > EnvironmentConfig > KCL
                    module default ("tekton-ci").

                # Storage Configuration
                storageSize:
                  type: string
                  description: Size of the storage volume
                  default: "20Mi"
                storageAccessModes:
                  type: string
                  description: Storage access mode
                  default: ReadWriteOnce
                storageClass:
                  type: string
                  description: |
                    StorageClass for the PipelineRun workspace PVC. When
                    unset, the KCL module's default ("openebs-hostpath")
                    is used. Override on clusters whose default SC
                    differs (e.g. "local-path", "longhorn").

                # Ansible Configuration
                ansibleWorkingImage:
                  type: string
                  description: |
                    Ansible working container image. Intentionally has NO
                    XRD default: an XRD default is applied by the API server
                    BEFORE the Composition runs, so it would always look like
                    an explicit XR value and mask the EnvironmentConfig's
                    `ansibleWorkingImage`. With no default the precedence is
                    explicit XR value > EnvironmentConfig > KCL module default.
                createInventory:
                  type: string
                  description: Whether to create an Ansible inventory
                  default: "true"
                  enum: ["true", "false"]
                ansibleTargetHost:
                  type: string
                  description: Ansible target host
                  default: all
                ansibleVerbosity:
                  type: string
                  description: Ansible verbosity level
                  default: "2"
                validateInventory:
                  type: string
                  description: Whether to validate the inventory
                  default: "true"
                  enum: ["true", "false"]
                # Git Configuration
                gitRepoUrl:
                  type: string
                  description: |
                    Git repository URL of the pipeline definition. No XRD
                    default and not required on purpose so the
                    EnvironmentConfig's `gitRepoUrl` is authoritative (an XRD
                    default would mask it, and a required field can't be
                    satisfied by the EnvironmentConfig — it is applied after
                    admission); precedence is explicit XR value >
                    EnvironmentConfig > KCL module default
                    ("https://github.com/stuttgart-things/stage-time.git").
                gitRevision:
                  type: string
                  description: |
                    Git branch or revision. No XRD default on purpose so the
                    EnvironmentConfig's `gitRevision` is authoritative (an XRD
                    default would mask it); precedence is explicit XR value >
                    EnvironmentConfig > KCL module default.
                gitPath:
                  type: string
                  description: Path to the pipeline file in the Git repository
                gitWorkspaceSubdirectory:
                  type: string
                  description: Workspace subdirectory for Ansible
                  default: /ansible/workdir/

                # Credentials
                ansibleCredentialsSecretName:
                  type: string
                  description: |
                    Name of the secret containing Ansible credentials. No XRD
                    default on purpose so the EnvironmentConfig's
                    `ansibleCredentialsSecretName` is authoritative (an XRD
                    default would mask it); precedence is explicit XR value >
                    EnvironmentConfig > KCL module default.
                ansibleCredentialsUserKey:
                  type: string
                  description: Key for the Ansible user in the credentials secret
                  default: ANSIBLE_USER
                ansibleCredentialsPasswordKey:
                  type: string
                  description: Key for the Ansible password in the credentials secret
                  default: ANSIBLE_PASSWORD
                extraEnvSecretName:
                  type: string
                  description: |
                    Name of a Secret in the PipelineRun namespace whose keys
                    are injected verbatim as environment variables into the
                    ansible step. Each key becomes an env var of the same
                    name, for playbooks that read credentials via
                    `lookup('env', 'FOO')` — e.g. SOPS_AGE_KEY and
                    SOPS_GIT_TOKEN for the machinery bootstrap, which the
                    file-oriented SOPS fields below cannot supply.

                    Deliberately one Secret name rather than a list of
                    {envVar, secretName, key}: Tekton cannot render a variable
                    number of `env` entries from an array param.

                    A missing Secret is a no-op, not a failure. Keys must be
                    valid environment variable names or the Pod is rejected.
                    Kubernetes applies `envFrom` before `env`, so the named
                    credentials (ANSIBLE_USER/ANSIBLE_PASSWORD, VAULT_*) still
                    win on a key collision.

                    No XRD default on purpose so the EnvironmentConfig's
                    `extraEnvSecretName` is authoritative; precedence is
                    explicit XR value > EnvironmentConfig > unset (no
                    injection).

                # Runtime
                userHome:
                  type: string
                  description: Absolute path to the user's home directory
                  default: /home/nonroot
                vaultSecretName:
                  type: string
                  description: Name of the Vault secret
                  default: vault

                # SOPS decryption (runs after the git clone, before ansible).
                # Only valid with gitPath=pipelines/execute-ansible-playbooks.yaml
                # (the clone pipeline); the KCL module asserts this.
                decryptSops:
                  type: string
                  enum: ["true", "false"]
                  default: "false"
                  description: |
                    When "true", decrypt SOPS-encrypted files from the cloned
                    repo before running ansible. Requires the clone pipeline
                    (gitPath=pipelines/execute-ansible-playbooks.yaml) and the
                    age-key secret (sopsAgeKeySecretName) in the PipelineRun
                    namespace.
                sopsFiles:
                  type: string
                  default: ""
                  description: |
                    Whitespace-separated files to decrypt, relative to the
                    cloned workspace root. Empty => every file matching
                    sopsFilePattern.
                sopsFilePattern:
                  type: string
                  default: "*.sops.yaml"
                  description: find(1) -name pattern used when sopsFiles is empty.
                sopsAgeKeyFile:
                  type: string
                  default: age.agekey
                  description: |
                    Name of the age key file inside the sopsAgeKeySecretName
                    secret (the sops-secrets-operator project key exposes it as
                    "age.agekey").
                sopsAgeKeySecretName:
                  type: string
                  description: |
                    Name of the Secret holding the SOPS age key, mounted as the
                    sopsKeys workspace. No XRD default on purpose so the
                    EnvironmentConfig is authoritative; precedence is explicit XR
                    value > EnvironmentConfig > KCL module default
                    ("sops-age-key").

                # Ansible Roles and Collections
                installExtraRoles:
                  type: string
                  description: Whether to install extra Ansible roles
                  default: "true"
                  enum: ["true", "false"]
                ansibleExtraRoles:
                  type: array
                  description: List of extra Ansible roles to install
                  items:
                    type: string
                installExtraCollections:
                  type: string
                  description: Whether to install extra Ansible collections
                  default: "true"
                  enum: ["true", "false"]
                ansibleExtraCollections:
                  type: array
                  description: List of extra Ansible collections to install
                  items:
                    type: string

                # Playbooks and Variables
                ansiblePlaybooks:
                  type: array
                  description: List of Ansible playbooks to execute
                  items:
                    type: string
                ansibleVarsFile:
                  type: array
                  description: List of Ansible variables from file
                  items:
                    type: string
                ansibleVarsInventory:
                  type: array
                  description: List of Ansible inventory variables
                  items:
                    type: string
                inventory:
                  type: string
                  description: |
                    Static inventory as a base64-encoded string. Applied when
                    createInventory is "false"; mutually exclusive with the
                    generated inventory built from ansibleVarsInventory.
                varsFile:
                  type: string
                  description: |
                    Ansible vars file as a base64-encoded string (later merged
                    with key/value vars from ansibleVarsFile).

                # Environment / shared defaults
                environmentConfig:
                  type: string
                  description: |
                    Selects the Crossplane EnvironmentConfig that provides
                    shared per-environment defaults. The Composition matches
                    an EnvironmentConfig carrying the config-scoped label
                    `ansible-run.resources.stuttgart-things.com/environment=<value>`.
                    Supported `data` keys: gitRepoUrl, gitRevision, gitPath,
                    storageClass, ansibleWorkingImage, namespace,
                    ansibleExtraCollections, ansibleCredentialsSecretName,
                    sopsAgeKeySecretName, extraEnvSecretName.
                    Any value set explicitly on this XR's spec overrides the
                    EnvironmentConfig. When no EnvironmentConfig matches, the
                    XR spec / built-in defaults are used.
                  default: default

                # Crossplane Configuration
                wrapInCrossplane:
                  type: boolean
                  description: Whether to wrap the pipeline in Crossplane
                  default: true
                crossplaneObjectName:
                  type: string
                  description: Name of the Crossplane object
                crossplaneNamespace:
                  type: string
                  description: Namespace for the Crossplane object
                  default: default
                crossplaneProviderConfig:
                  type: string
                  description: Crossplane provider config to use
                  default: in-cluster
                crossplaneTimeout:
                  type: string
                  description: Timeout for Crossplane operations
                  default: "60"
                deriveReadiness:
                  type: boolean
                  description: |
                    When true, the AnsibleRun becomes Ready only once the
                    rendered Tekton PipelineRun's "Succeeded" condition is
                    True (readiness derived from the live PipelineRun via
                    provider-kubernetes). When false, it is Ready as soon
                    as the wrapped Object is applied.
                  default: true

                # Target Cluster
                targetCluster:
                  type: object
                  description: Target cluster configuration
                  properties:
                    name:
                      type: string
                      description: Name of the ProviderConfig
                      default: in-cluster
                    scope:
                      type: string
                      description: Scope of the ProviderConfig (Namespaced or Cluster)
                      default: Namespaced
                      enum:
                        - Namespaced
                        - Cluster

              required:
                - pipelineRunName
                - ansiblePlaybooks

            status:
              type: object
              properties:
                installed:
                  type: boolean
                  description: Whether the AnsibleRun has been installed
                pipelineRunName:
                  type: string
                  description: Name of the rendered Tekton PipelineRun
                succeeded:
                  type: string
                  description: |
                    The PipelineRun's "Succeeded" condition status:
                    "True" (completed), "False" (failed) or "Unknown"
                    (running / not yet reported).
                reason:
                  type: string
                  description: |
                    Reason of the PipelineRun's Succeeded condition
                    (e.g. Running, Succeeded, Failed, Completed).
                message:
                  type: string
                  description: Human-readable message from the PipelineRun's Succeeded condition
                startTime:
                  type: string
                  description: When the PipelineRun started
                completionTime:
                  type: string
                  description: When the PipelineRun completed
                taskRuns:
                  type: array
                  description: The PipelineRun's child TaskRuns
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: Name of the TaskRun
                      pipelineTaskName:
                        type: string
                        description: The pipeline task this TaskRun runs
                results:
                  type: array
                  description: |
                    The PipelineRun's results, so a composing XR can consume
                    what the run produced without reading the PipelineRun
                    itself.

                    Only string-valued results appear here; Tekton also allows
                    array- and object-typed results, which this schema cannot
                    represent.
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: Result name as declared by the pipeline
                      value:
                        type: string
                        description: Result value
