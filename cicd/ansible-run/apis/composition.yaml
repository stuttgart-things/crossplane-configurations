---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: ansible-run
  labels:
    crossplane.io/xrd: ansibleruns.resources.stuttgart-things.com
spec:
  compositeTypeRef:
    apiVersion: resources.stuttgart-things.com/v1alpha1
    kind: AnsibleRun
  mode: Pipeline
  pipeline:
    # Load shared per-environment defaults from an EnvironmentConfig into
    # the pipeline context. The EnvironmentConfig is selected by the label
    # `resources.stuttgart-things.com/environment`, whose value is taken
    # from the XR's `spec.environmentConfig` field (default "default").
    # If no EnvironmentConfig matches, the context stays empty and the KCL
    # module falls back to the XR spec / its own defaults — so this step is
    # safe even when no EnvironmentConfig exists on the cluster.
    - step: load-environment
      functionRef:
        name: function-environment-configs
      input:
        apiVersion: environmentconfigs.fn.crossplane.io/v1beta1
        kind: Input
        spec:
          environmentConfigs:
            - type: Selector
              selector:
                matchLabels:
                  - key: resources.stuttgart-things.com/environment
                    type: FromCompositeFieldPath
                    valueFromFieldPath: spec.environmentConfig
    - step: render-pipelinerun
      functionRef:
        name: function-kcl
      input:
        apiVersion: krm.kcl.dev/v1alpha1
        kind: KCLInput
        metadata:
          name: ansiblerun
        spec:
          source: oci://ghcr.io/stuttgart-things/kcl-tekton-pr:0.5.0
    - step: ready
      functionRef:
        name: function-auto-ready
