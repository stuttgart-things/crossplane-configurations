---
# Shared per-environment defaults for ClusterBackup XRs, selected by the
# config-scoped label `cluster-backup.resources.stuttgart-things.com/environment`
# matched against spec.environmentConfig. Anything set on the XR wins.
#
# The four fields here deliberately have NO XRD default: an XRD default is
# applied by the API server before the Composition runs, so it would always
# look like an explicit XR value and mask this EnvironmentConfig.
apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: cluster-backup-defaults
  labels:
    cluster-backup.resources.stuttgart-things.com/environment: default
data:
  registry: ghcr.io/stuttgart-things/backups
  # Needs kubectl, sops, oras and a POSIX shell.
  image: ghcr.io/stuttgart-things/machineshop:v2.6.13
  registryCredentialsSecretName: backup-registry # pragma: allowlist secret
  # age PUBLIC key — the project recipient. The private half stays with the
  # sops-secrets-operator; this job encrypts and can never decrypt.
  ageRecipient: age19vgzvmpt9tdlcsu8rzaacj397yz8gguz38nsmuy6eeelt5vjsyms542xtm # pragma: allowlist secret (age PUBLIC key)
  schedule: "17 * * * *"
  namespace: crossplane-system
