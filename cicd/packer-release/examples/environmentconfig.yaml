---
# Per-environment defaults for the TEST VM of a PackerRelease.
#
# Selected by the config-scoped label
# `packer-release.resources.stuttgart-things.com/environment`, matched against
# the XR's `spec.environmentConfig` (default "default"). The key is namespaced
# to this Configuration because function-environment-configs requires exactly
# one Selector match, and sibling Configurations ship EnvironmentConfigs whose
# value is also "default".
#
# This environment covers ONLY the test VM. Build settings come from the
# packer-build EnvironmentConfig, and any placement field left unset here falls
# back to the vsphere-vm one. Set a field in exactly one of the three.
#
# Values below describe LabUL, verified 2026-07-21.
apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: packer-release-defaults
  labels:
    packer-release.resources.stuttgart-things.com/environment: default
data:
  # Test VM placement. `folderPath` is deliberately a scratch folder: these VMs
  # are created and destroyed per release and must not sit among real ones.
  folderPath: stuttgart-things/testing
  datacenter: /LabUL
  datastore: /LabUL/datastore/UL-ESX-SAS-02
  resourcePool: /LabUL/host/Cluster-V6.7/Resources
  network: /LabUL/network/LAB-10.31.102

  # Must match the firmware the template was built with, or it will not boot.
  firmware: bios

  # Hypervisor credentials, as tfvars, pre-created in the XR's namespace.
  tfvarsSecretName: vsphere-tfvars # pragma: allowlist secret
  tfvarsSecretKey: terraform.tfvars # pragma: allowlist secret

  # The OPENTOFU provider config the test VM's Workspace runs through -- NOT
  # the provider-kubernetes one that ansible-run/packer-build call
  # `crossplaneProviderConfig`. This name is a per-cluster choice; check it
  # with `kubectl get clusterproviderconfigs.opentofu.m.upbound.io` before
  # trusting the default.
  providerConfigName: default
  providerConfigKind: ClusterProviderConfig

  # Promotion of a tested template to the golden image. Everything here is
  # environment, not release: the folders, the CA bundle and the pipeline pin
  # are properties of LabUL. What is NOT here is `goldenName` -- which image a
  # given build supersedes is a per-release decision, so it lives on the XR.
  #
  # None of this takes effect unless an XR sets `spec.promote.enabled: true`.
  promote:
    # Where packer builds land, and where golden images live. Full inventory
    # paths, since govc addresses objects by path.
    buildFolder: /LabUL/vm/stuttgart-things/packer
    goldenFolder: /LabUL/vm/stuttgart-things/vm-templates
    previousSuffix: "-previous"
    datacenter: /LabUL
    insecureSkipVerify: "true"

    # Vault holds the vCenter credentials and sits behind the lab's private CA,
    # so the CA bundle is not optional here despite the pipeline treating the
    # workspace as optional. Without it the run fails at the Vault call, and
    # the error mentions neither TLS nor this ConfigMap.
    caCertsConfigMapName: packer-ca-certs
    vaultSecretName: vault # pragma: allowlist secret
    vaultSecretPath: cloud/data/vsphere # pragma: allowlist secret

    # Namespace the promote PipelineRun runs in, and the provider-KUBERNETES
    # ClusterProviderConfig the wrapping Object targets -- not the OpenTofu one
    # above. Per-cluster: check with
    # `kubectl get clusterproviderconfigs.kubernetes.m.crossplane.io`.
    namespace: tekton-ci
    crossplaneProviderConfig: in-cluster

    # Must be a stage-time tag CONTAINING promote-packer-template.yaml, i.e.
    # >= v0.10.0. Pinned rather than "main" because the git resolver fetches at
    # render time, so an unpinned revision silently changes what runs.
    pipelineRevision: v0.10.0

    # govc ships in the packer image from 2.0.0 onwards.
    workingImage: ghcr.io/stuttgart-things/sthings-packer:2.0.0

  # Ansible run against the test VM. Overridable per environment so a host
  # without an LVM data disk expresses that here rather than by editing an XR.
  ansible:
    playbooks:
      - sthings.baseos.setup
    varsFile:
      - manage_filesystem+-true
      - update_packages+-true
      - ansible_become+-true
      - ansible_become_method+-sudo
