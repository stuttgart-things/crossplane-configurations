---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: packer-release
  labels:
    crossplane.io/xrd: packerreleases.resources.stuttgart-things.com
spec:
  compositeTypeRef:
    apiVersion: resources.stuttgart-things.com/v1alpha1
    kind: PackerRelease
  mode: Pipeline
  pipeline:
    # -------------------------------------------------------------------------
    # Step 0: per-environment defaults for the TEST VM, selected by the
    # config-scoped label `packer-release.resources.stuttgart-things.com/environment`
    # from `spec.environmentConfig`. The key is namespaced to this Configuration
    # because function-environment-configs requires EXACTLY ONE Selector match,
    # and several sibling Configurations ship an EnvironmentConfig whose value is
    # also "default" — a shared key would break all of them at once.
    #
    # Note this environment is only consulted for test-VM defaults. Build
    # settings are resolved by the nested PackerBuild from ITS own
    # EnvironmentConfig, and placement fallbacks by VsphereVM from ITS own. Three
    # environments, one per layer, each owned by the Configuration that reads it.
    # -------------------------------------------------------------------------
    - step: load-environment
      functionRef:
        name: function-environment-configs
      input:
        apiVersion: environmentconfigs.fn.crossplane.io/v1beta1
        kind: Input
        spec:
          environmentConfigs:
            - type: Selector
              selector:
                matchLabels:
                  - key: packer-release.resources.stuttgart-things.com/environment
                    type: FromCompositeFieldPath
                    valueFromFieldPath: spec.environmentConfig
                    fromFieldPathPolicy: Optional

    # -------------------------------------------------------------------------
    # Step 1: compose the nested XRs.
    #
    # The PackerBuild is always rendered. The VMProvision is rendered only while
    # the GATE is open, and its disappearance is what tears the test VM down —
    # there is no imperative cleanup step, and none is wanted: a `finally`-style
    # teardown only runs if the thing driving it is still alive.
    # -------------------------------------------------------------------------
    - step: render
      functionRef:
        name: function-kcl
      input:
        apiVersion: krm.kcl.dev/v1alpha1
        kind: KCLInput
        metadata:
          name: packerrelease
        spec:
          source: |
            oxr = option("params").oxr
            _ctx = option("params").ctx or {}
            _ocds = option("params").ocds or {}

            _spec = oxr?.spec or {}
            _name = oxr.metadata.name
            _namespace = oxr.metadata.namespace or "default"
            _build = _spec?.build or {}
            _test = _spec?.test or {}

            # function-environment-configs merges the selected EnvironmentConfig's
            # data into the context under this well-known key.
            _env = _ctx["apiextensions.crossplane.io/environment"] or {}

            # --- Observed build ---------------------------------------------
            # Read the nested PackerBuild's status. `template-name` is a
            # PipelineRun RESULT that packer-build surfaces on its status since
            # v0.3.0 — on an older packer-build the list is simply absent, the
            # gate never opens, and the XR sits in Building forever. Hence the
            # >=v0.3.0 floor in crossplane.yaml.
            _pbs = [v.Resource for _, v in _ocds if v?.Resource?.kind == "PackerBuild"]
            _pb = _pbs[0] if _pbs else {}
            _pbStatus = _pb?.status or {}
            _tplNames = [
                r.value for r in (_pbStatus?.results or []) if r?.name == "template-name"
            ]
            _templateName = _tplNames[0] if _tplNames else ""
            _buildSucceeded = _pbStatus?.succeeded or "Unknown"

            # --- Gate --------------------------------------------------------
            # `tested` is a LATCH read back off this XR's own observed status
            # (written by the derive-status step on an earlier reconcile). It is
            # what makes teardown terminal: without it, the moment the test VM
            # is removed the gate condition would be satisfied again and the VM
            # would be rebuilt on the next reconcile, forever.
            #
            # A test VM that never reaches Ready deliberately keeps the gate
            # open, so a FAILED smoke test leaves the VM up for inspection
            # rather than destroying the evidence.
            _testEnabled = _test?.enabled if "enabled" in _test else True
            _alreadyTested = oxr?.status?.tested or False
            _buildDone = _buildSucceeded == "True" and _templateName != ""
            _gateOpen = _testEnabled and _buildDone and not _alreadyTested

            # --- Secret NAMES (not values) ----------------------------------
            # Defaults are resolved into locals here and assigned by variable
            # below, and the locals avoid secret-ish words. A literal default
            # written straight onto a field like `vaultSecretName` trips
            # detect-secrets' keyword heuristic; because these lines live inside
            # a YAML block scalar the finding is reported against the
            # `source: |` line, so the only place a pragma would take effect is
            # there -- silencing secret detection for this entire KCL program.
            _provider = _test?.provider or "vsphere"
            _vaultName = _build?.vaultSecretName or "vault"
            _tfvarsName = _test?.tfvars?.secretName or _env?.tfvarsSecretName or "{}-tfvars".format(_provider)
            _tfvarsKey = _test?.tfvars?.secretKey or _env?.tfvarsSecretKey or "terraform.tfvars"

            # --- Nested PackerBuild -----------------------------------------
            # Fields are emitted only when set, so an unset field stays absent
            # rather than being pinned to an empty string — an empty string is
            # an explicit value to the child XR and would mask ITS
            # EnvironmentConfig, which is exactly the failure mode the XRDs in
            # this repo keep warning about.
            _packerBuild = {
                apiVersion = "resources.stuttgart-things.com/v1alpha1"
                kind = "PackerBuild"
                metadata = {
                    name = "{}-build".format(_name)
                    namespace = _namespace
                    annotations = {
                        "crossplane.io/composition-resource-name" = "packer-build"
                    }
                }
                spec = {
                    environmentConfig = _build?.environmentConfig or "default"
                    pipelineRunName = _build?.pipelineRunName or "{}-build".format(_name)
                    osVersion = _build.osVersion
                    provisioning = _build.provisioning
                    packerTemplate = _build.packerTemplate
                    gitRevision = _build?.gitRevision or "main"
                    vaultSecretName = _vaultName
                    # Readiness must track the pipeline: the gate below keys off
                    # succeeded == "True", and an XR that went Ready on create
                    # would still report Unknown here — harmless, but it would
                    # make the PackerRelease look Ready before anything ran.
                    deriveReadiness = True
                    if _build?.lab: lab = _build.lab
                    if _build?.hypervisor: hypervisor = _build.hypervisor
                    if _build?.gitWorkspaceSubdirectory: gitWorkspaceSubdirectory = _build.gitWorkspaceSubdirectory
                    if _build?.namespace: namespace = _build.namespace
                    if _build?.storageClass: storageClass = _build.storageClass
                }
            }

            # --- Nested VMProvision (test VM) -------------------------------
            _ansible = _test?.ansible or {}
            _ansibleEnabled = _ansible?.enabled if "enabled" in _ansible else True
            _ansibleEnv = _env?.ansible or {}

            _vsphereBlock = {
                if _test?.vsphere?.folderPath: folderPath = _test.vsphere.folderPath
                elif _env?.folderPath: folderPath = _env.folderPath
                if _test?.vsphere?.datacenter: datacenter = _test.vsphere.datacenter
                elif _env?.datacenter: datacenter = _env.datacenter
                if _test?.vsphere?.datastore: datastore = _test.vsphere.datastore
                elif _env?.datastore: datastore = _env.datastore
                if _test?.vsphere?.resourcePool: resourcePool = _test.vsphere.resourcePool
                elif _env?.resourcePool: resourcePool = _env.resourcePool
                if _test?.vsphere?.network: network = _test.vsphere.network
                elif _env?.network: network = _env.network
            }

            _proxmoxBlock = {
                if _test?.proxmox?.node: node = _test.proxmox.node
                elif _env?.node: node = _env.node
                if _test?.proxmox?.datastore: datastore = _test.proxmox.datastore
                elif _env?.datastore: datastore = _env.datastore
                if _test?.proxmox?.folderPath: folderPath = _test.proxmox.folderPath
                elif _env?.folderPath: folderPath = _env.folderPath
                if _test?.proxmox?.network: network = _test.proxmox.network
                elif _env?.network: network = _env.network
            }

            _testName = "{}-test".format(_name)

            _vmProvision = {
                apiVersion = "resources.stuttgart-things.com/v1alpha1"
                kind = "VMProvision"
                metadata = {
                    name = _testName
                    namespace = _namespace
                    annotations = {
                        "crossplane.io/composition-resource-name" = "test-vm"
                    }
                }
                spec = {
                    provider = _provider
                    providerRef = {
                        name = _test?.providerRef?.name or _env?.providerConfigName or "default"
                        kind = _test?.providerRef?.kind or _env?.providerConfigKind or "ClusterProviderConfig"
                    }
                    vm = {
                        name = _testName
                        count = "1"
                        cpu = _test?.cpu or "4"
                        ram = _test?.ram or "4096"
                        disk = _test?.disk or "64"
                        firmware = _test?.firmware or _env?.firmware or "bios"
                        # The whole point: clone the template this XR just built,
                        # not whatever the environment calls current.
                        template = _templateName
                        annotation = "PACKER RELEASE SMOKE TEST for {} -- managed by PackerRelease/{}".format(_templateName, _name)
                    }
                    if _provider == "vsphere":
                        vsphere = _vsphereBlock
                    if _provider == "proxmox":
                        proxmox = _proxmoxBlock
                    tfvars = {
                        secretName = _tfvarsName
                        secretKey = _tfvarsKey
                    }
                    connectionSecret = {
                        name = _testName
                    }
                    ansible = {
                        enabled = _ansibleEnabled
                        if _ansibleEnabled:
                            playbooks = _ansible?.playbooks or _ansibleEnv?.playbooks or ["sthings.baseos.setup"]
                            varsFile = _ansible?.varsFile or _ansibleEnv?.varsFile or [
                                "manage_filesystem+-true"
                                "update_packages+-true"
                                "ansible_become+-true"
                                "ansible_become_method+-sudo"
                            ]
                    }
                }
            }

            items = [_packerBuild] + ([_vmProvision] if _gateOpen else [])

    # -------------------------------------------------------------------------
    # Step 2: lift the two children's state onto this XR and set the latch.
    #
    # Returning only the desired XR (dxr) leaves the resources rendered by the
    # previous step untouched — function-kcl carries forward prior desired
    # state. Same technique as packer-build's own derive-status.
    # -------------------------------------------------------------------------
    - step: derive-status
      functionRef:
        name: function-kcl
      input:
        apiVersion: krm.kcl.dev/v1alpha1
        kind: KCLInput
        metadata:
          name: packerrelease-status
        spec:
          source: |
            _params = option("params") or {}
            oxr = _params?.oxr or {}
            _ocds = _params?.ocds or {}
            _spec = oxr?.spec or {}
            _test = _spec?.test or {}

            _pbs = [v.Resource for _, v in _ocds if v?.Resource?.kind == "PackerBuild"]
            _pb = _pbs[0] if _pbs else {}
            _pbStatus = _pb?.status or {}
            _tplNames = [
                r.value for r in (_pbStatus?.results or []) if r?.name == "template-name"
            ]
            _templateName = _tplNames[0] if _tplNames else ""
            _buildSucceeded = _pbStatus?.succeeded or "Unknown"

            _vms = [v.Resource for _, v in _ocds if v?.Resource?.kind == "VMProvision"]
            _vm = _vms[0] if _vms else {}
            _vmReady = [
                c for c in (_vm?.status?.conditions or [])
                if c?.type == "Ready" and c?.status == "True"
            ]
            # Latched like `tested`, and for the same reason: the IP is read
            # off the test VM, and the test VM is gone the moment the latch
            # closes. Recomputed each reconcile it would survive exactly one
            # pass and then vanish from a status field documented as kept.
            _vmIpNow = _vm?.status?.share?.ip or []
            _vmIp = _vmIpNow or (oxr?.status?.testVmIp or [])

            # The latch, set here and read by the render step on the NEXT
            # reconcile. Sticky by construction: once true it is never
            # recomputed from the (by then deleted) test VM.
            _testEnabled = _test?.enabled if "enabled" in _test else True
            _tested = (oxr?.status?.tested or False) or (True if _vmReady else False)

            _buildDone = _buildSucceeded == "True" and _templateName != ""

            # Phases for a build that has NOT produced a usable template.
            # A build that failed must not read as "Building" — nothing is
            # running, nothing will change, and a caller polling that column
            # waits forever for a state that cannot arrive.
            _buildFailed = _buildSucceeded == "False"
            # Succeeded but no template-name: the gate can never open (see the
            # load-bearing packer-build >=v0.3.0 floor in crossplane.yaml).
            # Distinct from BuildFailed because the build itself was fine —
            # what is missing is the result that carries the template out.
            _buildStalled = _buildSucceeded == "True" and _templateName == ""
            _phaseStalled = "BuildIncomplete" if _buildStalled else "Building"
            _phaseNotDone = "BuildFailed" if _buildFailed else _phaseStalled

            # Phases once a template exists. TestSkipped is deliberately gated
            # on _buildDone too: applied unconditionally it reports a build-only
            # XR as TestSkipped from the first reconcile, so a failed build in
            # that mode also read as a benign terminal state.
            _phaseTesting = "Tested" if _tested else "Testing"
            _phaseDone = _phaseTesting if _testEnabled else "TestSkipped"

            _phase = _phaseDone if _buildDone else _phaseNotDone

            _statusPatch = {
                phase = _phase
                buildSucceeded = _buildSucceeded
                tested = _tested
                if _templateName: templateName = _templateName
                if _pbStatus?.pipelineRunName: buildPipelineRunName = _pbStatus.pipelineRunName
                # Retained after teardown on purpose: once the test VM is gone
                # its IP is the only trace of what was actually verified.
                if _vmIp: testVmIp = _vmIp
            }

            _dxr = _params?.dxr or {}
            items = [_dxr | {status = (_dxr?.status or {}) | _statusPatch}]

    # -------------------------------------------------------------------------
    # Step 3: readiness falls out of the composed set without extra logic.
    #
    #   building  -> PackerBuild not ready            -> XR not ready
    #   testing   -> test VM composed, not yet ready  -> XR not ready
    #   tested    -> test VM no longer composed       -> XR ready
    #
    # So Ready means "built AND verified", which is the only reading that makes
    # a PackerRelease safe to promote from.
    # -------------------------------------------------------------------------
    - step: ready
      functionRef:
        name: function-auto-ready
