---
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: packerbuilds.resources.stuttgart-things.com
spec:
  group: resources.stuttgart-things.com
  defaultCompositeDeletePolicy: Foreground
  scope: Namespaced
  names:
    kind: PackerBuild
    plural: packerbuilds
    singular: packerbuild
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                # Pipeline Configuration
                pipelineRunName:
                  type: string
                  description: Name of the Tekton PipelineRun
                namespace:
                  type: string
                  description: |
                    Namespace where the pipeline will run. No XRD default and
                    not required on purpose so the EnvironmentConfig's
                    `namespace` is authoritative (an XRD default would mask it,
                    and a required field can't be satisfied by the
                    EnvironmentConfig — it is applied after admission);
                    precedence is explicit XR value > EnvironmentConfig > KCL
                    module default ("tekton-ci").

                # Pipeline DEFINITION location.
                # NOTE the two-repo split: these three point at the repo holding
                # build-packer-template.yaml (stage-time). They are DISTINCT
                # from gitRepoUrl/gitRevision below, which point at the repo
                # holding the .pkr.hcl templates. Conflating them is the most
                # common mistake when coming from `ansible-run`, which has only
                # one repo.
                pipelineRepoUrl:
                  type: string
                  description: |
                    Git repository holding the pipeline definition. No XRD
                    default on purpose so the EnvironmentConfig is
                    authoritative; precedence is explicit XR value >
                    EnvironmentConfig > KCL module default
                    ("https://github.com/stuttgart-things/stage-time.git").
                pipelineRevision:
                  type: string
                  description: |
                    Tag/branch of the pipeline definition repo. No XRD default
                    on purpose (EnvironmentConfig authoritative). The KCL
                    module defaults to a PINNED tag rather than "main" —
                    the git resolver fetches at render time, so an unpinned
                    value silently changes what runs when stage-time moves.
                pipelinePath:
                  type: string
                  description: |
                    Path to the pipeline YAML inside pipelineRepoUrl. No XRD
                    default on purpose (EnvironmentConfig authoritative); KCL
                    module default "pipelines/build-packer-template.yaml".

                # Template SOURCE repo (the .pkr.hcl files the pipeline clones)
                gitRepoUrl:
                  type: string
                  description: |
                    Git repository holding the packer templates. No XRD default
                    on purpose (EnvironmentConfig authoritative); KCL module
                    default "https://github.com/stuttgart-things/stuttgart-things.git".
                gitRevision:
                  type: string
                  description: Branch or revision of the template source repo
                  default: main
                gitBasicAuthSecretName:
                  type: string
                  description: |
                    Name of a Secret holding .gitconfig / .git-credentials,
                    mounted as the pipeline's `basicAuth` workspace. REQUIRED to
                    clone the default gitRepoUrl, which is private — an https://
                    remote cannot be authenticated by the sshCredentials
                    workspace. Empty leaves the workspace unbound. No XRD
                    default on purpose (EnvironmentConfig authoritative).

                caCertsConfigMapName:
                  type: string
                  description: |
                    Name of a ConfigMap holding PEM CA certificates
                    (*.crt / *.pem), mounted as the pipeline's optional
                    `caCerts` workspace. REQUIRED when Vault — or any endpoint
                    packer talks to — is behind a private CA, otherwise the run
                    fails with "x509: certificate signed by unknown authority".
                    The CA is downloadable unauthenticated from Vault itself at
                    /v1/pki/ca/pem. Empty leaves the workspace unbound. No XRD
                    default on purpose (EnvironmentConfig authoritative) — the
                    CA is a property of the environment, not of a build.

                # Build selection.
                # Either set gitWorkspaceSubdirectory explicitly, or set
                # osVersion + lab + provisioning and let it be composed as
                # packer/builds/<osVersion>-<lab>-<hypervisor>-<provisioning>.
                # Neither is XRD-required (lab comes from the EnvironmentConfig
                # in the common case), but a build with neither runs packer
                # against the repo root and will fail.
                gitWorkspaceSubdirectory:
                  type: string
                  description: |
                    Subdirectory of the template repo to run packer in. When
                    empty it is composed from osVersion/lab/hypervisor/
                    provisioning; when those are also empty, packer runs at the
                    repo root (almost certainly not what you want).
                osVersion:
                  type: string
                  description: OS segment of the build directory, e.g. "ubuntu24"
                lab:
                  type: string
                  description: |
                    Lab segment of the build directory, e.g. "labul". No XRD
                    default on purpose (EnvironmentConfig authoritative) — the
                    lab is a per-environment property, not a per-build one.
                hypervisor:
                  type: string
                  description: |
                    Hypervisor segment of the build directory. No XRD default on
                    purpose (EnvironmentConfig authoritative); KCL module
                    default "vsphere".
                  enum:
                    - vsphere
                    - proxmox
                    - qemu
                provisioning:
                  type: string
                  description: Provisioning segment of the build directory, e.g. "base-os"

                # Storage Configuration
                storageSize:
                  type: string
                  description: Size of the PipelineRun workspace PVC
                  default: "5Gi"
                storageAccessModes:
                  type: string
                  description: Storage access mode
                  default: ReadWriteOnce
                  enum:
                    - ReadWriteOnce
                    - ReadWriteMany
                    - ReadOnlyMany
                storageClass:
                  type: string
                  description: |
                    StorageClass for the workspace PVC. No XRD default on
                    purpose (EnvironmentConfig authoritative); KCL module
                    default "openebs-hostpath". Override on clusters whose
                    default SC differs (e.g. "local-path").

                # Packer run configuration
                packerAction:
                  type: string
                  description: Which packer subcommand the pipeline runs
                  default: build
                  enum:
                    - init
                    - validate
                    - build
                packerTemplate:
                  type: string
                  description: |
                    The .pkr.hcl file (or directory) to run. The default "."
                    means "the whole directory", which FAILS on build dirs that
                    contain more than one template — packer init reports
                    "Duplicate local definition". Several stuttgart-things build
                    dirs ship byte-identical duplicates, so naming a single file
                    explicitly is usually required.
                  default: "."
                packerOnly:
                  type: string
                  description: Restrict the build to specific sources (packer -only)
                packerForce:
                  type: string
                  description: Force a build even if artifacts exist
                  default: "false"
                  enum: ["true", "false"]
                packerRunInit:
                  type: string
                  description: Whether to run `packer init` before the action
                  default: "true"
                  enum: ["true", "false"]
                packerVars:
                  type: array
                  description: Packer variables as key=value strings
                  items:
                    type: string
                packerVarsFile:
                  type: string
                  description: Path to a packer var-file, relative to the build dir
                packerInitExtraArgs:
                  type: string
                  description: Extra args appended to `packer init`
                packerBuildExtraArgs:
                  type: string
                  description: Extra args appended to the packer action
                packerLog:
                  type: string
                  description: Value for PACKER_LOG ("1" enables verbose logging)
                packerWorkingImage:
                  type: string
                  description: |
                    Container image the packer steps run in. Intentionally has
                    NO XRD default: an XRD default is applied by the API server
                    BEFORE the Composition runs, so it would always look like an
                    explicit XR value and mask the EnvironmentConfig. Must
                    provide packer, xorriso, ansible-playbook and the hashi_vault
                    Python deps — see the Configuration README.

                # Credentials
                credentialsSecretName:
                  type: string
                  description: |
                    Secret consumed via envFrom by the packer steps, so EVERY
                    key becomes an environment variable — scope it tightly. No
                    XRD default on purpose (EnvironmentConfig authoritative);
                    KCL module default "packer-credentials".
                vaultSecretName:
                  type: string
                  description: |
                    Secret holding VAULT_ADDR and VAULT_TOKEN. VAULT_TOKEN is
                    REQUIRED when templates call packer's vault() function: it
                    builds a Vault client from VAULT_ADDR + VAULT_TOKEN directly
                    and never performs an AppRole login, so VAULT_ROLE_ID /
                    VAULT_SECRET_ID are injected but inert.
                  default: vault

                # Runtime
                userHome:
                  type: string
                  description: Absolute path to the user's home directory
                  default: /home/nonroot

                # Environment / shared defaults
                environmentConfig:
                  type: string
                  description: |
                    Selects the Crossplane EnvironmentConfig that provides
                    shared per-environment defaults. The Composition matches an
                    EnvironmentConfig carrying the config-scoped label
                    `packer-build.resources.stuttgart-things.com/environment=<value>`.
                    Supported `data` keys: namespace, storageClass,
                    pipelineRepoUrl, pipelineRevision, pipelinePath, gitRepoUrl,
                    gitBasicAuthSecretName, caCertsConfigMapName, lab,
                    hypervisor, packerWorkingImage, credentialsSecretName.
                    Any value set explicitly on this XR's spec overrides the
                    EnvironmentConfig. When no EnvironmentConfig matches, the XR
                    spec / built-in defaults are used.
                  default: default

                # Crossplane Configuration
                wrapInCrossplane:
                  type: boolean
                  description: Whether to wrap the PipelineRun in a Crossplane Object
                  default: true
                crossplaneObjectName:
                  type: string
                  description: Name of the Crossplane object
                crossplaneNamespace:
                  type: string
                  description: Namespace for the Crossplane object
                  default: default
                crossplaneProviderConfig:
                  type: string
                  description: |
                    Name of the provider-kubernetes ClusterProviderConfig the
                    Object targets. Defaults to "in-cluster" to match the
                    sibling `ansible-run` Configuration and the fleet's naming;
                    note the KCL module's own default differs
                    ("kubernetes-provider") and is masked by this.
                  default: in-cluster
                crossplaneTimeout:
                  type: string
                  description: |
                    uptest timeout annotation on the Object. Higher than
                    ansible-run's because image builds are slow — a real vSphere
                    base-OS build takes ~20 minutes.
                  default: "120"
                deriveReadiness:
                  type: boolean
                  description: |
                    When true, the PackerBuild becomes Ready only once the
                    rendered Tekton PipelineRun's "Succeeded" condition is True
                    (readiness derived from the live PipelineRun via
                    provider-kubernetes). When false, it is Ready as soon as the
                    wrapped Object is applied.
                  default: true

                # Target Cluster
                targetCluster:
                  type: object
                  description: Target cluster configuration
                  properties:
                    name:
                      type: string
                      description: Name of the ProviderConfig
                      default: in-cluster
                    scope:
                      type: string
                      description: Scope of the ProviderConfig (Namespaced or Cluster)
                      default: Namespaced
                      enum:
                        - Namespaced
                        - Cluster

              required:
                - pipelineRunName

            status:
              type: object
              properties:
                installed:
                  type: boolean
                  description: Whether the PackerBuild has been installed
                pipelineRunName:
                  type: string
                  description: Name of the rendered Tekton PipelineRun
                succeeded:
                  type: string
                  description: |
                    The PipelineRun's "Succeeded" condition status:
                    "True" (completed), "False" (failed) or "Unknown"
                    (running / not yet reported).
                reason:
                  type: string
                  description: |
                    Reason of the PipelineRun's Succeeded condition
                    (e.g. Running, Succeeded, Failed, Completed).
                message:
                  type: string
                  description: Human-readable message from the PipelineRun's Succeeded condition
                startTime:
                  type: string
                  description: When the PipelineRun started
                completionTime:
                  type: string
                  description: When the PipelineRun completed
                taskRuns:
                  type: array
                  description: The PipelineRun's child TaskRuns
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: Name of the TaskRun
                      pipelineTaskName:
                        type: string
                        description: The pipeline task this TaskRun runs
