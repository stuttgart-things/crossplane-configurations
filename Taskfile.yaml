---
version: '3'

tasks:
  render:
    desc: "Render a Configuration locally (interactive; non-interactive: CONFIG=k8s/<name> [XR=xr.yaml] task render)"
    silent: true
    cmds:
      - |
        set -euo pipefail

        # --- pick configuration (env: CONFIG=<path>, e.g. k8s/namespace) ---
        if [ -n "${CONFIG:-}" ]; then
          [ -f "$CONFIG/crossplane.yaml" ] || { gum style --foreground 1 "CONFIG=$CONFIG: missing $CONFIG/crossplane.yaml"; exit 1; }
        else
          CONFIGS=$(find . -type f -name crossplane.yaml -not -path './.git/*' \
            | sed -e 's|/crossplane.yaml$||' -e 's|^\./||' \
            | sort)
          [ -n "$CONFIGS" ] || { gum style --foreground 1 "no configurations found (no crossplane.yaml)"; exit 1; }
          CONFIG=$(echo "$CONFIGS" | gum choose --header "select configuration to render:")
          [ -n "$CONFIG" ] || { gum style --foreground 3 "no selection"; exit 1; }
        fi

        # --- pick XR (env: XR=<path|name>, resolved against cwd, $CONFIG/examples/, $CONFIG/) ---
        if [ -n "${XR:-}" ]; then
          if [ -f "$XR" ]; then :; \
          elif [ -f "$CONFIG/examples/$XR" ]; then XR="$CONFIG/examples/$XR"; \
          elif [ -f "$CONFIG/$XR" ]; then XR="$CONFIG/$XR"; \
          else gum style --foreground 1 "XR=$XR not found (cwd, $CONFIG/examples/, $CONFIG/)"; exit 1; fi
        else
          XRS=$(find "$CONFIG/examples" -maxdepth 1 -type f -name 'xr*.yaml' 2>/dev/null | sort)
          XR_COUNT=$(echo -n "$XRS" | grep -c '^' || true)
          if [ "$XR_COUNT" -eq 0 ]; then
            gum style --foreground 1 "no xr*.yaml found in $CONFIG/examples"
            exit 1
          elif [ "$XR_COUNT" -eq 1 ]; then
            XR="$XRS"
          else
            XR=$(echo "$XRS" | gum choose --header "select example XR:")
            [ -n "$XR" ] || { gum style --foreground 3 "no selection"; exit 1; }
          fi
        fi
        COMPOSITION="$CONFIG/apis/composition.yaml"
        FUNCTIONS="$CONFIG/examples/functions.yaml"

        for f in "$XR" "$COMPOSITION" "$FUNCTIONS"; do
          if [ ! -f "$f" ]; then
            gum style --foreground 1 "missing file: $f"
            exit 1
          fi
        done

        # --- extra-resources (env: EXTRA=<path>; default: $CONFIG/examples/environmentconfig.yaml) ---
        # Compositions with a load-environment step (function-environment-configs)
        # need their EnvironmentConfig(s) passed in, else the selector matches 0
        # and the render fails with "expected exactly one required resource, got 0".
        EXTRA="${EXTRA:-$CONFIG/examples/environmentconfig.yaml}"
        EXTRA_ARG=""
        if [ -f "$EXTRA" ]; then
          EXTRA_ARG="--extra-resources $EXTRA"
        elif [ -n "${EXTRA:-}" ] && [ "$EXTRA" != "$CONFIG/examples/environmentconfig.yaml" ]; then
          gum style --foreground 1 "EXTRA=$EXTRA not found"; exit 1
        fi

        gum style --foreground 4 "→ rendering $CONFIG"
        CMD="crossplane render $XR $COMPOSITION $FUNCTIONS --include-function-results $EXTRA_ARG"
        gum style --foreground 8 "\$ $CMD"
        eval "$CMD"

  check:
    desc: "Check a cluster against a Configuration's requirements (non-interactive: KUBECONFIG=... CONFIG=k8s/<name> task check)"
    silent: true
    cmds:
      - |
        set -euo pipefail

        # --- 1) pick kubeconfig (env: KUBECONFIG=<path>) ---
        if [ -n "${KUBECONFIG:-}" ]; then
          [ -f "$KUBECONFIG" ] || { gum style --foreground 1 "KUBECONFIG=$KUBECONFIG: file not found"; exit 1; }
        else
          KUBE_DIR="${KUBE_DIR:-$HOME/.kube}"
          KUBECONFIGS=$(find "$KUBE_DIR" -maxdepth 1 -type f -not -name 'cache*' 2>/dev/null | sort)
          [ -n "$KUBECONFIGS" ] || { gum style --foreground 1 "no kubeconfigs found in $KUBE_DIR"; exit 1; }
          KUBECONFIG=$(echo "$KUBECONFIGS" | gum choose --header "select kubeconfig:")
          [ -n "$KUBECONFIG" ] || { gum style --foreground 3 "no selection"; exit 1; }
        fi
        export KUBECONFIG

        # --- 2) pick configuration (env: CONFIG=<path>, e.g. k8s/namespace) ---
        if [ -n "${CONFIG:-}" ]; then
          [ -f "$CONFIG/crossplane.yaml" ] || { gum style --foreground 1 "CONFIG=$CONFIG: missing $CONFIG/crossplane.yaml"; exit 1; }
        else
          CONFIGS=$(find . -type f -name crossplane.yaml -not -path './.git/*' \
            | sed -e 's|/crossplane.yaml$||' -e 's|^\./||' \
            | sort)
          [ -n "$CONFIGS" ] || { gum style --foreground 1 "no configurations found"; exit 1; }
          CONFIG=$(echo "$CONFIGS" | gum choose --header "select configuration to check:")
          [ -n "$CONFIG" ] || { gum style --foreground 3 "no selection"; exit 1; }
        fi
        META="$CONFIG/crossplane.yaml"

        gum style --foreground 4 "→ checking $CONFIG against $(basename "$KUBECONFIG")"

        # --- 3) cluster reachable ---
        if ! kubectl version --request-timeout=5s >/dev/null 2>&1; then
          gum style --foreground 1 "✗ cluster not reachable via $KUBECONFIG"
          exit 1
        fi
        CTX=$(kubectl config current-context 2>/dev/null || echo unknown)
        gum style --foreground 2 "✓ cluster reachable  (context: $CTX)"

        # --- 4) crossplane core ---
        REQ_XP=$(yq -r '.spec.crossplane.version' "$META")
        if ! kubectl -n crossplane-system get deploy crossplane >/dev/null 2>&1; then
          gum style --foreground 1 "✗ crossplane not installed  (required $REQ_XP)"
          exit 1
        fi
        INST_XP=$(kubectl -n crossplane-system get deploy crossplane \
          -o jsonpath='{.spec.template.spec.containers[0].image}' | awk -F: '{print $NF}')
        gum style --foreground 2 "✓ crossplane           installed=$INST_XP  required=$REQ_XP"

        # --- 5) dependencies (providers + functions) ---
        FAIL=0
        check_dep() {
          local kind="$1"   # providers | functions
          local pkg="$2"
          local req_ver="$3"
          local row
          row=$(kubectl get "${kind}.pkg.crossplane.io" -o json | yq -r \
            ".items[] | select(.spec.package | test(\"^${pkg}:\")) |
             [.metadata.name,
              .spec.package,
              ([.status.conditions[]? | select(.type==\"Installed\") | .status] | join(\",\")),
              ([.status.conditions[]? | select(.type==\"Healthy\") | .status] | join(\",\"))]
             | @tsv" | head -n1)
          local label="${kind%s}"
          if [ -z "$row" ]; then
            gum style --foreground 1 "✗ $label missing       $pkg ($req_ver)"
            FAIL=$((FAIL+1))
            return
          fi
          local installed_pkg ins healthy inst_ver
          installed_pkg=$(echo "$row" | cut -f2)
          ins=$(echo "$row" | cut -f3)
          healthy=$(echo "$row" | cut -f4)
          inst_ver=${installed_pkg##*:}
          if [ "$ins" = "True" ] && [ "$healthy" = "True" ]; then
            gum style --foreground 2 "✓ $label $(printf '%-20s' "$(basename "$pkg")") installed=$inst_ver  required=$req_ver"
          else
            gum style --foreground 3 "! $label $(basename "$pkg")  installed=$inst_ver  Installed=$ins Healthy=$healthy"
            FAIL=$((FAIL+1))
          fi
        }

        while IFS=$'\t' read -r pkg ver; do
          [ -n "$pkg" ] && check_dep providers "$pkg" "$ver"
        done < <(yq -r '.spec.dependsOn[] | select(has("provider")) | [.provider, .version] | @tsv' "$META")

        while IFS=$'\t' read -r pkg ver; do
          [ -n "$pkg" ] && check_dep functions "$pkg" "$ver"
        done < <(yq -r '.spec.dependsOn[] | select(has("function")) | [.function, .version] | @tsv' "$META")

        echo
        if [ "$FAIL" -eq 0 ]; then
          gum style --foreground 2 --bold "✓ all requirements satisfied"
        else
          gum style --foreground 1 --bold "✗ $FAIL requirement(s) not satisfied"
          exit 1
        fi

  apply-dev:
    desc: "Apply a Configuration and/or example XR from local files (non-interactive: KUBECONFIG=... CONFIG=k8s/<name> WHAT=both [XR=xr.yaml] [FUNCTIONS=1] YES=1 task apply-dev). Functions are skipped unless FUNCTIONS=1 — applying them to a fleet cluster downgrades Functions and can freeze the package resolver."
    silent: true
    cmds:
      - |
        set -euo pipefail

        # Read the FUNCTIONS opt-in NOW: the variable is reused below as the
        # path to examples/functions.yaml, so testing it later reads the path.
        APPLY_FUNCTIONS=0
        case "${FUNCTIONS:-}" in 1|true) APPLY_FUNCTIONS=1 ;; esac

        # --- pick kubeconfig (env: KUBECONFIG=<path>) ---
        if [ -n "${KUBECONFIG:-}" ]; then
          [ -f "$KUBECONFIG" ] || { gum style --foreground 1 "KUBECONFIG=$KUBECONFIG: file not found"; exit 1; }
        else
          KUBE_DIR="${KUBE_DIR:-$HOME/.kube}"
          KUBECONFIGS=$(find "$KUBE_DIR" -maxdepth 1 -type f -not -name 'cache*' 2>/dev/null | sort)
          [ -n "$KUBECONFIGS" ] || { gum style --foreground 1 "no kubeconfigs in $KUBE_DIR"; exit 1; }
          KUBECONFIG=$(echo "$KUBECONFIGS" | gum choose --header "select kubeconfig:")
          [ -n "$KUBECONFIG" ] || { gum style --foreground 3 "no selection"; exit 1; }
        fi
        export KUBECONFIG

        # --- pick configuration (env: CONFIG=<path>, e.g. k8s/namespace) ---
        if [ -n "${CONFIG:-}" ]; then
          [ -f "$CONFIG/crossplane.yaml" ] || { gum style --foreground 1 "CONFIG=$CONFIG: missing $CONFIG/crossplane.yaml"; exit 1; }
        else
          CONFIGS=$(find . -type f -name crossplane.yaml -not -path './.git/*' \
            | sed -e 's|/crossplane.yaml$||' -e 's|^\./||' \
            | sort)
          [ -n "$CONFIGS" ] || { gum style --foreground 1 "no configurations"; exit 1; }
          CONFIG=$(echo "$CONFIGS" | gum choose --header "select configuration:")
          [ -n "$CONFIG" ] || { gum style --foreground 3 "no selection"; exit 1; }
        fi

        # --- pick what to apply (env: WHAT=configuration|xr|both) ---
        if [ -n "${WHAT:-}" ]; then
          case "$WHAT" in
            configuration|xr|both) ;;
            *) gum style --foreground 1 "WHAT=$WHAT not one of: configuration|xr|both"; exit 1 ;;
          esac
        else
          WHAT=$(printf "configuration\nxr\nboth" \
            | gum choose --header "what to apply? (configuration = XRD+Composition, xr = example XR only)")
          [ -n "$WHAT" ] || { gum style --foreground 3 "no selection"; exit 1; }
        fi

        FUNCTIONS="$CONFIG/examples/functions.yaml"
        DEFINITION="$CONFIG/apis/definition.yaml"
        COMPOSITION="$CONFIG/apis/composition.yaml"

        # --- if applying XR, pick which one (env: XR=<path|name>) ---
        if [ "$WHAT" = "xr" ] || [ "$WHAT" = "both" ]; then
          if [ -n "${XR:-}" ]; then
            if [ -f "$XR" ]; then :; \
            elif [ -f "$CONFIG/examples/$XR" ]; then XR="$CONFIG/examples/$XR"; \
            elif [ -f "$CONFIG/$XR" ]; then XR="$CONFIG/$XR"; \
            else gum style --foreground 1 "XR=$XR not found (cwd, $CONFIG/examples/, $CONFIG/)"; exit 1; fi
          else
            XRS=$(find "$CONFIG/examples" -maxdepth 1 -type f -name 'xr*.yaml' 2>/dev/null | sort)
            XR_COUNT=$(echo -n "$XRS" | grep -c '^' || true)
            if [ "$XR_COUNT" -eq 0 ]; then
              gum style --foreground 1 "no xr*.yaml in $CONFIG/examples"
              exit 1
            elif [ "$XR_COUNT" -eq 1 ]; then
              XR="$XRS"
            else
              XR=$(echo "$XRS" | gum choose --header "select example XR:")
              [ -n "$XR" ] || { gum style --foreground 3 "no selection"; exit 1; }
            fi
          fi
        else
          XR=""
        fi

        # --- validate files exist ---
        if [ "$WHAT" = "configuration" ] || [ "$WHAT" = "both" ]; then
          FILES="$DEFINITION $COMPOSITION"
          [ "$APPLY_FUNCTIONS" = "1" ] && FILES="$FUNCTIONS $FILES"
          for f in $FILES; do
            [ -f "$f" ] || { gum style --foreground 1 "missing file: $f"; exit 1; }
          done
        fi

        # --- plan + confirm ---
        CTX=$(kubectl config current-context 2>/dev/null || echo unknown)
        gum style --foreground 4 "→ dev-apply $CONFIG  (mode: $WHAT)"
        echo "  context:    $CTX"
        echo "  kubeconfig: $(basename "$KUBECONFIG")"
        echo
        echo "  manifests:"
        if [ "$WHAT" = "configuration" ] || [ "$WHAT" = "both" ]; then
          [ "$APPLY_FUNCTIONS" = "1" ] && echo "    - $FUNCTIONS  (FUNCTIONS=1)"
          echo "    - $DEFINITION"
          echo "    - $COMPOSITION"
          [ "$APPLY_FUNCTIONS" = "1" ] || echo "    (skipping $FUNCTIONS — pass FUNCTIONS=1 for a bare dev cluster)"
        fi
        [ -n "$XR" ] && echo "    - $XR"
        echo
        if [ "${YES:-}" = "1" ] || [ "${YES:-}" = "true" ]; then
          gum style --foreground 8 "  (YES=$YES — skipping confirmation)"
        else
          gum confirm "apply to '$CTX'?" || { gum style --foreground 3 "aborted"; exit 1; }
        fi

        # --- apply configuration ---
        if [ "$WHAT" = "configuration" ] || [ "$WHAT" = "both" ]; then
          # Applying examples/functions.yaml to a cluster that already has
          # Functions is destructive TWICE OVER, so it is opt-in:
          #
          #  1. The pins here drift behind the fleet, so kubectl apply silently
          #     DOWNGRADES a Function (e.g. environment-configs v0.7.2 -> v0.7.0).
          #  2. Repointing a short-named CR at a registry that a dependsOn-derived
          #     long-named CR already uses collides in the package Lock graph and
          #     freezes dependency resolution for EVERY package on the cluster.
          #     (The upbound pins in examples/functions.yaml exist to prevent
          #     exactly this — see the header comment in any of those files.)
          #
          # Fleet clusters install Functions via Argo CD and need neither. Pass
          # FUNCTIONS=1 only when bootstrapping a bare dev cluster.
          if [ "$APPLY_FUNCTIONS" = "1" ]; then
            gum style --foreground 4 "→ apply functions (FUNCTIONS=1)"
            kubectl apply -f "$FUNCTIONS"
            kubectl wait --for=condition=Healthy --timeout=120s -f "$FUNCTIONS"
          else
            gum style --foreground 8 "→ skipping functions (pass FUNCTIONS=1 for a bare dev cluster)"
          fi

          gum style --foreground 4 "→ apply XRD"
          kubectl apply -f "$DEFINITION"
          XRD_NAME=$(yq -r '.metadata.name' "$DEFINITION")
          kubectl wait --for=condition=Established --timeout=60s "xrd.apiextensions.crossplane.io/$XRD_NAME"

          gum style --foreground 4 "→ apply Composition"
          kubectl apply -f "$COMPOSITION"
        fi

        # --- apply XR ---
        if [ -n "$XR" ]; then
          XR_NS=$(yq -r '.metadata.namespace // "default"' "$XR")
          if ! kubectl get ns "$XR_NS" >/dev/null 2>&1; then
            gum style --foreground 4 "→ create namespace $XR_NS"
            kubectl create namespace "$XR_NS"
          fi
          gum style --foreground 4 "→ apply XR ($(basename "$XR"))"
          kubectl apply -f "$XR"
        fi

        # --- status ---
        echo
        gum style --foreground 2 --bold "✓ done"
        echo
        if [ "$WHAT" = "configuration" ] || [ "$WHAT" = "both" ]; then
          echo "Functions:"
          kubectl get functions.pkg.crossplane.io
          echo
          echo "XRD:"
          kubectl get xrd "$XRD_NAME"
          echo
          echo "Composition:"
          kubectl get composition "$(yq -r '.metadata.name' "$COMPOSITION")"
          echo
        fi
        if [ -n "$XR" ]; then
          XR_KIND=$(yq -r '.kind' "$XR")
          XR_NAME=$(yq -r '.metadata.name' "$XR")
          XR_NS=$(yq -r '.metadata.namespace // "default"' "$XR")
          TRACE_WAIT="${TRACE_WAIT:-5}"
          gum spin --title "waiting ${TRACE_WAIT}s for reconciliation..." --spinner dot -- sleep "$TRACE_WAIT"
          echo
          echo "Trace:"
          crossplane beta trace "$XR_KIND" "$XR_NAME" -n "$XR_NS" || true
        fi

  pre-commit:
    desc: Run pre-commit hooks across the repo (via the Dagger linting module)
    silent: true
    cmds:
      - |
        set -euo pipefail

        DAGGER_MOD_LINTING="${DAGGER_MOD_LINTING:-github.com/stuttgart-things/dagger/linting@v0.115.0}"
        OUT="${OUT:-/tmp/pre-commit-findings.txt}"

        gum style --foreground 4 "→ pre-commit (dagger)"
        echo "  dagger mod:  $DAGGER_MOD_LINTING"
        echo "  output:      $OUT"
        echo

        dagger --progress plain call -m "$DAGGER_MOD_LINTING" run-pre-commit \
          --src . \
          export --path "$OUT"

        echo
        gum style --foreground 8 "── findings ────────────────────────────────────"
        cat "$OUT"
        gum style --foreground 8 "────────────────────────────────────────────────"
        echo

        # The dagger function captures all output with `|| true` and always
        # exits 0, so we have to read the text to decide pass/fail.
        # pre-commit prints `<hook>...Failed` per failing hook.
        if grep -qE '\.\.\.+Failed$' "$OUT"; then
          gum style --foreground 1 --bold "✗ pre-commit hooks failed"
          exit 1
        fi
        gum style --foreground 2 --bold "✓ pre-commit passed"

  verify:
    desc: "Verify a Configuration package + each example XR via Dagger (non-interactive: CONFIG=k8s/<name> task verify)"
    silent: true
    cmds:
      - |
        set -euo pipefail

        # --- pick configuration (env: CONFIG=<path>, e.g. k8s/namespace) ---
        if [ -n "${CONFIG:-}" ]; then
          [ -f "$CONFIG/crossplane.yaml" ] || { gum style --foreground 1 "CONFIG=$CONFIG: missing $CONFIG/crossplane.yaml"; exit 1; }
        else
          CONFIGS=$(find . -type f -name crossplane.yaml -not -path './.git/*' \
            | sed -e 's|/crossplane.yaml$||' -e 's|^\./||' \
            | sort)
          [ -n "$CONFIGS" ] || { gum style --foreground 1 "no configurations"; exit 1; }
          CONFIG=$(echo "$CONFIGS" | gum choose --header "select configuration to verify:")
          [ -n "$CONFIG" ] || { gum style --foreground 3 "no selection"; exit 1; }
        fi

        META="$CONFIG/crossplane.yaml"

        # --- sniff provider-kubernetes floor from dependsOn ---
        # Layer 2 of `verify` validates rendered Object resources against the
        # provider-kubernetes CRD schemas at this version. Falls back to the
        # module's own default if the Configuration doesn't pin one.
        PROV_VER=$(yq -r '
          .spec.dependsOn[]
          | select(.provider == "xpkg.crossplane.io/crossplane-contrib/provider-kubernetes")
          | .version
          | capture("(?P<v>v[0-9]+\\.[0-9]+\\.[0-9]+)").v
        ' "$META" 2>/dev/null | head -n1)
        [ -z "$PROV_VER" ] && PROV_VER="v1.2.0"

        DAGGER_MOD="${DAGGER_MOD:-github.com/stuttgart-things/dagger/crossplane@v0.115.0}"

        gum style --foreground 4 "→ verify $CONFIG"
        echo "  provider-kubernetes: $PROV_VER"
        echo "  dagger mod:          $DAGGER_MOD"
        echo

        dagger call -m "$DAGGER_MOD" verify \
          --src "$CONFIG" \
          --provider-kubernetes-version "$PROV_VER" \
          --progress plain

  push:
    desc: "Build and push a Configuration to an OCI registry via Dagger (non-interactive: CONFIG=k8s/<name> BUMP=patch|minor|major|vX.Y.Z YES=1 task push)"
    silent: true
    cmds:
      - |
        set -euo pipefail

        # --- pick configuration (env: CONFIG=<path>, e.g. k8s/namespace) ---
        if [ -n "${CONFIG:-}" ]; then
          [ -f "$CONFIG/crossplane.yaml" ] || { gum style --foreground 1 "CONFIG=$CONFIG: missing $CONFIG/crossplane.yaml"; exit 1; }
        else
          CONFIGS=$(find . -type f -name crossplane.yaml -not -path './.git/*' \
            | sed -e 's|/crossplane.yaml$||' -e 's|^\./||' \
            | sort)
          [ -n "$CONFIGS" ] || { gum style --foreground 1 "no configurations"; exit 1; }
          CONFIG=$(echo "$CONFIGS" | gum choose --header "select configuration to push:")
          [ -n "$CONFIG" ] || { gum style --foreground 3 "no selection"; exit 1; }
        fi

        META="$CONFIG/crossplane.yaml"
        PKG_NAME=$(yq -r '.metadata.name' "$META")
        CURRENT=$(yq -r '.metadata.annotations."meta.crossplane.io/version" // "v0.0.0"' "$META")

        # --- compute bump candidates ---
        NUM=${CURRENT#v}
        MAJ=$(echo "$NUM" | cut -d. -f1)
        MIN=$(echo "$NUM" | cut -d. -f2)
        PAT=$(echo "$NUM" | cut -d. -f3)
        V_PATCH="v$MAJ.$MIN.$((PAT+1))"
        V_MINOR="v$MAJ.$((MIN+1)).0"
        V_MAJOR="v$((MAJ+1)).0.0"

        # --- pick bump (env: BUMP=patch|minor|major|custom|vX.Y.Z; for custom, VERSION=vX.Y.Z) ---
        if [ -n "${BUMP:-}" ]; then
          case "$BUMP" in
            patch)   NEW="$V_PATCH" ;;
            minor)   NEW="$V_MINOR" ;;
            major)   NEW="$V_MAJOR" ;;
            custom)  [ -n "${VERSION:-}" ] || { gum style --foreground 1 "BUMP=custom requires VERSION=vX.Y.Z"; exit 1; }
                     NEW="$VERSION" ;;
            v[0-9]*) NEW="$BUMP" ;;
            *) gum style --foreground 1 "BUMP=$BUMP not one of: patch|minor|major|custom|vX.Y.Z"; exit 1 ;;
          esac
        else
          BUMP=$(printf "patch  →  %s\nminor  →  %s\nmajor  →  %s\ncustom" \
            "$V_PATCH" "$V_MINOR" "$V_MAJOR" \
            | gum choose --header "current: $CURRENT — bump:")
          [ -n "$BUMP" ] || { gum style --foreground 3 "no selection"; exit 1; }
          case "$BUMP" in
            patch*)  NEW="$V_PATCH" ;;
            minor*)  NEW="$V_MINOR" ;;
            major*)  NEW="$V_MAJOR" ;;
            custom)  NEW=$(gum input --header "version (with leading v):" --value "$V_PATCH")
                     [ -n "$NEW" ] || { gum style --foreground 3 "no version"; exit 1; } ;;
          esac
        fi

        # --- auth ---
        REGISTRY="${REGISTRY:-ghcr.io}"
        USERNAME="${USERNAME:-stuttgart-things}"
        PASSWORD_ENV="${PASSWORD_ENV:-GITHUB_TOKEN}"
        if [ -z "${!PASSWORD_ENV:-}" ]; then
          if [ "${YES:-}" = "1" ] || [ "${YES:-}" = "true" ]; then
            gum style --foreground 1 "\$$PASSWORD_ENV is not set (YES=$YES — refusing to prompt)"
            exit 1
          fi
          gum style --foreground 3 "\$$PASSWORD_ENV is not set — prompting"
          TOKEN=$(gum input --password --header "enter $PASSWORD_ENV:")
          [ -n "$TOKEN" ] || { gum style --foreground 1 "no token entered"; exit 1; }
          export "$PASSWORD_ENV=$TOKEN"
        fi

        PREFIX="${PREFIX-crossplane-configurations}"
        if [ -n "$PREFIX" ]; then
          DESTINATION="$REGISTRY/$USERNAME/$PREFIX/$PKG_NAME:$NEW"
        else
          DESTINATION="$REGISTRY/$USERNAME/$PKG_NAME:$NEW"
        fi
        DAGGER_MOD="${DAGGER_MOD:-github.com/stuttgart-things/dagger/crossplane}"

        # --- plan + confirm ---
        gum style --foreground 4 "→ push $CONFIG"
        echo "  package:     $PKG_NAME"
        echo "  current:     $CURRENT"
        echo "  new:         $NEW"
        echo "  destination: $DESTINATION"
        echo "  registry:    $REGISTRY"
        echo "  username:    $USERNAME"
        echo "  password:    \$$PASSWORD_ENV (set)"
        echo "  dagger mod:  $DAGGER_MOD"
        echo
        if [ "${YES:-}" = "1" ] || [ "${YES:-}" = "true" ]; then
          gum style --foreground 8 "  (YES=$YES — skipping confirmation)"
        else
          gum confirm "push?" || { gum style --foreground 3 "aborted"; exit 1; }
        fi

        # --- redaction ---
        # `--progress plain` echoes every DAG op's ARGUMENTS, and the crossplane
        # module writes the registry credential into /root/.docker/config.json
        # with withNewFile — so base64("<user>:<token>") lands in the progress
        # log verbatim. That leaked a live PAT into two session transcripts.
        #
        # We keep plain progress (it is what makes a failing push debuggable —
        # see the stale SSH_AUTH_SOCK hunt) and scrub the value instead.
        #
        # Value-based rules come FIRST and matter most: the secret is known at
        # runtime, so redacting the literal and its base64 forms catches any leak
        # path regardless of how dagger or the module happens to format it. The
        # pattern rules after them are a fallback for shapes we did not predict.
        #
        # Built with printf into a newline-separated sed script — no bash arrays
        # (task runs mvdan/sh) and no literal newline in this block scalar.
        sed_esc() { printf '%s' "$1" | sed -e 's/[][\.*^$/&]/\\&/g'; }
        add_rule() { REDACT=$(printf '%s\n%s' "$REDACT" "$1"); }

        SECRET="${!PASSWORD_ENV:-}"
        REDACT=""
        if [ -n "$SECRET" ]; then
          # The literal token, and the two base64 encodings a docker config or an
          # Authorization header would carry. An empty pattern would make sed
          # reuse the PREVIOUS regex, hence the non-empty guards throughout.
          add_rule "s/$(sed_esc "$SECRET")/<redacted>/g"
          B64_PAIR=$(printf '%s:%s' "$USERNAME" "$SECRET" | base64 -w0 2>/dev/null || true)
          if [ -n "$B64_PAIR" ]; then add_rule "s/$(sed_esc "$B64_PAIR")/<redacted>/g"; fi
          B64_TOK=$(printf '%s' "$SECRET" | base64 -w0 2>/dev/null || true)
          if [ -n "$B64_TOK" ]; then add_rule "s/$(sed_esc "$B64_TOK")/<redacted>/g"; fi
        fi
        # Fallbacks: docker-config auth fields (escaped and unescaped) and bare
        # GitHub token shapes, in case a secret we did NOT pass shows up.
        add_rule 's/(\\"auth\\"[[:space:]]*:[[:space:]]*\\")[^\\]*/\1<redacted>/g'
        add_rule 's/("auth"[[:space:]]*:[[:space:]]*")[^"]*/\1<redacted>/g'
        add_rule 's/gh[pousr]_[A-Za-z0-9]{20,}/<redacted>/g'
        add_rule 's/github_pat_[A-Za-z0-9_]{20,}/<redacted>/g'

        # --- push ---
        # 2>&1 so stderr is scrubbed too. `set -o pipefail` (top of this script)
        # is what preserves dagger's exit code through the pipe — without it a
        # failed push would report success.
        dagger call -m "$DAGGER_MOD" push \
          --src "$CONFIG" \
          --registry "$REGISTRY" \
          --username "$USERNAME" \
          --password "env:$PASSWORD_ENV" \
          --destination "$DESTINATION" \
          --progress plain 2>&1 | sed -E "$REDACT"

        # --- bump annotation in crossplane.yaml ---
        yq -i ".metadata.annotations.\"meta.crossplane.io/version\" = \"$NEW\"" "$META"
        gum style --foreground 2 --bold "✓ pushed $DESTINATION"
        gum style --foreground 8 "  updated $META → meta.crossplane.io/version: $NEW  (don't forget to commit)"

        # --- ghcr visibility check ---
        # New ghcr.io packages default to private. Crossplane pulls anonymously
        # and will hit "UNAUTHORIZED: authentication required" on install until
        # the package visibility is flipped to Public. There is no REST API
        # endpoint to change container-package visibility for org packages —
        # only the web UI — so the best we can do here is detect and remind.
        if [ "$REGISTRY" = "ghcr.io" ] && command -v gh >/dev/null 2>&1; then
          PKG_PATH="$(printf '%s' "${PREFIX:-}" | sed 's|/|%2F|g')$([ -n "${PREFIX:-}" ] && printf '%%2F')$PKG_NAME"
          VIS=$(gh api "/orgs/$USERNAME/packages/container/$PKG_PATH" --jq '.visibility' 2>/dev/null || echo "")
          OWNER_KIND=orgs
          if [ -z "$VIS" ]; then
            VIS=$(gh api "/users/$USERNAME/packages/container/$PKG_PATH" --jq '.visibility' 2>/dev/null || echo "")
            OWNER_KIND=users
          fi
          SETTINGS_URL="https://github.com/$OWNER_KIND/$USERNAME/packages/container/$PKG_PATH/settings"
          echo
          case "$VIS" in
            public)
              gum style --foreground 2 "✓ ghcr visibility: public — Crossplane can pull anonymously"
              ;;
            private)
              gum style --foreground 3 --bold "⚠ ghcr visibility: PRIVATE — Crossplane will fail to install this package"
              gum style --foreground 8 "  Flip to Public (UI-only):"
              gum style --foreground 4 "    $SETTINGS_URL"
              gum style --foreground 8 "  → Danger Zone → Change visibility → Public → type the package name to confirm"
              ;;
            *)
              gum style --foreground 3 "ℹ ghcr visibility: unknown (gh api 404 / unauthenticated)"
              gum style --foreground 8 "  Check at $SETTINGS_URL"
              ;;
          esac
        fi

  push-dev:
    desc: "Build and push a Configuration to ttl.sh for dev iteration (non-interactive: CONFIG=k8s/<name> [TTL=1h] [TTL_PREFIX=...] task push-dev)"
    silent: true
    cmds:
      - |
        set -euo pipefail

        # ttl.sh accepts anonymous pushes and serves the image publicly for a
        # bounded TTL (the tag IS the TTL — `:1h`, `:24h`, etc.). Use it for
        # try-it-on-a-cluster dev iteration; use `task push` for canonical
        # ghcr.io releases. No version bump, no annotation write, no visibility
        # check — every push is throw-away.

        # --- pick configuration (env: CONFIG=<path>, e.g. k8s/namespace) ---
        if [ -n "${CONFIG:-}" ]; then
          [ -f "$CONFIG/crossplane.yaml" ] || { gum style --foreground 1 "CONFIG=$CONFIG: missing $CONFIG/crossplane.yaml"; exit 1; }
        else
          CONFIGS=$(find . -type f -name crossplane.yaml -not -path './.git/*' \
            | sed -e 's|/crossplane.yaml$||' -e 's|^\./||' \
            | sort)
          [ -n "$CONFIGS" ] || { gum style --foreground 1 "no configurations"; exit 1; }
          CONFIG=$(echo "$CONFIGS" | gum choose --header "select configuration to dev-push:")
          [ -n "$CONFIG" ] || { gum style --foreground 3 "no selection"; exit 1; }
        fi

        META="$CONFIG/crossplane.yaml"
        PKG_NAME=$(yq -r '.metadata.name' "$META")

        # --- destination (env: TTL=1h|24h|…, TTL_PREFIX=<user>/<scope>) ---
        TTL="${TTL:-1h}"
        TTL_PREFIX="${TTL_PREFIX:-$(whoami)/crossplane-configurations}"
        DESTINATION="ttl.sh/$TTL_PREFIX/$PKG_NAME:$TTL"

        DAGGER_MOD="${DAGGER_MOD:-github.com/stuttgart-things/dagger/crossplane}"

        gum style --foreground 4 "→ push-dev $CONFIG"
        echo "  package:     $PKG_NAME"
        echo "  destination: $DESTINATION"
        echo "  TTL:         $TTL  (image auto-deleted after this duration)"
        echo "  dagger mod:  $DAGGER_MOD"
        echo

        # --- push via dagger crossplane module ---
        # ttl.sh accepts anonymous, but the dagger Push function expects a
        # *Secret password — pass a harmless env reference; the resulting
        # docker-config blob is ignored by ttl.sh.
        #
        # No output redaction here, unlike `push`: the only credential in play is
        # the literal string "anonymous", so there is nothing for
        # `--progress plain` to leak.
        TTLSH_DUMMY_PASS=anonymous
        export TTLSH_DUMMY_PASS

        dagger call -m "$DAGGER_MOD" push \
          --src "$CONFIG" \
          --registry "ttl.sh" \
          --username "anonymous" \
          --password "env:TTLSH_DUMMY_PASS" \
          --destination "$DESTINATION" \
          --progress plain

        echo
        gum style --foreground 2 --bold "✓ pushed $DESTINATION"
        echo
        gum style --foreground 4 "Install on a test cluster:"
        cat <<EOF
        kubectl apply -f - <<MANIFEST
        ---
        apiVersion: pkg.crossplane.io/v1
        kind: Configuration
        metadata:
          name: $PKG_NAME-dev
        spec:
          package: $DESTINATION
        MANIFEST
        EOF
        echo
        gum style --foreground 8 "  (the Configuration name suffix '-dev' avoids clashing with a canonical $PKG_NAME install)"
