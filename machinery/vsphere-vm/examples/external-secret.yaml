---
# OPTIONAL cluster precondition: materialize the `vsphere-tfvars` Secret from
# Vault via External Secrets Operator (ESO), instead of `kubectl create secret`.
#
# This is environment-specific glue, NOT part of the Crossplane package — it
# documents the path used on the stuttgart-things LabUL cluster. Adjust the
# Vault address, KV mount/path, auth role and CA bundle for your environment.
#
# Vault layout assumed here:
#   - KV v2 engine mounted at `cicd-vsphere-labul`
#   - secret at path `default` with keys: vsphere_user, vsphere_password,
#     vm_ssh_user, vm_ssh_password, vsphere_server
#   - Kubernetes auth backend mounted at `kubernetes` with a role (here `eso`)
#     bound to the ESO ServiceAccount and granting a policy that can read the
#     KV path, e.g.:
#       path "cicd-vsphere-labul/data/*" { capabilities = ["read"] }
#     and the role:
#       vault write auth/kubernetes/role/eso \
#         bound_service_account_names=eso \
#         bound_service_account_namespaces=external-secrets \
#         policies=read-cicd ttl=1h
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-cicd-vsphere-labul
spec:
  provider:
    vault:
      server: https://vault.infra.sthings-vsphere.labul.sva.de
      path: cicd-vsphere-labul
      version: v2
      # Vault's listener cert is signed by its own PKI, so ESO needs that CA.
      # Fetch it with:  curl -sk "$VAULT_ADDR/v1/pki/ca/pem" | base64 -w0
      # and paste the base64 PEM here (single line).
      caBundle: <BASE64_PEM_FROM_VAULT_PKI_CA>
      auth:
        kubernetes:
          mountPath: kubernetes
          role: eso
          serviceAccountRef:
            name: eso
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vsphere-tfvars
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-cicd-vsphere-labul
  target:
    name: vsphere-tfvars
    creationPolicy: Owner
    # Render the Vault keys into the terraform.tfvars file the Workspace reads.
    template:
      engineVersion: v2
      data:
        terraform.tfvars: |
          vsphere_user = "{{ .vsphere_user }}"
          vsphere_password = "{{ .vsphere_password }}"
          vm_ssh_user = "{{ .vm_ssh_user }}"
          vm_ssh_password = "{{ .vm_ssh_password }}"
          vsphere_server = "{{ .vsphere_server }}"
  dataFrom:
    - extract:
        key: default
