---
# Shared per-environment infrastructure defaults for VsphereVM XRs.
#
# The `vsphere-vm` Composition selects this EnvironmentConfig via the
# config-scoped label `vsphere-vm.resources.stuttgart-things.com/environment`,
# matched against the XR's `spec.environmentConfig` (default "default"). The
# key is namespaced to this Configuration so it never collides with another
# Configuration's EnvironmentConfig (function-environment-configs requires
# exactly one Selector match). The `data` values are loaded
# into the pipeline environment and used by `function-patch-and-transform`
# as defaults for the OpenTofu Workspace vars. Anything set explicitly on the
# XR spec wins over the values here.
#
# Values below describe the LabUL vSphere environment.
apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: vsphere-vm-defaults
  labels:
    vsphere-vm.resources.stuttgart-things.com/environment: default
data:
  # vSphere placement (LabUL). Verified end to end on 2026-07-21: these exact
  # values provision a VM from sthings-u26 on Cluster-V6.7.
  #
  # `template` must name a template that actually exists in the datacenter --
  # check with `govc find /LabUL -type m -name 'sthings-*'` before trusting it.
  # This example named sthings-u25, which is not in
  # /LabUL/vm/stuttgart-things/vm-templates (only sthings-u24 and sthings-u26
  # are). A template that is missing -- or that this vCenter account cannot see
  # -- surfaces as
  #   error fetching virtual machine: vm '<name>' not found
  # looping forever in the Workspace's observe, with no VM ever created.
  folderPath: stuttgart-things/testing
  datacenter: /LabUL
  datastore: /LabUL/datastore/UL-ESX-SAS-02
  resourcePool: /LabUL/host/Cluster-V6.7/Resources
  network: /LabUL/network/LAB-10.31.102
  template: sthings-u26

  # VM metadata / TLS
  annotation: VSPHERE-VM BUILD w/ CROSSPLANE FOR STUTTGART-THINGS
  unverifiedSsl: "true"

  # tfvars Secret (pre-created in the XR's namespace; holds vSphere creds)
  tfvarsSecretName: vsphere-tfvars # pragma: allowlist secret
  tfvarsSecretKey: terraform.tfvars # pragma: allowlist secret

  # OpenTofu provider config the Workspace runs through. "default" matches
  # examples/cluster-provider-config.yaml, but this is a per-CLUSTER name, not
  # a per-lab one -- clusters that named theirs differently (e.g. in-cluster)
  # must override it here, or every Workspace fails to find its config. Check
  # with `kubectl get clusterproviderconfigs.opentofu.m.upbound.io`.
  # Note this is the OPENTOFU provider config; the `in-cluster` seen in
  # ansible-run/harvester-vm examples is the provider-KUBERNETES one.
  providerConfigName: default
  providerConfigKind: ClusterProviderConfig
