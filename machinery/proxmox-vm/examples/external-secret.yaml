---
# OPTIONAL cluster precondition: materialize the `proxmox-tfvars` Secret from
# Vault via External Secrets Operator (ESO), instead of `kubectl create secret`.
#
# This is environment-specific glue, NOT part of the Crossplane package — it
# documents the path used on the stuttgart-things LabUL cluster. Adjust the
# Vault address, KV mount/path, auth role and CA bundle for your environment.
#
# Vault layout assumed here:
#   - KV v2 engine mounted at `cicd-proxmox-labul`
#   - secret at path `default` with keys: pve_api_url, pve_api_user,
#     pve_api_password, vm_ssh_user, vm_ssh_password
#   - Kubernetes auth backend mounted at `<cluster>-eso` (the stuttgart-things
#     bootstrap names it `<cluster_name>-<authname>`, e.g. `cicd-crossplane-eso`
#     — NOT the default `kubernetes`) with a role (here `eso`) bound to the ESO
#     ServiceAccount and granting a policy that can read the KV path, e.g.:
#       path "cicd-proxmox-labul/data/*" { capabilities = ["read"] }
#     The role/policy are provisioned by the bootstrap workflow
#     (`createVaultK8sAuth` + `k8sAuthTokenPolicies: read-cicd,...`), not by hand.
#
# On the stuttgart-things fleet this CSS is GitOps-managed via the catalog chart
# `infra/external-secrets/cluster-secret-store-vault` (Argo Application under
# `argocd/clusters/<cluster>/external-secrets/`); this file documents the shape.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-cicd-proxmox-labul
spec:
  provider:
    vault:
      server: https://vault.infra.sthings-vsphere.labul.sva.de
      path: cicd-proxmox-labul
      version: v2
      # Vault's listener cert is signed by its own PKI. Either reference the
      # cert-manager CA Secret (preferred — already on cluster)…
      caProvider:
        type: Secret
        name: vault-pki-ca
        namespace: cert-manager
        key: ca.crt
      # …or inline it:  caBundle: <base64 of `curl -sk "$VAULT_ADDR/v1/pki/ca/pem"`>
      auth:
        kubernetes:
          mountPath: cicd-crossplane-eso   # <cluster>-<authname>, not "kubernetes"
          role: eso
          serviceAccountRef:
            name: eso
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: proxmox-tfvars
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-cicd-proxmox-labul
  target:
    name: proxmox-tfvars
    creationPolicy: Owner
    # Render the Vault keys into the terraform.tfvars file the Workspace reads.
    template:
      engineVersion: v2
      data:
        terraform.tfvars: |
          pve_api_url = "{{ .pve_api_url }}"
          pve_api_user = "{{ .pve_api_user }}"
          pve_api_password = "{{ .pve_api_password }}"
          vm_ssh_user = "{{ .vm_ssh_user }}"
          vm_ssh_password = "{{ .vm_ssh_password }}"
  dataFrom:
    - extract:
        key: default
