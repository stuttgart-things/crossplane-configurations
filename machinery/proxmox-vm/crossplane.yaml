---
apiVersion: meta.pkg.crossplane.io/v1
kind: Configuration
metadata:
  name: proxmox-vm
  annotations:
    # Local convention used by `task push` to bump and re-publish.
    # Not a Crossplane-standard field — the true package version is the OCI tag.
    meta.crossplane.io/version: v0.1.0
    meta.crossplane.io/maintainer: patrick.hermann@sva.de
    meta.crossplane.io/source: github.com/stuttgart-things/crossplane-configurations
    meta.crossplane.io/license: Apache-2.0
    meta.crossplane.io/description: |
      Provisions a Proxmox VE virtual machine from a namespaced
      `ProxmoxVM` XR. The VM is created by an OpenTofu `Workspace`
      (provider-opentofu) that runs the `github.com/stuttgart-things/proxmox-vm`
      Terraform module. Shared per-environment infrastructure defaults
      (node, datastore, network, folder, template, tfvars Secret,
      ClusterProviderConfig) are loaded from a Crossplane `EnvironmentConfig`.
    meta.crossplane.io/readme: |
      # proxmox-vm

      A Crossplane v2 Configuration that provisions a Proxmox VE virtual
      machine from a namespaced `ProxmoxVM` XR (group
      `resources.stuttgart-things.com`).

      The Composition pipeline:

      - `function-environment-configs` loads shared per-environment
        infrastructure defaults from the `EnvironmentConfig` selected by
        the XR's `spec.environmentConfig` (config-scoped label
        `proxmox-vm.resources.stuttgart-things.com/environment`) into the
        pipeline environment.
      - `function-patch-and-transform` renders an OpenTofu `Workspace`
        (`opentofu.m.upbound.io/v1beta1`) that runs the
        `github.com/stuttgart-things/proxmox-vm` Terraform module. Per-VM
        fields (name, cpu, ram, disk, …) come from the XR spec; shared
        infra fields (node, datastore, network, folder, template, tfvars
        Secret, provider config) default from the EnvironmentConfig and
        are overridable per XR.

      The VM's IP is surfaced on `status.share.ip`.

      ## Preconditions

      On the target cluster:

      - A `ClusterProviderConfig` for `provider-opentofu` (default name
        `default`) wiring the Terraform Kubernetes backend.
      - A tfvars `Secret` (default `proxmox-tfvars`) in the XR's namespace
        holding the Proxmox credentials.
      - RBAC permitting the `provider-opentofu` ServiceAccount to read the
        tfvars Secret.

      See the per-Configuration README for ready-to-apply manifests.
spec:
  crossplane:
    version: ">=v2.1.3"
  dependsOn:
    # Proxmox VM provisioning via the OpenTofu/Terraform provider.
    # provider-opentofu is published only on the Upbound mirror.
    - provider: xpkg.upbound.io/upbound/provider-opentofu
      version: ">=v1.0.3,<v2.0.0"
    # Functions used by this Configuration's Composition pipeline.
    - function: xpkg.crossplane.io/crossplane-contrib/function-patch-and-transform
      version: ">=v0.10.6,<v0.11.0"
    # Loads shared per-environment defaults from EnvironmentConfig(s)
    # into the pipeline environment for the patch step to consume.
    - function: xpkg.crossplane.io/crossplane-contrib/function-environment-configs
      version: ">=v0.7.0,<v0.8.0"
