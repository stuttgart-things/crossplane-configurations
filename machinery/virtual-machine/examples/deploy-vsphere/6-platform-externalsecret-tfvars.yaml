---
# ExternalSecret — materializes the `vsphere-tfvars` Secret INTO the dedicated
# namespace, templating Vault keys into the terraform.tfvars key the Workspace
# reads. Replaces `kubectl create secret generic vsphere-tfvars`.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vsphere-tfvars
  namespace: vsphere-vms
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-cicd-vsphere-labul
  target:
    name: vsphere-tfvars
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        terraform.tfvars: |
          vsphere_user = "{{ .vsphere_user }}"
          vsphere_password = "{{ .vsphere_password }}"
          vm_ssh_user = "{{ .vm_ssh_user }}"
          vm_ssh_password = "{{ .vm_ssh_password }}"
          vsphere_server = "{{ .vsphere_server }}"
  dataFrom:
    - extract:
        key: default
