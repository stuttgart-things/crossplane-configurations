---
# ExternalSecret — materializes the `ansible-credentials` Secret into the
# `tekton-ci` namespace (AnsibleRun.spec.credentialsSecretName default). The
# Ansible PipelineRun reads ANSIBLE_USER / ANSIBLE_PASSWORD from it to SSH into
# the freshly built VM.
#
# Reuses the SAME ClusterSecretStore as the tfvars Secret (5-...): the VM SSH
# creds already live in the LabUL Vault path `default` as vm_ssh_user /
# vm_ssh_password, so we just template them into the ANSIBLE_* keys here.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ansible-credentials
  namespace: tekton-ci
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-cicd-vsphere-labul
  target:
    name: ansible-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        ANSIBLE_USER: "{{ .vm_ssh_user }}"
        ANSIBLE_PASSWORD: "{{ .vm_ssh_password }}"
  dataFrom:
    - extract:
        key: default
