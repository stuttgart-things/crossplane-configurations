---
# OpenTofu ClusterProviderConfig. Name must match the XR's
# spec.providerRef.name (default `default`). Backs the vSphere Workspace the
# emitted VMProvision routes to (Terraform state in a Kubernetes backend).
apiVersion: opentofu.m.upbound.io/v1beta1
kind: ClusterProviderConfig
metadata:
  name: default
spec:
  configuration: |
    terraform {
      backend "kubernetes" {
        secret_suffix     = "providerconfig-default"
        namespace         = "crossplane-system"
        in_cluster_config = true
      }
    }
