---
# Per-environment datacenter topology for XVirtualMachine XRs.
#
# The `virtual-machine` Composition selects this EnvironmentConfig via the
# CONFIG-SCOPED label `virtual-machine.resources.stuttgart-things.com/
# environment`, matched against the XR's `spec.environment` (labul/labda). The
# key is namespaced to this Configuration so it never collides with another
# Configuration's EnvironmentConfig (function-environment-configs requires
# EXACTLY ONE Selector match).
#
# Unlike the leaf Configurations, the `data` here is NOT flat: it holds BOTH a
# `vsphere` and a `proxmox` sub-block. The render step picks one by the XR's
# `spec.provider` — the provider dimension is therefore NOT part of the
# selector. `templates` maps the XR's `spec.os` to the provider-specific
# template name; the harvester `images` map keys the same `spec.os` to a
# {imageId, storageClassName} pair.
#
# Values below describe the LabUL environment.
apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: virtual-machine-labul
  labels:
    virtual-machine.resources.stuttgart-things.com/environment: labul
data:
  # Cross-provider: the provider-kubernetes (Cluster)ProviderConfig name that
  # runs the Ansible Tekton PipelineRun (used for any provider when
  # `ansible: true`). Must match a CPC on the cluster. Replaces what used to be
  # hardcoded to `dev` in the Composition.
  ansible:
    crossplaneProviderConfig: in-cluster
    ansibleWorkingImage: ghcr.io/stuttgart-things/sthings-ansible:13.5.0-test
    # playbooks + varsFile are env-owned (>=v0.1.6); omit to fall back to the
    # baseos defaults below. The target inventory is NOT set here — it is
    # auto-populated with the VM's resolved IP. varsFile uses key+-value form.
    playbooks:
      - sthings.baseos.setup
    varsFile:
      - manage_filesystem+-true
      - update_packages+-true
      - ansible_become+-true
      - ansible_become_method+-sudo
  vsphere:
    templates:
      ubuntu24: sthings-u24
    firmware: bios
    folderPath: stuttgart-things/testing
    datacenter: /LabUL
    datastore: /LabUL/datastore/UL-ESX-SAS-02
    resourcePool: /LabUL/host/Cluster-V6.7/Resources
    network: /LabUL/network/LAB-10.31.103
    tfvarsSecretName: vsphere-tfvars # pragma: allowlist secret
    tfvarsSecretKey: terraform.tfvars # pragma: allowlist secret
  proxmox:
    templates:
      ubuntu24: sthings-u26
    firmware: seabios
    node: ul-pve01
    datastore: DD-sthings
    folderPath: stuttgart-things
    network: vmbr0
    tfvarsSecretName: proxmox-tfvars # pragma: allowlist secret
    tfvarsSecretKey: terraform.tfvars # pragma: allowlist secret
  # Harvester / KubeVirt sub-block. Unlike vsphere/proxmox (OpenTofu), an
  # `provider: harvester` XR is rendered into a `HarvesterVM` directly. `images`
  # maps spec.os -> a {imageId, storageClassName} pair — each Harvester image
  # has its OWN per-image Longhorn storage class (the wrong class yields a blank
  # disk). The rest is placement + a default cloud-init user/ssh key for Ansible
  # access. EXAMPLE values — substitute your Harvester images/classes.
  harvester:
    images:
      ubuntu24:
        imageId: default/image-ubuntu-24
        storageClassName: lh-00000000-ubuntu24-backingimage-class
      sthings-rocky9:
        imageId: default/sthings-rocky9
        storageClassName: lh-00000000-rocky9-backingimage-class
    providerConfigRef: harvester
    namespace: vms
    networkName: default/vms
    user: sthings
    sshKey: "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQC..."
---
# LabDA is a vSphere-only environment (no Proxmox node) — only a `vsphere`
# sub-block is defined here. The placement paths below are EXAMPLE values;
# substitute your LabDA datacenter/datastore/network for real use. An XR with
# `provider: proxmox, environment: labda` would resolve an empty topology, so
# keep Proxmox XRs on `environment: labul`.
apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: virtual-machine-labda
  labels:
    virtual-machine.resources.stuttgart-things.com/environment: labda
data:
  ansible:
    crossplaneProviderConfig: in-cluster
    ansibleWorkingImage: ghcr.io/stuttgart-things/sthings-ansible:13.5.0-test
    # playbooks + varsFile are env-owned (>=v0.1.6); omit to fall back to the
    # baseos defaults below. The target inventory is NOT set here — it is
    # auto-populated with the VM's resolved IP. varsFile uses key+-value form.
    playbooks:
      - sthings.baseos.setup
    varsFile:
      - manage_filesystem+-true
      - update_packages+-true
      - ansible_become+-true
      - ansible_become_method+-sudo
  vsphere:
    templates:
      ubuntu24: sthings-u24
    firmware: bios
    folderPath: stuttgart-things/testing
    datacenter: /LabDA
    datastore: /LabDA/datastore/DatastoreCluster/labda-datastore-01
    resourcePool: Resources
    network: /LabDA/network/labda-prod
    tfvarsSecretName: vsphere-tfvars # pragma: allowlist secret
    tfvarsSecretKey: terraform.tfvars # pragma: allowlist secret
