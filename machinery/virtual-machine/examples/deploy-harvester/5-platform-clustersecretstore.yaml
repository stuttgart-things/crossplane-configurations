---
# ESO ClusterSecretStore — Vault KV v2, Kubernetes auth. Cluster-scoped, so it
# serves ExternalSecrets in any namespace. Here it backs the single
# `ansible-credentials` ExternalSecret (file 6) — the Harvester path has no
# tfvars Secret (no OpenTofu), so unlike deploy-vsphere this store serves just
# the Ansible creds.
#
# On the stuttgart-things fleet this CSS is GitOps-managed via the catalog
# chart `infra/external-secrets/cluster-secret-store-vault` (Argo Application
# under `argocd/clusters/<cluster>/external-secrets/`). If your cluster already
# has it, DELETE this file and keep the ExternalSecret pointing at the existing
# store. It's included here so the bundle stands alone.
#
# Vault layout assumed:
#   - KV v2 mounted at `cicd-harvester-labul`, secret at path `default` with
#     keys: vm_ssh_user, vm_ssh_password
#   - Kubernetes auth backend mounted at `<cluster>-eso` (NOT `kubernetes`),
#     role `eso` bound to the ESO ServiceAccount, granting read on
#     `cicd-harvester-labul/data/*`.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-cicd-harvester-labul
spec:
  provider:
    vault:
      server: https://vault.infra.sthings-vsphere.labul.sva.de
      path: cicd-harvester-labul
      version: v2
      # Vault's listener cert is signed by its own PKI. Reference the
      # cert-manager CA Secret (preferred — already on cluster)…
      caProvider:
        type: Secret
        name: vault-pki-ca
        namespace: cert-manager
        key: ca.crt
      # …or inline it: caBundle: <base64 of `curl -sk "$VAULT_ADDR/v1/pki/ca/pem"`>
      auth:
        kubernetes:
          mountPath: cicd-crossplane-eso   # <cluster>-<authname>, not "kubernetes"
          role: eso
          serviceAccountRef:
            name: eso
            namespace: external-secrets
