---
# The request: a medium Harvester / KubeVirt VM in LabUL on Ubuntu 24, with
# Ansible base-OS provisioning (ansible: true → HarvesterVM.spec.ansible.enabled,
# gated on the VM reporting an IP). `provider: harvester` routes to a HarvesterVM
# (not a VMProvision): size maps to cpu/ram/disk, `os` maps to the Harvester
# imageId, and placement (storage class, namespace, Multus network, provider
# config) + the cloud-init user/ssh key come from the EnvironmentConfig
# `harvester` sub-block. This is the only file a VM consumer edits — everything
# 0–6 is platform setup.
apiVersion: resources.stuttgart-things.com/v1alpha1
kind: XVirtualMachine
metadata:
  name: vm-harvester
  namespace: harvester-vms
spec:
  size: medium
  provider: harvester
  environment: labul
  os: ubuntu24
  ansible: true
