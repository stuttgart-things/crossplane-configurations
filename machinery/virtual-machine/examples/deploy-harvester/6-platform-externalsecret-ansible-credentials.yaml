---
# ExternalSecret — materializes the `ansible-credentials` Secret into the
# `tekton-ci` namespace (AnsibleRun.spec.credentialsSecretName default). The
# Ansible PipelineRun reads ANSIBLE_USER / ANSIBLE_PASSWORD from it to connect
# to the freshly built Harvester VM.
#
# The VM login itself is seeded by cloud-init from the EnvironmentConfig
# `harvester.user` / `harvester.sshKey` (file 4). These credentials let the
# pipeline authenticate as that user — keep ANSIBLE_USER in sync with
# `harvester.user`, and supply the matching password (or adapt the pipeline /
# this Secret to key-based auth if your image uses the injected sshKey).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ansible-credentials
  namespace: tekton-ci
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-cicd-harvester-labul
  target:
    name: ansible-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        ANSIBLE_USER: "{{ .vm_ssh_user }}"
        ANSIBLE_PASSWORD: "{{ .vm_ssh_password }}"
  dataFrom:
    - extract:
        key: default
