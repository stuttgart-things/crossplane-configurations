---
apiVersion: meta.pkg.crossplane.io/v1
kind: Configuration
metadata:
  name: virtual-machine
  annotations:
    # Local convention used by `task push` to bump and re-publish.
    # Not a Crossplane-standard field — the true package version is the OCI tag.
    meta.crossplane.io/version: v0.1.1
    meta.crossplane.io/maintainer: patrick.hermann@sva.de
    meta.crossplane.io/source: github.com/stuttgart-things/crossplane-configurations
    meta.crossplane.io/license: Apache-2.0
    meta.crossplane.io/description: |
      High-level VM API. A namespaced `XVirtualMachine` XR asks for a VM by
      t-shirt size, provider (vsphere/proxmox) and environment (labul/labda);
      the Composition resolves the per-environment datacenter topology from an
      EnvironmentConfig and emits a `VMProvision`, which routes to the matching
      provider VM (+ optional Ansible base-OS provisioning).
    meta.crossplane.io/readme: |
      # virtual-machine

      A Crossplane v2 Configuration providing a high-level, opinionated VM
      API. The `XVirtualMachine` XR (group `resources.stuttgart-things.com`)
      takes a small set of intent fields and delegates the heavy lifting to
      the `vm-provision` Configuration.

      The Composition is a three-step `function-kcl` pipeline:

      - `load-environment` (`function-environment-configs`) loads the
        per-environment datacenter topology, selected by the config-scoped
        label `virtual-machine.resources.stuttgart-things.com/environment`
        (value from `spec.environment`). Each EnvironmentConfig holds BOTH
        `vsphere` and `proxmox` sub-blocks under `data`.
      - `render` maps the t-shirt `size` (small/medium/large/xlarge) to
        cpu/ram/disk and the loaded topology to a full `VMProvision`, picking
        the provider sub-block by `spec.provider`.
      - `patch-status` surfaces VM IP / provider / readiness onto the XR.

      ## Preconditions

      The `vm-provision` Configuration (and transitively `vsphere-vm`,
      `proxmox-vm`, `ansible-run`) must be installed — declared as
      `dependsOn`, so the package manager pulls them. Plus an OpenTofu
      `ClusterProviderConfig`, the tfvars Secret(s), and the
      `EnvironmentConfig`(s) for the target environment(s). See the README.
spec:
  crossplane:
    version: ">=v2.1.3"
  dependsOn:
    # Pipeline Functions used by this Configuration's Composition.
    - function: xpkg.crossplane.io/crossplane-contrib/function-environment-configs
      version: ">=v0.7.0,<v0.8.0"
    - function: xpkg.crossplane.io/crossplane-contrib/function-kcl
      version: ">=v0.12.0,<v0.13.0"
    - function: xpkg.crossplane.io/crossplane-contrib/function-auto-ready
      version: ">=v0.6.5,<v0.7.0"
    # The router Configuration this module emits into for vsphere/proxmox.
    # Installing virtual-machine pulls vm-provision (and transitively
    # vsphere-vm, proxmox-vm, ansible-run and their providers/functions).
    - configuration: ghcr.io/stuttgart-things/crossplane-configurations/vm-provision
      version: ">=v0.1.0"
    # provider: harvester emits a HarvesterVM directly into this Configuration
    # (which transitively pulls volume-claim, cloud-config, ansible-run,
    # provider-kubernetes).
    - configuration: ghcr.io/stuttgart-things/crossplane-configurations/harvester-vm
      version: ">=v0.1.0"
