---
# Same VM as deploy-remote/5-xr.yaml, but with Ansible base-OS provisioning
# enabled. After the VM boots and the QEMU guest agent reports its IP onto
# `status.share.ip`, harvester-vm emits an AnsibleRun whose inventory
# auto-populates with that IP and runs the playbook(s) below via a Tekton
# PipelineRun in `tekton-ci` on the management cluster.
#
# Apply this INSTEAD of deploy-remote/5-xr.yaml (don't run both — they'd be two
# different VMs). Requires: ansible/ platform files applied, the
# `ansible-credentials` Secret in `tekton-ci`, and the Tekton stack + RBAC
# (see HOWTO.md "Ansible").
apiVersion: resources.stuttgart-things.com/v1alpha1
kind: HarvesterVM
metadata:
  name: dev1
  namespace: default
spec:
  environmentConfig: default
  volume:
    pvcName: dev1-disk-0
    storage: "20Gi"
    accessModes:
      - ReadWriteOnce
    volumeMode: Block
  cloudInit:
    vmName: dev1
    hostname: dev1
    domain: local
    sshPasswordAuth: true
    disableRoot: false
    packageUpdate: true
    users:
      - name: sthings
        sudo: "ALL=(ALL) NOPASSWD:ALL" # pragma: allowlist secret
        lockPasswd: false
        shell: /bin/bash
        sshAuthorizedKeys:
          # >>> replace with your public key <<<
          - "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQC..."
    packages:
      # Keep qemu-guest-agent — the VM IP that GATES the AnsibleRun comes from it.
      - qemu-guest-agent
    runcmd:
      - "systemctl enable --now qemu-guest-agent.service"
  vm:
    description: "dev1 VM with Ansible provisioning (remote Harvester)"
    runStrategy: RerunOnFailure
    os: linux
    cpu:
      cores: 4
      sockets: 1
      threads: 1
    resources:
      memory: "8Gi"
      cpu: "4"
  # --- Ansible provisioning ---------------------------------------------------
  ansible:
    enabled: true
    # Defaults (from the XRD) — shown here so the how-to is self-documenting.
    # Override as needed; the inventory is auto-filled with the VM IP.
    pipelineNamespace: tekton-ci
    credentialsSecretName: ansible-credentials
    crossplaneProviderConfig: in-cluster
    gitRepoUrl: https://github.com/stuttgart-things/stage-time.git
    playbooks:
      - sthings.baseos.setup
