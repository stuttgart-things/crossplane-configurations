---
# Minimum example: only XRD-required fields plus the EnvironmentConfig
# selector. providerConfigRef, the storage class, the target namespace, the
# Multus network and the base image id all come from the EnvironmentConfig
# labelled `harvester-vm.resources.stuttgart-things.com/environment=default`
# (see examples/environmentconfig.yaml). Volume sizing and cloud-init options
# fall through to the XRD defaults.
#
# `crossplane render` does not apply XRD-level defaults or resolve
# EnvironmentConfigs from the cluster, so the verify harness supplies
# examples/environmentconfig.yaml via --extra-resources.
apiVersion: resources.stuttgart-things.com/v1alpha1
kind: HarvesterVM
metadata:
  name: harvester-vm-min
  namespace: default
spec:
  environmentConfig: default
  volume:
    pvcName: harvester-vm-min-disk
  cloudInit:
    vmName: harvester-vm-min
    hostname: harvester-vm-min
  vm:
    cpu:
      cores: 1
    resources:
      memory: 1Gi
      cpu: "1"
