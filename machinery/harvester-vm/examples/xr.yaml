---
# Realistic "standard" usage: a single VM sized per spec, with the storage
# class, target namespace, Multus network, provider config and base image
# inherited from the EnvironmentConfig
# (harvester-vm.resources.stuttgart-things.com/environment=default).
apiVersion: resources.stuttgart-things.com/v1alpha1
kind: HarvesterVM
metadata:
  name: dev9
  namespace: default
spec:
  environmentConfig: default
  volume:
    pvcName: dev9-disk-0
    storage: "20Gi"
    # Single-VM boot disk: ReadWriteOnce. RWX on a Block boot volume invites a
    # second instance attaching the same disk (corruption risk with
    # RerunOnFailure). Only use RWX if you need multi-node live-migration.
    accessModes:
      - ReadWriteOnce
    volumeMode: Block
  cloudInit:
    vmName: dev9
    hostname: dev9
    domain: local
    sshPasswordAuth: true
    disableRoot: false
    packageUpdate: true
    users:
      - name: sthings
        sudo: "ALL=(ALL) NOPASSWD:ALL" # pragma: allowlist secret
        lockPasswd: false
        shell: /bin/bash
        sshAuthorizedKeys:
          - "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQC..."
    packages:
      - qemu-guest-agent
    runcmd:
      - "systemctl enable --now qemu-guest-agent.service"
  vm:
    description: "dev9 VM provisioned by Crossplane"
    runStrategy: RerunOnFailure
    os: linux
    cpu:
      cores: 4
      sockets: 1
      threads: 1
    resources:
      memory: "8Gi"
      cpu: "4"
