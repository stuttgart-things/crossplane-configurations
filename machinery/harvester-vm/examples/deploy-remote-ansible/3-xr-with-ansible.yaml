---
# The VM request — same as deploy-remote/5-xr.yaml, but with Ansible base-OS
# provisioning enabled. After the VM boots and the QEMU guest agent reports its
# IP onto `status.share.ip`, harvester-vm emits an AnsibleRun whose inventory
# auto-populates with that IP and runs the playbook(s) below via a Tekton
# PipelineRun in `tekton-ci` on the management cluster.
#
# Apply this INSTEAD of deploy-remote/5-xr.yaml (don't run both — they'd be two
# different VMs). Placement (storage class, namespace, network, image, provider
# config) and the `ansible` defaults are inherited from the deploy-remote
# bundle's EnvironmentConfig — apply that bundle first.
apiVersion: resources.stuttgart-things.com/v1alpha1
kind: HarvesterVM
metadata:
  name: dev1
  namespace: default
spec:
  environmentConfig: default
  volume:
    pvcName: dev1-disk-0
    storage: "20Gi"
    accessModes:
      - ReadWriteOnce
    volumeMode: Block
  cloudInit:
    vmName: dev1
    hostname: dev1
    domain: local
    sshPasswordAuth: true
    disableRoot: false
    packageUpdate: true
    users:
      - name: sthings
        sudo: "ALL=(ALL) NOPASSWD:ALL" # pragma: allowlist secret
        lockPasswd: false
        # >>> set a password so the Harvester web console / password SSH works.
        #     Keep ANSIBLE_USER/ANSIBLE_PASSWORD (the credentials Secret) in
        #     sync with this user/password. <<<
        password: "ChangeMe123!" # pragma: allowlist secret
        shell: /bin/bash
        sshAuthorizedKeys:
          # >>> replace with your public key <<<
          - "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQC..."
    packages:
      # Keep qemu-guest-agent — the VM IP that GATES the AnsibleRun comes from it.
      - qemu-guest-agent
    runcmd:
      - "systemctl enable --now qemu-guest-agent.service"
    # REQUIRED on a bridge/Multus network — without it the guest gets no DHCP
    # lease, so the VM never reports an IP and the AnsibleRun (gated on the IP)
    # never fires. The guest NIC is `eth0` on this image.
    networkConfig: |
      version: 2
      ethernets:
        eth0:
          dhcp4: true
  vm:
    description: "dev1 VM with Ansible provisioning (remote Harvester)"
    runStrategy: RerunOnFailure
    # Non-shared RWO/Block boot disk is not live-migratable.
    evictionStrategy: None
    os: linux
    cpu:
      cores: 4
      sockets: 1
      threads: 1
    resources:
      memory: "8Gi"
      cpu: "4"
  # --- Ansible provisioning ---------------------------------------------------
  ansible:
    enabled: true
    # Defaults (from the XRD) — shown here so the example is self-documenting.
    # The inventory is auto-filled with the VM IP.
    pipelineNamespace: tekton-ci
    credentialsSecretName: ansible-credentials
    crossplaneProviderConfig: in-cluster
    gitRepoUrl: https://github.com/stuttgart-things/stage-time.git
    playbooks:
      - sthings.baseos.setup
