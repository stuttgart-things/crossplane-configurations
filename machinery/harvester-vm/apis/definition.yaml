---
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: harvestervms.resources.stuttgart-things.com
spec:
  group: resources.stuttgart-things.com
  defaultCompositeDeletePolicy: Foreground
  scope: Namespaced
  names:
    kind: HarvesterVM
    plural: harvestervms
    singular: harvestervm
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                # --- EnvironmentConfig selector ---
                environmentConfig:
                  type: string
                  description: |
                    Selects the Crossplane EnvironmentConfig that provides
                    shared per-environment infrastructure defaults. The
                    Composition matches an EnvironmentConfig carrying the
                    config-scoped label
                    `harvester-vm.resources.stuttgart-things.com/environment=<value>`.
                    Supported `data` keys: providerConfigRef, storageClassName,
                    namespace, networkName, imageId. Any value set explicitly
                    on this XR's spec overrides the EnvironmentConfig. When no
                    EnvironmentConfig matches, the XR spec / built-in defaults
                    are used.
                  default: default

                # --- provider config (env-sourced, XR override) ---
                # No XRD default: leaving it unset lets the EnvironmentConfig
                # value win; setting it overrides. The VolumeClaim and
                # CloudInit composites both REQUIRE it, so the EnvironmentConfig
                # must supply it when the XR does not.
                providerConfigRef:
                  type: string
                  description: |
                    Name of the provider-kubernetes ClusterProviderConfig used
                    for all managed resources. Defaults from the
                    EnvironmentConfig (`providerConfigRef`) when unset.

                #################################
                # Volume (root disk PVC)
                #################################
                volume:
                  type: object
                  properties:
                    pvcName:
                      type: string
                    # --- env-sourced (no XRD default) ---
                    storageClassName:
                      type: string
                      description: Defaults from the EnvironmentConfig (`storageClassName`) when unset.
                    namespace:
                      type: string
                      description: Defaults from the EnvironmentConfig (`namespace`) when unset.
                    imageId:
                      type: string
                      description: |
                        Harvester image id, rendered into the PVC annotation
                        `harvesterhci.io/imageId`. Defaults from the
                        EnvironmentConfig (`imageId`) when unset.
                    # --- per-VM (XRD defaults) ---
                    storage:
                      type: string
                      default: "10Gi"
                    accessModes:
                      type: array
                      items:
                        type: string
                      default:
                        - "ReadWriteOnce"
                    volumeMode:
                      type: string
                      default: "Filesystem"
                    annotations:
                      type: object
                      additionalProperties:
                        type: string
                    labels:
                      type: object
                      additionalProperties:
                        type: string
                  required:
                    - pvcName

                #################################
                # Cloud-Init (bootstrap Secret)
                #################################
                cloudInit:
                  type: object
                  properties:
                    vmName:
                      type: string
                    hostname:
                      type: string
                    # --- env-sourced (no XRD default) ---
                    namespace:
                      type: string
                      description: Defaults from the EnvironmentConfig (`namespace`) when unset.
                    # --- per-VM ---
                    domain:
                      type: string
                      default: "local"
                    timezone:
                      type: string
                    users:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                          sshAuthorizedKeys:
                            type: array
                            items:
                              type: string
                          sudo:
                            type: string
                          groups:
                            type: string
                          shell:
                            type: string
                          password:
                            type: string
                          lockPasswd:
                            type: boolean
                    packages:
                      type: array
                      description: |
                        Packages installed via cloud-init. Defaults to
                        `[qemu-guest-agent]`: the QEMU guest agent is what
                        reports the VM's IP into the VirtualMachineInstance
                        status (`status.interfaces[].ipAddress`), which this
                        Configuration observes and surfaces on
                        `status.share.ip`. If you override this list, keep
                        `qemu-guest-agent` in it — without the agent the VMI
                        never reports an IP on a bridge/Multus network and
                        `status.share.ip` stays empty.
                      items:
                        type: string
                      default:
                        - qemu-guest-agent
                    writeFiles:
                      type: array
                      items:
                        type: object
                        properties:
                          path:
                            type: string
                          content:
                            type: string
                          owner:
                            type: string
                          permissions:
                            type: string
                          encoding:
                            type: string
                    runcmd:
                      type: array
                      items:
                        type: string
                    bootcmd:
                      type: array
                      items:
                        type: string
                    packageUpdate:
                      type: boolean
                      default: true
                    packageUpgrade:
                      type: boolean
                      default: false
                    sshPasswordAuth:
                      type: boolean
                      default: false
                    disableRoot:
                      type: boolean
                      default: true
                    networkConfig:
                      type: string
                      description: |
                        cloud-init network-config (netplan v2). Defaults to DHCP
                        on eth0. REQUIRED on a bridge/Multus network: without an
                        explicit network-config the guest NIC gets no DHCP lease,
                        so the VM never gets an IP and status.share.ip stays empty.
                        Override only for static addressing or a non-eth0 NIC.
                      default: |
                        version: 2
                        ethernets:
                          eth0:
                            dhcp4: true
                  required:
                    - vmName
                    - hostname

                #################################
                # VirtualMachine (KubeVirt / Harvester)
                #################################
                vm:
                  type: object
                  description: "KubeVirt / Harvester VirtualMachine configuration"
                  properties:
                    description:
                      type: string
                    runStrategy:
                      type: string
                      default: "RerunOnFailure"
                    evictionStrategy:
                      type: string
                      default: "LiveMigrateIfPossible"
                    terminationGracePeriodSeconds:
                      type: integer
                      default: 120
                    os:
                      type: string
                      default: "ubuntu"
                    machineType:
                      type: string
                      default: "q35"
                    cpu:
                      type: object
                      properties:
                        cores:
                          type: integer
                        sockets:
                          type: integer
                          default: 1
                        threads:
                          type: integer
                          default: 1
                      required:
                        - cores
                    resources:
                      type: object
                      properties:
                        memory:
                          type: string
                        cpu:
                          type: string
                      required:
                        - memory
                        - cpu
                    networks:
                      type: array
                      description: |
                        Multus networks the VM attaches to. When omitted, a
                        single `default` interface is attached to the
                        EnvironmentConfig `networkName`.
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                          networkName:
                            type: string
                        required:
                          - name
                          - networkName
                  required:
                    - cpu
                    - resources

                #################################
                # Ansible base-OS provisioning (optional, opt-in)
                #################################
                ansible:
                  type: object
                  description: |
                    Optional Ansible base-OS provisioning, run AFTER the VM is
                    up and the QEMU guest agent has reported an IP onto
                    `status.share.ip`. Emits an `AnsibleRun` (Tekton
                    PipelineRun) whose inventory auto-populates with the VM IP.
                    Disabled by default — a plain `HarvesterVM` creates only the
                    VM. Enabling it requires the `ansible-run` Configuration and
                    its preconditions (Tekton stack + credentials Secret) on the
                    cluster.
                  properties:
                    enabled:
                      type: boolean
                      description: Enable Ansible provisioning after VM creation.
                      default: false
                    pipelineNamespace:
                      type: string
                      description: Namespace for the Tekton PipelineRun.
                      default: tekton-ci
                    ansibleWorkingImage:
                      type: string
                      description: Ansible working container image.
                      default: ghcr.io/stuttgart-things/sthings-ansible:13.5.0-test
                    credentialsSecretName:
                      type: string
                      description: Secret holding Ansible credentials.
                      default: ansible-credentials
                    gitRepoUrl:
                      type: string
                      description: Git repository URL for the pipeline.
                      default: https://github.com/stuttgart-things/stage-time.git
                    playbooks:
                      type: array
                      description: Ansible playbooks to run.
                      items:
                        type: string
                      default:
                        - sthings.baseos.setup
                    varsFile:
                      type: array
                      description: Ansible vars (`key+-value` form).
                      items:
                        type: string
                    varsInventory:
                      type: array
                      description: |
                        Ansible inventory entries. Auto-populated with the VM IP
                        (`all+["<ip>"]`) when omitted.
                      items:
                        type: string
                    extraCollections:
                      type: array
                      description: Extra Ansible collections to install.
                      items:
                        type: string
                    extraRoles:
                      type: array
                      description: Extra Ansible roles to install.
                      items:
                        type: string
                    crossplaneProviderConfig:
                      type: string
                      description: provider-kubernetes config used to wrap the PipelineRun.
                      default: in-cluster
                    wrapInCrossplane:
                      type: boolean
                      description: Wrap the PipelineRun in a Crossplane Object.
                      default: true
              required:
                - volume
                - cloudInit
                - vm

            #################################
            # Status
            #################################
            status:
              type: object
              properties:
                volume:
                  type: object
                  properties:
                    pvcName:
                      type: string
                    ready:
                      type: boolean
                cloudInit:
                  type: object
                  properties:
                    secretName:
                      type: string
                    ready:
                      type: boolean
                vm:
                  type: object
                  properties:
                    name:
                      type: string
                    ready:
                      type: boolean
                share:
                  description: |
                    Freeform status surface. `share.ip` holds the VM's IP
                    address(es) as reported by the QEMU guest agent on the
                    VirtualMachineInstance. This matches the `status.share.ip`
                    convention used by the OpenTofu-backed VM Configurations,
                    so a `HarvesterVM` can feed the same shared provisioning /
                    Ansible layer.
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                ansibleReady:
                  type: boolean
                  description: |
                    Whether Ansible provisioning has completed (the emitted
                    AnsibleRun's PipelineRun `Succeeded` == True). Always `true`
                    when Ansible is disabled.
