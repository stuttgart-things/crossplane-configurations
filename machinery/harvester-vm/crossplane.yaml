---
apiVersion: meta.pkg.crossplane.io/v1
kind: Configuration
metadata:
  name: harvester-vm
  annotations:
    # Local convention used by `task push` to bump and re-publish.
    # Not a Crossplane-standard field — the true package version is the OCI tag.
    meta.crossplane.io/version: v0.1.0
    meta.crossplane.io/maintainer: patrick.hermann@sva.de
    meta.crossplane.io/source: github.com/stuttgart-things/crossplane-configurations
    meta.crossplane.io/license: Apache-2.0
    meta.crossplane.io/description: |
      Provisions a Harvester / KubeVirt virtual machine from a namespaced
      `HarvesterVM` XR. It composes two reusable Configurations — a
      `VolumeClaim` (persistent root disk) and a `CloudInit` (bootstrap
      Secret) — then renders a KubeVirt `VirtualMachine` via
      provider-kubernetes. Shared per-environment infrastructure defaults
      (provider config, storage class, target namespace, Multus network,
      base image) are loaded from a Crossplane `EnvironmentConfig`.
    meta.crossplane.io/readme: |
      # harvester-vm

      A Crossplane v2 Configuration that provisions a Harvester / KubeVirt
      virtual machine from a namespaced `HarvesterVM` XR (group
      `resources.stuttgart-things.com`).

      The Composition pipeline:

      - `function-environment-configs` loads shared per-environment
        infrastructure defaults from the `EnvironmentConfig` selected by
        the XR's `spec.environmentConfig` (config-scoped label
        `harvester-vm.resources.stuttgart-things.com/environment`) into the
        pipeline environment.
      - `function-patch-and-transform` renders a `VolumeClaim` (root disk)
        and a `CloudInit` (bootstrap Secret) composite — both from this
        repo's `volume-claim` and `cloud-config` Configurations.
      - `function-go-templating` renders a KubeVirt `VirtualMachine`
        (`kubevirt.io/v1`) as a provider-kubernetes `Object`, wiring in the
        PVC and the cloud-init Secret.

      Per-VM fields (name, cpu, memory, disk, …) come from the XR spec;
      shared infra fields (providerConfigRef, storageClassName, namespace,
      networkName, imageId) default from the EnvironmentConfig and are
      overridable per XR.

      ## Preconditions

      On the target cluster:

      - `provider-kubernetes` installed with a `ClusterProviderConfig`
        (default name `default`) targeting the Harvester / KubeVirt cluster.
      - The `volume-claim` and `cloud-config` Configurations installed
        (declared as `dependsOn`).
      - A Harvester VM image whose id is referenced by `imageId`.

      See the per-Configuration README for ready-to-apply manifests.
spec:
  crossplane:
    version: ">=v2.1.3"
  dependsOn:
    # Creates the KubeVirt VirtualMachine Object (and the child composites
    # create PVC/Secret Objects) on the target cluster.
    - provider: xpkg.crossplane.io/crossplane-contrib/provider-kubernetes
      version: ">=v1.2.0,<v2.0.0"
    # Functions used by this Configuration's Composition pipeline.
    - function: xpkg.crossplane.io/crossplane-contrib/function-patch-and-transform
      version: ">=v0.10.6,<v0.11.0"
    - function: xpkg.crossplane.io/crossplane-contrib/function-go-templating
      version: ">=v0.12.1,<v0.13.0"
    # Loads shared per-environment defaults from EnvironmentConfig(s)
    # into the pipeline environment for the patch step to consume.
    - function: xpkg.crossplane.io/crossplane-contrib/function-environment-configs
      version: ">=v0.7.0,<v0.8.0"
    # Reusable building-block Configurations this module composes.
    - configuration: ghcr.io/stuttgart-things/crossplane-configurations/volume-claim
      version: ">=v0.1.0"
    - configuration: ghcr.io/stuttgart-things/crossplane-configurations/cloud-config
      version: ">=v0.5.4"
    # Optional Ansible base-OS provisioning: the create-vm step emits an
    # `AnsibleRun` when `spec.ansible.enabled` is true (gated on the VM IP).
    - configuration: ghcr.io/stuttgart-things/crossplane-configurations/ansible-run
      version: ">=v0.1.2"
