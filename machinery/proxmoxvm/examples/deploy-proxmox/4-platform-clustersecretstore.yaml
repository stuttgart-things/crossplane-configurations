---
# OPTIONAL — ESO ClusterSecretStore (Vault KV v2, Kubernetes auth). Cluster-scoped,
# so it serves ExternalSecrets in any namespace. This replaces creating
# proxmox-creds by hand (the inline Secret in ../clusterproviderconfig.yaml).
#
# On the stuttgart-things fleet a CSS like this is GitOps-managed via the catalog
# chart `infra/external-secrets/cluster-secret-store-vault`. If your cluster
# already has a Vault store, DELETE this file and point the ExternalSecret (5-...)
# at the existing store. It is included here so the bundle stands alone.
#
# Vault layout (as provisioned for LabUL):
#   - KV v2 mounted at `cicd-proxmox-labul`, secret at path `default` with keys:
#     pve_api_url, pve_api_user, pve_api_password, vm_ssh_user, vm_ssh_password
#   - Kubernetes auth backend mounted at `<cluster>-eso` (NOT `kubernetes`),
#     role `eso` bound to the ESO ServiceAccount, granting read on
#     `cicd-proxmox-labul/data/*`.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-cicd-proxmox-labul
spec:
  provider:
    vault:
      server: https://vault.example.labul.sva.de   # ADJUST: labul Vault address
      path: cicd-proxmox-labul
      version: v2
      # Vault's listener cert is signed by its own PKI. Reference the
      # cert-manager CA Secret (preferred — already on cluster)…
      caProvider:
        type: Secret
        name: vault-pki-ca
        namespace: cert-manager
        key: ca.crt
      # …or inline it: caBundle: <base64 of `curl -sk "$VAULT_ADDR/v1/pki/ca/pem"`>
      auth:
        kubernetes:
          mountPath: <cluster>-eso   # ADJUST: <cluster_name>-<authname>, not "kubernetes"
          role: eso
          serviceAccountRef:
            name: eso
            namespace: external-secrets
