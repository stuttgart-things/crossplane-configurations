---
# OPTIONAL — ESO ExternalSecret that materializes the `proxmox-creds` Secret from
# Vault, instead of the inline Secret in ../clusterproviderconfig.yaml. Lives in
# crossplane-system so the cluster-scoped ProviderConfig (2-...) can reference it.
#
# Renders the bpg provider's expected `credentials` JSON blob
# (internal/clients/proxmoxbpg.go::buildConfiguration): top-level endpoint /
# username / password / insecure, plus the ssh block (ssh_username /
# ssh_password) that bpg uses to reach the node for cloud-init snippet uploads.
#
# Vault key mapping (KV `cicd-proxmox-labul`, path `default`):
#   pve_api_url      -> endpoint
#   pve_api_user     -> username
#   pve_api_password -> password
#   vm_ssh_user      -> ssh_username
#   vm_ssh_password  -> ssh_password
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: proxmox-creds
  namespace: crossplane-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-cicd-proxmox-labul
  target:
    name: proxmox-creds
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        credentials: | # pragma: allowlist secret
          {"endpoint":"{{ .pve_api_url }}","username":"{{ .pve_api_user }}","password":"{{ .pve_api_password }}","insecure":"true","ssh_username":"{{ .vm_ssh_user }}","ssh_password":"{{ .vm_ssh_password }}"}
  dataFrom:
    - extract:
        key: default
