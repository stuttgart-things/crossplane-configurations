---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: rancher-cluster
spec:
  compositeTypeRef:
    apiVersion: resources.stuttgart-things.com/v1alpha1
    kind: RancherCluster
  mode: Pipeline
  pipeline:
    # Load per-environment defaults from the EnvironmentConfig selected by the
    # config-scoped label (value from spec.environmentConfig, default "default").
    # Its `data` lands in the pipeline environment; precedence below is always
    # XR spec → EnvironmentConfig → built-in default.
    - step: load-environment
      functionRef:
        name: function-environment-configs
      input:
        apiVersion: environmentconfigs.fn.crossplane.io/v1beta1
        kind: Input
        spec:
          environmentConfigs:
            - type: Selector
              selector:
                matchLabels:
                  - key: rancher-cluster.resources.stuttgart-things.com/environment
                    type: FromCompositeFieldPath
                    valueFromFieldPath: spec.environmentConfig
                    fromFieldPathPolicy: Optional
    - step: render-rancher-cluster
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $spec := .observed.composite.resource.spec }}
            {{- /* EnvironmentConfig data → pipeline environment. Empty in offline
                   render unless an EnvironmentConfig is passed via --extra-resources. */}}
            {{- $env := index .context "apiextensions.crossplane.io/environment" | default dict }}
            {{- $name := $spec.name }}
            {{- $xrNs := .observed.composite.resource.metadata.namespace }}
            {{- $cpc := $spec.providerConfigRef | default $env.providerConfigRef }}
            {{- $rancherCpc := $spec.rancherProviderConfigRef | default $env.rancherProviderConfigRef | default $cpc }}
            {{- $split := ne $rancherCpc $cpc }}
            {{- $rancherNs := $spec.rancherNamespace | default $env.rancherNamespace | default "fleet-default" }}
            {{- $bridgedSecret := print $name "-kubeconfig-bridged" }}
            {{- /* Where the wired CPC + Argo CD path read the kubeconfig from:
                   co-located → Rancher's published Secret on the (shared) cluster;
                   split      → the bridged connection Secret on the control plane. */}}
            {{- $kcfgSecretName := ternary $bridgedSecret (print $name "-kubeconfig") $split }}
            {{- $kcfgSecretNs := ternary $xrNs $rancherNs $split }}
            {{- $version := $spec.kubernetesVersion | default $env.kubernetesVersion }}
            {{- $infra := $spec.infrastructure | default "generic" }}
            {{- $harvester := $spec.harvester | default dict }}
            {{- $bootstrap := $spec.bootstrap | default dict }}
            {{- $bootstrapNs := $bootstrap.namespace | default "crossplane-bootstrap" }}
            {{- $argocd := $spec.argocd | default dict }}
            {{- $argocdRegister := $argocd.register | default false }}
            {{- /* Platform profile labels/annotations on the ClusterbookCluster:
                   EnvironmentConfig defaultLabels/defaultAnnotations are the base,
                   spec.argocd.labels/annotations override per-cluster. Defaults
                   typically carry auto-project: 'true' + every profile toggle at
                   'false', so an XR only sets the toggles it flips to 'true' (the
                   'false' siblings the AppSet NotIn-selectors need come from the
                   defaults — no manual pinning). merge: earlier source wins. */}}
            {{- $argocdLabels := merge (dict) ($argocd.labels | default dict) ($env.defaultLabels | default dict) }}
            {{- $argocdAnnotations := merge (dict) ($argocd.annotations | default dict) ($env.defaultAnnotations | default dict) }}
            {{- $argocdNs := $argocd.namespace | default $env.argocdNamespace | default "argocd" }}
            {{- /* Argo CD + clusterbook-operator run on this cluster (the Rancher
                   cluster in the split lab, not the control plane). The kubeconfig
                   Secret + ClusterbookCluster are created here. */}}
            {{- $argocdCpc := $argocd.providerConfigRef | default $env.argocdProviderConfigRef | default $rancherCpc }}
            {{- /* Direct API endpoint: usually auto-discovered (step 4d reads the
                   downstream `kubernetes` Endpoints); spec.argocd.server overrides
                   it for HA VIP/LB. */}}
            {{- $argocdServerOverride := $argocd.server }}
            {{- $argocdSaSecret := print $name "-argocd-sa" }}
            {{- if eq $infra "harvester" }}
            {{- /* Harvester VM nodes: a HarvesterConfig (the VM template) plus a
                   provisioning Cluster whose single machine pool references it. */}}
            {{- $hcfgName := print $name "-pool1" }}
            {{- /* Infra-identity fields fall back to the EnvironmentConfig. */}}
            {{- $hImage := $harvester.imageName | default $env.imageName }}
            {{- $hNetwork := $harvester.networkName | default $env.networkName }}
            {{- $hVmNs := $harvester.vmNamespace | default $env.vmNamespace | default "default" }}
            {{- $hSshUser := $harvester.sshUser | default $env.sshUser | default "ubuntu" }}
            {{- $hCloudCred := $harvester.cloudCredentialSecretName | default $env.cloudCredentialSecretName }}
            {{- /* Sizing/quantity stay per-cluster (XRD defaults). */}}
            {{- $hCpu := $harvester.cpuCount | default 2 }}
            {{- $hMem := $harvester.memorySize | default 4 }}
            {{- $hDisk := $harvester.diskSize | default 40 }}
            {{- $hQuantity := $harvester.quantity | default 1 }}
            {{- $defaultUserData := "#cloud-config\npackage_update: true\npackages:\n  - qemu-guest-agent\nruncmd:\n  - - systemctl\n    - enable\n    - '--now'\n    - qemu-guest-agent.service\n" }}
            {{- $userData := $harvester.userData | default $defaultUserData }}
            {{- $diskInfo := dict "disks" (list (dict "imageName" $hImage "bootOrder" 1 "size" $hDisk)) | toJson }}
            {{- $networkInfo := dict "interfaces" (list (dict "networkName" $hNetwork "macAddress" "")) | toJson }}
            ---
            # (1a) MACHINE CONFIG — the Harvester VM template the machine pool
            # references. HarvesterConfig is a flat CRD (fields at the top level,
            # no spec). diskInfo/networkInfo are JSON strings Rancher expects.
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              annotations:
                {{ setResourceNameAnnotation (print $name "-harvesterconfig") }}
              labels:
                app.kubernetes.io/name: rancher-cluster
                app.kubernetes.io/instance: {{ $name }}-harvesterconfig
                app.kubernetes.io/managed-by: crossplane
            spec:
              providerConfigRef:
                name: {{ $rancherCpc }}
                kind: ClusterProviderConfig
              managementPolicies:
                - '*'
              forProvider:
                manifest:
                  apiVersion: rke-machine-config.cattle.io/v1
                  kind: HarvesterConfig
                  metadata:
                    name: {{ $hcfgName }}
                    namespace: {{ $rancherNs }}
                  cpuCount: {{ $hCpu | quote }}
                  memorySize: {{ $hMem | quote }}
                  diskSize: "0"
                  diskInfo: {{ $diskInfo | quote }}
                  imageName: ""
                  networkInfo: {{ $networkInfo | quote }}
                  networkName: ""
                  vmNamespace: {{ $hVmNs }}
                  sshUser: {{ $hSshUser }}
                  sshPort: "22"
                  reservedMemorySize: "-1"
                  userData: {{ $userData | b64enc }}
            ---
            # (1b) PROVISION (Harvester) — provisioning Cluster with one machine
            # pool backed by the HarvesterConfig above and a Harvester cloud
            # credential. Rancher creates the VMs and registers them as nodes.
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              annotations:
                {{ setResourceNameAnnotation (print $name "-cluster") }}
              labels:
                app.kubernetes.io/name: rancher-cluster
                app.kubernetes.io/instance: {{ $name }}-cluster
                app.kubernetes.io/managed-by: crossplane
            spec:
              providerConfigRef:
                name: {{ $rancherCpc }}
                kind: ClusterProviderConfig
              managementPolicies:
                - '*'
              forProvider:
                manifest:
                  apiVersion: provisioning.cattle.io/v1
                  kind: Cluster
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $rancherNs }}
                    {{- if $spec.clusterLabels }}
                    labels:
                      {{- range $k, $v := $spec.clusterLabels }}
                      {{ $k }}: {{ $v | quote }}
                      {{- end }}
                    {{- end }}
                  spec:
                    kubernetesVersion: {{ $version }}
                    cloudCredentialSecretName: {{ $hCloudCred }}
                    rkeConfig:
                      machinePools:
                        - name: pool1
                          etcdRole: true
                          controlPlaneRole: true
                          workerRole: true
                          quantity: {{ $hQuantity }}
                          machineConfigRef:
                            kind: HarvesterConfig
                            name: {{ $hcfgName }}
                      {{- if $spec.machineGlobalConfig }}
                      machineGlobalConfig:
                        {{- $spec.machineGlobalConfig | toYaml | nindent 12 }}
                      {{- else }}
                      machineGlobalConfig: {}
                      {{- end }}
            {{- else }}
            ---
            # (1) PROVISION — the generic (custom-node) Rancher cluster on the
            # Rancher management cluster (rancherProviderConfigRef; = the control
            # plane when co-located). No machinePools: nodes are registered
            # manually via the Rancher registration command. The +k3s/+rke2
            # suffix on kubernetesVersion selects the distribution.
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              annotations:
                {{ setResourceNameAnnotation (print $name "-cluster") }}
              labels:
                app.kubernetes.io/name: rancher-cluster
                app.kubernetes.io/instance: {{ $name }}-cluster
                app.kubernetes.io/managed-by: crossplane
            spec:
              providerConfigRef:
                name: {{ $rancherCpc }}
                kind: ClusterProviderConfig
              managementPolicies:
                - '*'
              forProvider:
                manifest:
                  apiVersion: provisioning.cattle.io/v1
                  kind: Cluster
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $rancherNs }}
                    {{- if $spec.clusterLabels }}
                    labels:
                      {{- range $k, $v := $spec.clusterLabels }}
                      {{ $k }}: {{ $v | quote }}
                      {{- end }}
                    {{- end }}
                  spec:
                    kubernetesVersion: {{ $version }}
                    rkeConfig:
                      {{- if $spec.machineGlobalConfig }}
                      machineGlobalConfig:
                        {{- $spec.machineGlobalConfig | toYaml | nindent 12 }}
                      {{- else }}
                      machineGlobalConfig: {}
                      {{- end }}
            {{- end }}
            {{- if $split }}
            ---
            # (1b) BRIDGE — only when Crossplane and Rancher are on DIFFERENT
            # clusters. Rancher publishes <name>-kubeconfig on the Rancher
            # cluster (rancherProviderConfigRef), but the wired CPC below must
            # read it from the control-plane cluster where provider-kubernetes
            # runs. Observe the published Secret on the Rancher cluster and
            # surface its `value` as a connection Secret on the control plane
            # (<name>-kubeconfig-bridged, in the XR namespace) for the wired CPC
            # — and the Argo CD path — to consume.
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              annotations:
                {{ setResourceNameAnnotation (print $name "-kubeconfig-bridge") }}
              labels:
                app.kubernetes.io/name: rancher-cluster
                app.kubernetes.io/instance: {{ $name }}-kubeconfig-bridge
                app.kubernetes.io/managed-by: crossplane
            spec:
              providerConfigRef:
                name: {{ $rancherCpc }}
                kind: ClusterProviderConfig
              managementPolicies:
                - Observe
              writeConnectionSecretToRef:
                name: {{ $bridgedSecret }}
              connectionDetails:
                - apiVersion: v1
                  kind: Secret
                  name: {{ $name }}-kubeconfig
                  namespace: {{ $rancherNs }}
                  fieldPath: data.value
                  toConnectionSecretKey: value
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Secret
                  metadata:
                    name: {{ $name }}-kubeconfig
                    namespace: {{ $rancherNs }}
            {{- end }}
            ---
            # (2) WIRE — a ClusterProviderConfig on the control-plane cluster
            # pointing at the kubeconfig Secret for the downstream cluster.
            # Co-located: Rancher's published `<name>-kubeconfig` (key `value`)
            # directly. Split: the bridged Secret from step (1b). No
            # copy/transform; provider-kubernetes retries until the Secret lands.
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              annotations:
                {{ setResourceNameAnnotation (print $name "-providerconfig") }}
              labels:
                app.kubernetes.io/name: rancher-cluster
                app.kubernetes.io/instance: {{ $name }}-providerconfig
                app.kubernetes.io/managed-by: crossplane
            spec:
              providerConfigRef:
                name: {{ $cpc }}
                kind: ClusterProviderConfig
              managementPolicies:
                - '*'
              # A ClusterProviderConfig is a static config resource with no
              # status conditions, so the default SuccessfulCreate/DeriveFromObject
              # policies never latch Ready (leaving the XR stuck NotReady). Derive
              # readiness from existence instead — once the object has a uid it is
              # created and usable.
              readiness:
                policy: DeriveFromCelQuery
                celQuery: object.metadata.uid != ""
              forProvider:
                manifest:
                  apiVersion: kubernetes.m.crossplane.io/v1alpha1
                  kind: ClusterProviderConfig
                  metadata:
                    name: {{ $name }}
                  spec:
                    credentials:
                      source: Secret
                      secretRef:
                        namespace: {{ $kcfgSecretNs }}
                        name: {{ $kcfgSecretName }}
                        key: value
            ---
            # (3) USE — bootstrap a Namespace on the DOWNSTREAM cluster through
            # the ClusterProviderConfig wired in step (2). Observe+Create adopts
            # a pre-existing namespace and never modifies/deletes it. This is the
            # proof that the extracted kubeconfig is usable by Crossplane.
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              annotations:
                {{ setResourceNameAnnotation (print $name "-bootstrap-namespace") }}
              labels:
                app.kubernetes.io/name: rancher-cluster
                app.kubernetes.io/instance: {{ $name }}-bootstrap-namespace
                app.kubernetes.io/managed-by: crossplane
            spec:
              providerConfigRef:
                name: {{ $name }}
                kind: ClusterProviderConfig
              managementPolicies:
                - Observe
                - Create
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Namespace
                  metadata:
                    name: {{ $bootstrapNs }}
                    {{- if $bootstrap.labels }}
                    labels:
                      {{- range $k, $v := $bootstrap.labels }}
                      {{ $k }}: {{ $v | quote }}
                      {{- end }}
                    {{- end }}
            ---
            apiVersion: resources.stuttgart-things.com/v1alpha1
            kind: RancherCluster
            status:
              kubeconfigSecret: {{ $name }}-kubeconfig
              clusterProviderConfig: {{ $name }}
              {{- if $argocdRegister }}
              argocdClusterSecret: cluster-{{ $name }}
              {{- end }}
            {{- if $argocdRegister }}
            ---
            # (4) ARGO CD REGISTRATION (optional, spec.argocd.register=true).
            # Register the DOWNSTREAM cluster by its direct API endpoint
            # (spec.argocd.server) with a self-minted, non-expiring SA token —
            # no Rancher auth-proxy dependency. Steps 4a-4c run on the downstream
            # cluster (wired CPC); 4e-4f run on the cluster that hosts Argo CD +
            # clusterbook-operator (spec.argocd.providerConfigRef, default the
            # Rancher cluster).
            #
            # (4a) argocd-manager ServiceAccount on the downstream cluster.
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              annotations:
                {{ setResourceNameAnnotation (print $name "-argocd-sa") }}
              labels:
                app.kubernetes.io/name: rancher-cluster
                app.kubernetes.io/instance: {{ $name }}-argocd-sa
                app.kubernetes.io/managed-by: crossplane
            spec:
              providerConfigRef:
                name: {{ $name }}
                kind: ClusterProviderConfig
              managementPolicies:
                - Observe
                - Create
              readiness:
                policy: DeriveFromCelQuery
                celQuery: object.metadata.uid != ""
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: ServiceAccount
                  metadata:
                    name: argocd-manager
                    namespace: kube-system
            ---
            # (4b) cluster-admin binding for the SA.
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              annotations:
                {{ setResourceNameAnnotation (print $name "-argocd-crb") }}
              labels:
                app.kubernetes.io/name: rancher-cluster
                app.kubernetes.io/instance: {{ $name }}-argocd-crb
                app.kubernetes.io/managed-by: crossplane
            spec:
              providerConfigRef:
                name: {{ $name }}
                kind: ClusterProviderConfig
              managementPolicies:
                - Observe
                - Create
              readiness:
                policy: DeriveFromCelQuery
                celQuery: object.metadata.uid != ""
              forProvider:
                manifest:
                  apiVersion: rbac.authorization.k8s.io/v1
                  kind: ClusterRoleBinding
                  metadata:
                    name: argocd-manager-role-binding
                  roleRef:
                    apiGroup: rbac.authorization.k8s.io
                    kind: ClusterRole
                    name: cluster-admin
                  subjects:
                    - kind: ServiceAccount
                      name: argocd-manager
                      namespace: kube-system
            ---
            # (4c) Long-lived SA token Secret on the downstream cluster. The
            # token controller populates .data.token + .data['ca.crt']. This
            # Object only CREATES it (Observe+Create, never update — so the
            # controller-populated fields are not stripped). Extraction is a
            # separate Observe-only Object (4d): provider-kubernetes does not
            # surface connectionDetails on an Object that also manages/creates
            # the target, so create and extract must be split.
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              annotations:
                {{ setResourceNameAnnotation (print $name "-argocd-token") }}
              labels:
                app.kubernetes.io/name: rancher-cluster
                app.kubernetes.io/instance: {{ $name }}-argocd-token
                app.kubernetes.io/managed-by: crossplane
            spec:
              providerConfigRef:
                name: {{ $name }}
                kind: ClusterProviderConfig
              managementPolicies:
                - Observe
                - Create
              readiness:
                policy: DeriveFromCelQuery
                celQuery: object.metadata.uid != ""
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Secret
                  metadata:
                    name: argocd-manager-token
                    namespace: kube-system
                    annotations:
                      kubernetes.io/service-account.name: argocd-manager
                  type: kubernetes.io/service-account-token
            ---
            # (4d) Observe-only extraction of the SA token + downstream CA + the
            # cluster's direct API endpoint (from the `kubernetes` Endpoints) into
            # a control-plane connection Secret (consumed by the pipeline below).
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              annotations:
                {{ setResourceNameAnnotation (print $name "-argocd-saextract") }}
              labels:
                app.kubernetes.io/name: rancher-cluster
                app.kubernetes.io/instance: {{ $name }}-argocd-saextract
                app.kubernetes.io/managed-by: crossplane
            spec:
              providerConfigRef:
                name: {{ $name }}
                kind: ClusterProviderConfig
              managementPolicies:
                - Observe
              readiness:
                policy: DeriveFromCelQuery
                celQuery: object.metadata.uid != ""
              writeConnectionSecretToRef:
                name: {{ $argocdSaSecret }}
              connectionDetails:
                - apiVersion: v1
                  kind: Secret
                  name: argocd-manager-token
                  namespace: kube-system
                  fieldPath: data.token
                  toConnectionSecretKey: token
                - apiVersion: v1
                  kind: Secret
                  name: argocd-manager-token
                  namespace: kube-system
                  fieldPath: data[ca.crt]
                  toConnectionSecretKey: ca
                # Direct API endpoint of the downstream cluster (the apiserver IP
                # behind the `kubernetes` Service) — used to build the server URL.
                - apiVersion: v1
                  kind: Endpoints
                  name: kubernetes
                  namespace: default
                  fieldPath: subsets[0].addresses[0].ip
                  toConnectionSecretKey: apiserverIp
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Secret
                  metadata:
                    name: argocd-manager-token
                    namespace: kube-system
            ---
            # (4e) Pull the extracted SA token + downstream CA + endpoint into the pipeline.
            apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
            kind: ExtraResources
            requirements:
              argocd-sa:
                apiVersion: v1
                kind: Secret
                matchName: {{ $argocdSaSecret }}
                namespace: {{ $xrNs }}
            {{- with .extraResources }}
            {{- $saObj := index . "argocd-sa" }}
            {{- if $saObj }}
            {{- $sa := $saObj.items }}
            {{- if $sa }}
            {{- $saData := (index $sa 0).resource.data }}
            {{- if and $saData (hasKey $saData "token") (hasKey $saData "ca") }}
            {{- $ca := index $saData "ca" }}
            {{- $token := index $saData "token" | b64dec }}
            {{- /* Server: spec.argocd.server override, else auto-discovered from
                   the downstream `kubernetes` Endpoints apiserver IP. */}}
            {{- $discovered := "" }}
            {{- if hasKey $saData "apiserverIp" }}
            {{- $discovered = printf "https://%s:6443" (index $saData "apiserverIp" | b64dec) }}
            {{- end }}
            {{- $server := $argocdServerOverride | default $discovered }}
            {{- if $server }}
            ---
            # (4f) Direct-endpoint kubeconfig on the Argo CD cluster: the
            # downstream API server (auto-discovered or spec.argocd.server) +
            # downstream CA + the self-minted SA token.
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              annotations:
                {{ setResourceNameAnnotation (print $name "-argocd-kubeconfig") }}
              labels:
                app.kubernetes.io/name: rancher-cluster
                app.kubernetes.io/instance: {{ $name }}-argocd-kubeconfig
                app.kubernetes.io/managed-by: crossplane
            spec:
              providerConfigRef:
                name: {{ $argocdCpc }}
                kind: ClusterProviderConfig
              managementPolicies:
                - '*'
              readiness:
                policy: DeriveFromCelQuery
                celQuery: object.metadata.uid != ""
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Secret
                  metadata:
                    name: {{ $name }}-argocd-kubeconfig
                    namespace: {{ $argocdNs }}
                  type: Opaque
                  stringData:
                    kubeconfig: |
                      apiVersion: v1
                      kind: Config
                      clusters:
                      - name: {{ $name }}
                        cluster:
                          server: {{ $server }}
                          certificate-authority-data: {{ $ca }}
                      contexts:
                      - name: {{ $name }}
                        context:
                          cluster: {{ $name }}
                          user: argocd-manager
                      current-context: {{ $name }}
                      users:
                      - name: argocd-manager
                        user:
                          token: {{ $token | quote }}
            ---
            # (4g) ClusterbookCluster on the Argo CD cluster. skipReservation +
            # preserveKubeconfigServer keep the direct endpoint verbatim (no
            # clusterbook IP/DNS rewrite); the operator emits cluster-<name>.
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              annotations:
                {{ setResourceNameAnnotation (print $name "-clusterbookcluster") }}
              labels:
                app.kubernetes.io/name: rancher-cluster
                app.kubernetes.io/instance: {{ $name }}-clusterbookcluster
                app.kubernetes.io/managed-by: crossplane
            spec:
              providerConfigRef:
                name: {{ $argocdCpc }}
                kind: ClusterProviderConfig
              managementPolicies:
                - '*'
              forProvider:
                manifest:
                  apiVersion: clusterbook.stuttgart-things.com/v1alpha1
                  kind: ClusterbookCluster
                  metadata:
                    name: {{ $name }}
                  spec:
                    clusterName: {{ $name }}
                    skipReservation: true
                    preserveKubeconfigServer: true
                    argocdNamespace: {{ $argocdNs }}
                    kubeconfigSecretRef:
                      name: {{ $name }}-argocd-kubeconfig
                      namespace: {{ $argocdNs }}
                      key: kubeconfig
                    {{- if $argocdLabels }}
                    labels:
                      {{- range $k, $v := $argocdLabels }}
                      {{ $k }}: {{ $v | quote }}
                      {{- end }}
                    {{- end }}
                    {{- if $argocdAnnotations }}
                    annotations:
                      {{- range $k, $v := $argocdAnnotations }}
                      {{ $k }}: {{ $v | quote }}
                      {{- end }}
                    {{- end }}
                    releaseOnDelete: false
            {{- end }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- end }}

    - step: ready
      functionRef:
        name: function-auto-ready
