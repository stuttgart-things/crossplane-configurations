---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: rancher-cluster
spec:
  compositeTypeRef:
    apiVersion: resources.stuttgart-things.com/v1alpha1
    kind: RancherCluster
  mode: Pipeline
  pipeline:
    - step: render-rancher-cluster
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $spec := .observed.composite.resource.spec }}
            {{- $name := $spec.name }}
            {{- $xrNs := .observed.composite.resource.metadata.namespace }}
            {{- $cpc := $spec.providerConfigRef }}
            {{- $rancherCpc := $spec.rancherProviderConfigRef | default $cpc }}
            {{- $split := ne $rancherCpc $cpc }}
            {{- $rancherNs := $spec.rancherNamespace | default "fleet-default" }}
            {{- $bridgedSecret := print $name "-kubeconfig-bridged" }}
            {{- /* Where the wired CPC + Argo CD path read the kubeconfig from:
                   co-located → Rancher's published Secret on the (shared) cluster;
                   split      → the bridged connection Secret on the control plane. */}}
            {{- $kcfgSecretName := ternary $bridgedSecret (print $name "-kubeconfig") $split }}
            {{- $kcfgSecretNs := ternary $xrNs $rancherNs $split }}
            {{- $version := $spec.kubernetesVersion }}
            {{- $infra := $spec.infrastructure | default "generic" }}
            {{- $harvester := $spec.harvester | default dict }}
            {{- $bootstrap := $spec.bootstrap | default dict }}
            {{- $bootstrapNs := $bootstrap.namespace | default "crossplane-bootstrap" }}
            {{- $argocd := $spec.argocd | default dict }}
            {{- $argocdRegister := $argocd.register | default false }}
            {{- $argocdNs := $argocd.namespace | default "argocd" }}
            {{- $tokenRef := $argocd.tokenSecretRef | default dict }}
            {{- $tokenKey := $tokenRef.key | default "token" }}
            {{- if eq $infra "harvester" }}
            {{- /* Harvester VM nodes: a HarvesterConfig (the VM template) plus a
                   provisioning Cluster whose single machine pool references it. */}}
            {{- $hcfgName := print $name "-pool1" }}
            {{- $hImage := $harvester.imageName }}
            {{- $hNetwork := $harvester.networkName }}
            {{- $hVmNs := $harvester.vmNamespace | default "default" }}
            {{- $hCpu := $harvester.cpuCount | default 2 }}
            {{- $hMem := $harvester.memorySize | default 4 }}
            {{- $hDisk := $harvester.diskSize | default 40 }}
            {{- $hSshUser := $harvester.sshUser | default "ubuntu" }}
            {{- $hQuantity := $harvester.quantity | default 1 }}
            {{- $defaultUserData := "#cloud-config\npackage_update: true\npackages:\n  - qemu-guest-agent\nruncmd:\n  - - systemctl\n    - enable\n    - '--now'\n    - qemu-guest-agent.service\n" }}
            {{- $userData := $harvester.userData | default $defaultUserData }}
            {{- $diskInfo := dict "disks" (list (dict "imageName" $hImage "bootOrder" 1 "size" $hDisk)) | toJson }}
            {{- $networkInfo := dict "interfaces" (list (dict "networkName" $hNetwork "macAddress" "")) | toJson }}
            ---
            # (1a) MACHINE CONFIG — the Harvester VM template the machine pool
            # references. HarvesterConfig is a flat CRD (fields at the top level,
            # no spec). diskInfo/networkInfo are JSON strings Rancher expects.
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              annotations:
                {{ setResourceNameAnnotation (print $name "-harvesterconfig") }}
              labels:
                app.kubernetes.io/name: rancher-cluster
                app.kubernetes.io/instance: {{ $name }}-harvesterconfig
                app.kubernetes.io/managed-by: crossplane
            spec:
              providerConfigRef:
                name: {{ $rancherCpc }}
                kind: ClusterProviderConfig
              managementPolicies:
                - '*'
              forProvider:
                manifest:
                  apiVersion: rke-machine-config.cattle.io/v1
                  kind: HarvesterConfig
                  metadata:
                    name: {{ $hcfgName }}
                    namespace: {{ $rancherNs }}
                  cpuCount: {{ $hCpu | quote }}
                  memorySize: {{ $hMem | quote }}
                  diskSize: "0"
                  diskInfo: {{ $diskInfo | quote }}
                  imageName: ""
                  networkInfo: {{ $networkInfo | quote }}
                  networkName: ""
                  vmNamespace: {{ $hVmNs }}
                  sshUser: {{ $hSshUser }}
                  sshPort: "22"
                  reservedMemorySize: "-1"
                  userData: {{ $userData | b64enc }}
            ---
            # (1b) PROVISION (Harvester) — provisioning Cluster with one machine
            # pool backed by the HarvesterConfig above and a Harvester cloud
            # credential. Rancher creates the VMs and registers them as nodes.
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              annotations:
                {{ setResourceNameAnnotation (print $name "-cluster") }}
              labels:
                app.kubernetes.io/name: rancher-cluster
                app.kubernetes.io/instance: {{ $name }}-cluster
                app.kubernetes.io/managed-by: crossplane
            spec:
              providerConfigRef:
                name: {{ $rancherCpc }}
                kind: ClusterProviderConfig
              managementPolicies:
                - '*'
              forProvider:
                manifest:
                  apiVersion: provisioning.cattle.io/v1
                  kind: Cluster
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $rancherNs }}
                    {{- if $spec.clusterLabels }}
                    labels:
                      {{- range $k, $v := $spec.clusterLabels }}
                      {{ $k }}: {{ $v | quote }}
                      {{- end }}
                    {{- end }}
                  spec:
                    kubernetesVersion: {{ $version }}
                    cloudCredentialSecretName: {{ $harvester.cloudCredentialSecretName }}
                    rkeConfig:
                      machinePools:
                        - name: pool1
                          etcdRole: true
                          controlPlaneRole: true
                          workerRole: true
                          quantity: {{ $hQuantity }}
                          machineConfigRef:
                            kind: HarvesterConfig
                            name: {{ $hcfgName }}
                      {{- if $spec.machineGlobalConfig }}
                      machineGlobalConfig:
                        {{- $spec.machineGlobalConfig | toYaml | nindent 12 }}
                      {{- else }}
                      machineGlobalConfig: {}
                      {{- end }}
            {{- else }}
            ---
            # (1) PROVISION — the generic (custom-node) Rancher cluster on the
            # Rancher management cluster (rancherProviderConfigRef; = the control
            # plane when co-located). No machinePools: nodes are registered
            # manually via the Rancher registration command. The +k3s/+rke2
            # suffix on kubernetesVersion selects the distribution.
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              annotations:
                {{ setResourceNameAnnotation (print $name "-cluster") }}
              labels:
                app.kubernetes.io/name: rancher-cluster
                app.kubernetes.io/instance: {{ $name }}-cluster
                app.kubernetes.io/managed-by: crossplane
            spec:
              providerConfigRef:
                name: {{ $rancherCpc }}
                kind: ClusterProviderConfig
              managementPolicies:
                - '*'
              forProvider:
                manifest:
                  apiVersion: provisioning.cattle.io/v1
                  kind: Cluster
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $rancherNs }}
                    {{- if $spec.clusterLabels }}
                    labels:
                      {{- range $k, $v := $spec.clusterLabels }}
                      {{ $k }}: {{ $v | quote }}
                      {{- end }}
                    {{- end }}
                  spec:
                    kubernetesVersion: {{ $version }}
                    rkeConfig:
                      {{- if $spec.machineGlobalConfig }}
                      machineGlobalConfig:
                        {{- $spec.machineGlobalConfig | toYaml | nindent 12 }}
                      {{- else }}
                      machineGlobalConfig: {}
                      {{- end }}
            {{- end }}
            {{- if $split }}
            ---
            # (1b) BRIDGE — only when Crossplane and Rancher are on DIFFERENT
            # clusters. Rancher publishes <name>-kubeconfig on the Rancher
            # cluster (rancherProviderConfigRef), but the wired CPC below must
            # read it from the control-plane cluster where provider-kubernetes
            # runs. Observe the published Secret on the Rancher cluster and
            # surface its `value` as a connection Secret on the control plane
            # (<name>-kubeconfig-bridged, in the XR namespace) for the wired CPC
            # — and the Argo CD path — to consume.
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              annotations:
                {{ setResourceNameAnnotation (print $name "-kubeconfig-bridge") }}
              labels:
                app.kubernetes.io/name: rancher-cluster
                app.kubernetes.io/instance: {{ $name }}-kubeconfig-bridge
                app.kubernetes.io/managed-by: crossplane
            spec:
              providerConfigRef:
                name: {{ $rancherCpc }}
                kind: ClusterProviderConfig
              managementPolicies:
                - Observe
              writeConnectionSecretToRef:
                name: {{ $bridgedSecret }}
              connectionDetails:
                - apiVersion: v1
                  kind: Secret
                  name: {{ $name }}-kubeconfig
                  namespace: {{ $rancherNs }}
                  fieldPath: data.value
                  toConnectionSecretKey: value
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Secret
                  metadata:
                    name: {{ $name }}-kubeconfig
                    namespace: {{ $rancherNs }}
            {{- end }}
            ---
            # (2) WIRE — a ClusterProviderConfig on the control-plane cluster
            # pointing at the kubeconfig Secret for the downstream cluster.
            # Co-located: Rancher's published `<name>-kubeconfig` (key `value`)
            # directly. Split: the bridged Secret from step (1b). No
            # copy/transform; provider-kubernetes retries until the Secret lands.
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              annotations:
                {{ setResourceNameAnnotation (print $name "-providerconfig") }}
              labels:
                app.kubernetes.io/name: rancher-cluster
                app.kubernetes.io/instance: {{ $name }}-providerconfig
                app.kubernetes.io/managed-by: crossplane
            spec:
              providerConfigRef:
                name: {{ $cpc }}
                kind: ClusterProviderConfig
              managementPolicies:
                - '*'
              # A ClusterProviderConfig is a static config resource with no
              # status conditions, so the default SuccessfulCreate/DeriveFromObject
              # policies never latch Ready (leaving the XR stuck NotReady). Derive
              # readiness from existence instead — once the object has a uid it is
              # created and usable.
              readiness:
                policy: DeriveFromCelQuery
                celQuery: object.metadata.uid != ""
              forProvider:
                manifest:
                  apiVersion: kubernetes.m.crossplane.io/v1alpha1
                  kind: ClusterProviderConfig
                  metadata:
                    name: {{ $name }}
                  spec:
                    credentials:
                      source: Secret
                      secretRef:
                        namespace: {{ $kcfgSecretNs }}
                        name: {{ $kcfgSecretName }}
                        key: value
            ---
            # (3) USE — bootstrap a Namespace on the DOWNSTREAM cluster through
            # the ClusterProviderConfig wired in step (2). Observe+Create adopts
            # a pre-existing namespace and never modifies/deletes it. This is the
            # proof that the extracted kubeconfig is usable by Crossplane.
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              annotations:
                {{ setResourceNameAnnotation (print $name "-bootstrap-namespace") }}
              labels:
                app.kubernetes.io/name: rancher-cluster
                app.kubernetes.io/instance: {{ $name }}-bootstrap-namespace
                app.kubernetes.io/managed-by: crossplane
            spec:
              providerConfigRef:
                name: {{ $name }}
                kind: ClusterProviderConfig
              managementPolicies:
                - Observe
                - Create
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Namespace
                  metadata:
                    name: {{ $bootstrapNs }}
                    {{- if $bootstrap.labels }}
                    labels:
                      {{- range $k, $v := $bootstrap.labels }}
                      {{ $k }}: {{ $v | quote }}
                      {{- end }}
                    {{- end }}
            ---
            apiVersion: resources.stuttgart-things.com/v1alpha1
            kind: RancherCluster
            status:
              kubeconfigSecret: {{ $name }}-kubeconfig
              clusterProviderConfig: {{ $name }}
              {{- if $argocdRegister }}
              argocdClusterSecret: cluster-{{ $name }}
              {{- end }}
            {{- if $argocdRegister }}
            ---
            # (4) ARGO CD REGISTRATION (optional, spec.argocd.register=true).
            # Ask Crossplane to fetch the Rancher-managed kubeconfig Secret and
            # the dedicated-token Secret into the pipeline so we can read their
            # contents (extra-resources is native to function-go-templating).
            apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
            kind: ExtraResources
            requirements:
              rancher-kubeconfig:
                apiVersion: v1
                kind: Secret
                matchName: {{ $kcfgSecretName }}
                namespace: {{ $kcfgSecretNs }}
              dedicated-token:
                apiVersion: v1
                kind: Secret
                matchName: {{ $tokenRef.name }}
                namespace: {{ $tokenRef.namespace }}
            {{- with .extraResources }}
            {{- $rkObj := index . "rancher-kubeconfig" }}
            {{- $dtObj := index . "dedicated-token" }}
            {{- if and $rkObj $dtObj }}
            {{- $rk := $rkObj.items }}
            {{- $dt := $dtObj.items }}
            {{- if and $rk $dt }}
            {{- $kcfg := (index $rk 0).resource.data.value | b64dec | fromYaml }}
            {{- $cluster := (index $kcfg.clusters 0).cluster }}
            {{- $server := $cluster.server }}
            {{- $ca := index $cluster "certificate-authority-data" }}
            {{- $token := index (index $dt 0).resource.data $tokenKey | b64dec }}
            ---
            # Assembled kubeconfig: Rancher's auth-proxy server + CA, but our
            # dedicated non-expiring token (not the kubeconfig's own token).
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              annotations:
                {{ setResourceNameAnnotation (print $name "-argocd-kubeconfig") }}
              labels:
                app.kubernetes.io/name: rancher-cluster
                app.kubernetes.io/instance: {{ $name }}-argocd-kubeconfig
                app.kubernetes.io/managed-by: crossplane
            spec:
              providerConfigRef:
                name: {{ $cpc }}
                kind: ClusterProviderConfig
              managementPolicies:
                - '*'
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Secret
                  metadata:
                    name: {{ $name }}-argocd-kubeconfig
                    namespace: {{ $argocdNs }}
                  type: Opaque
                  stringData:
                    kubeconfig: |
                      apiVersion: v1
                      kind: Config
                      clusters:
                      - name: {{ $name }}
                        cluster:
                          server: {{ $server }}
                          certificate-authority-data: {{ $ca }}
                      contexts:
                      - name: {{ $name }}
                        context:
                          cluster: {{ $name }}
                          user: {{ $name }}
                      current-context: {{ $name }}
                      users:
                      - name: {{ $name }}
                        user:
                          token: {{ $token | quote }}
            ---
            # ClusterbookCluster: clusterbook-operator reads the kubeconfig
            # above and creates the Argo CD cluster Secret. skipReservation +
            # preserveKubeconfigServer keep the Rancher proxy server verbatim
            # (no clusterbook IP/DNS rewrite).
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              annotations:
                {{ setResourceNameAnnotation (print $name "-clusterbookcluster") }}
              labels:
                app.kubernetes.io/name: rancher-cluster
                app.kubernetes.io/instance: {{ $name }}-clusterbookcluster
                app.kubernetes.io/managed-by: crossplane
            spec:
              providerConfigRef:
                name: {{ $cpc }}
                kind: ClusterProviderConfig
              managementPolicies:
                - '*'
              forProvider:
                manifest:
                  apiVersion: clusterbook.stuttgart-things.com/v1alpha1
                  kind: ClusterbookCluster
                  metadata:
                    name: {{ $name }}
                  spec:
                    clusterName: {{ $name }}
                    skipReservation: true
                    preserveKubeconfigServer: true
                    argocdNamespace: {{ $argocdNs }}
                    kubeconfigSecretRef:
                      name: {{ $name }}-argocd-kubeconfig
                      namespace: {{ $argocdNs }}
                      key: kubeconfig
                    {{- if $argocd.labels }}
                    labels:
                      {{- range $k, $v := $argocd.labels }}
                      {{ $k }}: {{ $v | quote }}
                      {{- end }}
                    {{- end }}
                    releaseOnDelete: false
            {{- end }}
            {{- end }}
            {{- end }}
            {{- end }}

    - step: ready
      functionRef:
        name: function-auto-ready
