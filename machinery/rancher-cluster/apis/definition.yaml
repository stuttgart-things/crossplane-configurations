---
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: rancherclusters.resources.stuttgart-things.com
spec:
  group: resources.stuttgart-things.com
  defaultCompositeDeletePolicy: Foreground
  scope: Namespaced
  names:
    kind: RancherCluster
    plural: rancherclusters
    singular: ranchercluster
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                providerConfigRef:
                  type: string
                  description: >-
                    Name of the provider-kubernetes ClusterProviderConfig for
                    the CONTROL-PLANE cluster where Crossplane runs. The wired
                    downstream ClusterProviderConfig, the bridged kubeconfig
                    Secret and (optional) Argo CD objects are created here. When
                    co-located with Rancher (the default, see
                    rancherProviderConfigRef) this is also where the
                    provisioning.cattle.io Cluster lands.
                rancherProviderConfigRef:
                  type: string
                  description: >-
                    Optional. Name of the provider-kubernetes
                    ClusterProviderConfig that targets the Rancher MANAGEMENT
                    cluster (where the provisioning.cattle.io Cluster is created
                    and Rancher publishes <name>-kubeconfig). Defaults to
                    providerConfigRef — i.e. Crossplane and Rancher co-located
                    on one cluster. Set this to a DIFFERENT
                    ClusterProviderConfig to split them: the Composition then
                    bridges Rancher's published kubeconfig to the control-plane
                    cluster via an Observe Object + connection Secret, and wires
                    the downstream ClusterProviderConfig against the bridged
                    copy.
                name:
                  type: string
                  description: >-
                    Name of the Rancher cluster. Also the prefix of the
                    Rancher-managed kubeconfig Secret (`<name>-kubeconfig`) and
                    the name of the emitted downstream ClusterProviderConfig.
                distro:
                  type: string
                  description: "Kubernetes distribution for the cluster."
                  enum:
                    - k3s
                    - rke2
                  default: k3s
                infrastructure:
                  type: string
                  description: >-
                    How the cluster's nodes are provisioned. `generic`
                    (default) creates a custom-node cluster with no machine
                    pools — nodes are registered manually via Rancher's
                    registration command. `harvester` provisions VM nodes on a
                    Harvester cluster via a machine pool backed by a
                    HarvesterConfig; requires the `harvester` block.
                  enum:
                    - generic
                    - harvester
                  default: generic
                kubernetesVersion:
                  type: string
                  description: >-
                    Rancher Kubernetes version, e.g. `v1.34.7+k3s1` or
                    `v1.31.5+rke2r1`. The `+k3s`/`+rke2` suffix selects the
                    distribution; keep it consistent with `distro`.
                rancherNamespace:
                  type: string
                  description: >-
                    Namespace on the management cluster holding the
                    provisioning Cluster and the Rancher-managed kubeconfig
                    Secret.
                  default: fleet-default
                clusterLabels:
                  type: object
                  description: "Extra labels for the provisioning.cattle.io Cluster."
                  additionalProperties:
                    type: string
                machineGlobalConfig:
                  type: object
                  description: >-
                    Free-form rkeConfig.machineGlobalConfig passthrough
                    (e.g. cni, disable, kube-apiserver-arg).
                  x-kubernetes-preserve-unknown-fields: true
                harvester:
                  type: object
                  description: >-
                    VM node sizing for `infrastructure: harvester`. The
                    Composition renders a HarvesterConfig (the VM template) and
                    a single machine pool referencing it. Ignored when
                    infrastructure is generic.
                  properties:
                    cloudCredentialSecretName:
                      type: string
                      description: >-
                        Rancher Harvester cloud credential, in
                        `<namespace>:<name>` form (e.g.
                        `cattle-global-data:cc-xxxxx`). Must already exist on
                        the Rancher cluster — created once via the Rancher UI /
                        API, referenced here by name.
                    imageName:
                      type: string
                      description: >-
                        Harvester VM image, `<namespace>/<name>`
                        (e.g. `default/sthings-u26-k3s`).
                    networkName:
                      type: string
                      description: >-
                        Harvester network, `<namespace>/<name>`
                        (e.g. `default/vms`).
                    vmNamespace:
                      type: string
                      description: "Harvester namespace the VMs are created in."
                      default: default
                    cpuCount:
                      type: integer
                      description: "vCPUs per node."
                      default: 2
                    memorySize:
                      type: integer
                      description: "Memory per node, in GiB."
                      default: 4
                    diskSize:
                      type: integer
                      description: "Root disk per node, in GiB."
                      default: 40
                    sshUser:
                      type: string
                      description: >-
                        SSH user baked into the image (e.g. `ubuntu`, `sthings`).
                      default: ubuntu
                    quantity:
                      type: integer
                      description: "Number of nodes in the pool."
                      default: 1
                    userData:
                      type: string
                      description: >-
                        cloud-init userData for the nodes (plain YAML; the
                        Composition base64-encodes it for HarvesterConfig).
                        Defaults to installing + enabling qemu-guest-agent,
                        which Harvester needs for IP reporting.
                  required:
                    - cloudCredentialSecretName
                    - imageName
                    - networkName
                bootstrap:
                  type: object
                  description: >-
                    Resources to apply to the DOWNSTREAM cluster via the
                    wired ClusterProviderConfig — proves the kubeconfig works.
                  properties:
                    namespace:
                      type: string
                      description: "Namespace to bootstrap on the downstream cluster."
                      default: crossplane-bootstrap
                    labels:
                      type: object
                      description: "Labels for the downstream bootstrap namespace."
                      additionalProperties:
                        type: string
                  default:
                    namespace: crossplane-bootstrap
                argocd:
                  type: object
                  description: >-
                    Optional: register the provisioned cluster in Argo CD via
                    the clusterbook-operator. Mints a non-expiring argocd-manager
                    ServiceAccount token on the downstream cluster, extracts it +
                    the downstream CA to the control plane, and assembles a
                    direct-endpoint kubeconfig (spec.argocd.server + downstream
                    CA + SA token — no Rancher proxy dependency). Emits the
                    kubeconfig Secret + a ClusterbookCluster on the cluster that
                    runs Argo CD + clusterbook-operator (providerConfigRef).
                  properties:
                    register:
                      type: boolean
                      description: "Enable Argo CD registration via clusterbook-operator."
                      default: false
                    namespace:
                      type: string
                      description: >-
                        Argo CD namespace — holds the assembled kubeconfig
                        Secret and the generated cluster Secret.
                      default: argocd
                    providerConfigRef:
                      type: string
                      description: >-
                        ClusterProviderConfig for the cluster running Argo CD +
                        clusterbook-operator (where the kubeconfig Secret and
                        ClusterbookCluster are created). Defaults to
                        spec.rancherProviderConfigRef — in the stuttgart-things
                        lab Argo CD + clusterbook run on the Rancher cluster, not
                        the Crossplane control plane.
                    server:
                      type: string
                      description: >-
                        Direct API endpoint of the downstream cluster
                        (https://<host>:6443) embedded verbatim in the assembled
                        kubeconfig. Use a stable VIP/LB for HA clusters; a node IP
                        is fine for single-node. Required when register is true.
                    labels:
                      type: object
                      description: >-
                        Labels for the ClusterbookCluster / Argo CD cluster
                        Secret (e.g. for ApplicationSet cluster selectors).
                      additionalProperties:
                        type: string
                  default:
                    register: false
                  x-kubernetes-validations:
                    - rule: "self.register == false || has(self.server)"
                      message: "spec.argocd.server is required when spec.argocd.register is true"
              required:
                - providerConfigRef
                - name
                - kubernetesVersion
              x-kubernetes-validations:
                - rule: "self.infrastructure != 'harvester' || has(self.harvester)"
                  message: "spec.harvester is required when spec.infrastructure is 'harvester'"
            status:
              type: object
              properties:
                kubeconfigSecret:
                  type: string
                  description: "Name of the Rancher-managed kubeconfig Secret."
                clusterProviderConfig:
                  type: string
                  description: "Name of the emitted downstream ClusterProviderConfig."
                argocdClusterSecret:
                  type: string
                  description: "Name of the Argo CD cluster Secret clusterbook-operator generates (cluster-<name>)."
                ready:
                  type: boolean
