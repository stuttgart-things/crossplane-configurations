---
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: rancherclusters.resources.stuttgart-things.com
spec:
  group: resources.stuttgart-things.com
  defaultCompositeDeletePolicy: Foreground
  scope: Namespaced
  names:
    kind: RancherCluster
    plural: rancherclusters
    singular: ranchercluster
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                environmentConfig:
                  type: string
                  description: >-
                    Selects the EnvironmentConfig (by the config-scoped label
                    `rancher-cluster.resources.stuttgart-things.com/environment`)
                    that supplies per-environment defaults — providerConfigRef(s),
                    rancherNamespace, distro, kubernetesVersion, the Harvester
                    infra fields and the Argo CD target. Anything set on this XR
                    spec wins over the EnvironmentConfig.
                  default: default
                providerConfigRef:
                  type: string
                  description: >-
                    Name of the provider-kubernetes ClusterProviderConfig for
                    the CONTROL-PLANE cluster where Crossplane runs. The wired
                    downstream ClusterProviderConfig, the bridged kubeconfig
                    Secret and (optional) Argo CD objects are created here. When
                    co-located with Rancher (the default, see
                    rancherProviderConfigRef) this is also where the
                    provisioning.cattle.io Cluster lands. Falls back to the
                    EnvironmentConfig `providerConfigRef` when unset.
                rancherProviderConfigRef:
                  type: string
                  description: >-
                    Optional. Name of the provider-kubernetes
                    ClusterProviderConfig that targets the Rancher MANAGEMENT
                    cluster (where the provisioning.cattle.io Cluster is created
                    and Rancher publishes <name>-kubeconfig). Defaults to
                    providerConfigRef — i.e. Crossplane and Rancher co-located
                    on one cluster. Set this to a DIFFERENT
                    ClusterProviderConfig to split them: the Composition then
                    bridges Rancher's published kubeconfig to the control-plane
                    cluster via an Observe Object + connection Secret, and wires
                    the downstream ClusterProviderConfig against the bridged
                    copy.
                name:
                  type: string
                  description: >-
                    Name of the Rancher cluster. Also the prefix of the
                    Rancher-managed kubeconfig Secret (`<name>-kubeconfig`) and
                    the name of the emitted downstream ClusterProviderConfig.
                distro:
                  type: string
                  description: >-
                    Kubernetes distribution for the cluster. Falls back to the
                    EnvironmentConfig `distro`, then `k3s`.
                  enum:
                    - k3s
                    - rke2
                infrastructure:
                  type: string
                  description: >-
                    How the cluster's nodes are provisioned. `generic`
                    (default) creates a custom-node cluster with no machine
                    pools — nodes are registered manually via Rancher's
                    registration command. `harvester` provisions VM nodes on a
                    Harvester cluster via a machine pool backed by a
                    HarvesterConfig; requires the `harvester` block.
                  enum:
                    - generic
                    - harvester
                  default: generic
                kubernetesVersion:
                  type: string
                  description: >-
                    Rancher Kubernetes version, e.g. `v1.34.7+k3s1` or
                    `v1.31.5+rke2r1`. The `+k3s`/`+rke2` suffix selects the
                    distribution; keep it consistent with `distro`. Falls back to
                    the EnvironmentConfig `kubernetesVersion` when unset.
                rancherNamespace:
                  type: string
                  description: >-
                    Namespace on the management cluster holding the
                    provisioning Cluster and the Rancher-managed kubeconfig
                    Secret. Falls back to the EnvironmentConfig `rancherNamespace`,
                    then `fleet-default`.
                clusterLabels:
                  type: object
                  description: "Extra labels for the provisioning.cattle.io Cluster."
                  additionalProperties:
                    type: string
                machineGlobalConfig:
                  type: object
                  description: >-
                    Free-form rkeConfig.machineGlobalConfig passthrough
                    (e.g. cni, disable, kube-apiserver-arg).
                  x-kubernetes-preserve-unknown-fields: true
                harvester:
                  type: object
                  description: >-
                    VM node config for `infrastructure: harvester`. The
                    Composition renders a HarvesterConfig (the VM template) and
                    a single machine pool referencing it. Ignored when
                    infrastructure is generic. The infra-identity fields
                    (cloudCredentialSecretName, imageName, networkName,
                    vmNamespace, sshUser) fall back to the EnvironmentConfig, so
                    a per-cluster XR typically only sets sizing/quantity here.
                  properties:
                    cloudCredentialSecretName:
                      type: string
                      description: >-
                        Rancher Harvester cloud credential, in
                        `<namespace>:<name>` form (e.g.
                        `cattle-global-data:cc-xxxxx`). Must already exist on the
                        Rancher cluster. Falls back to the EnvironmentConfig
                        `cloudCredentialSecretName`.
                    imageName:
                      type: string
                      description: >-
                        Harvester VM image, `<namespace>/<name>`
                        (e.g. `default/sthings-u26-k3s`). Falls back to the
                        EnvironmentConfig `imageName`.
                    networkName:
                      type: string
                      description: >-
                        Harvester network, `<namespace>/<name>`
                        (e.g. `default/vms`). Falls back to the EnvironmentConfig
                        `networkName`.
                    vmNamespace:
                      type: string
                      description: >-
                        Harvester namespace the VMs are created in. Falls back to
                        the EnvironmentConfig `vmNamespace`, then `default`.
                    cpuCount:
                      type: integer
                      description: "vCPUs per node."
                      default: 2
                    memorySize:
                      type: integer
                      description: "Memory per node, in GiB."
                      default: 4
                    diskSize:
                      type: integer
                      description: "Root disk per node, in GiB."
                      default: 40
                    sshUser:
                      type: string
                      description: >-
                        SSH user baked into the image (e.g. `ubuntu`, `sthings`).
                        Falls back to the EnvironmentConfig `sshUser`, then
                        `ubuntu`.
                    quantity:
                      type: integer
                      description: "Number of nodes in the pool."
                      default: 1
                    userData:
                      type: string
                      description: >-
                        cloud-init userData for the nodes (plain YAML; the
                        Composition base64-encodes it for HarvesterConfig).
                        Defaults to installing + enabling qemu-guest-agent,
                        which Harvester needs for IP reporting.
                bootstrap:
                  type: object
                  description: >-
                    Resources to apply to the DOWNSTREAM cluster via the
                    wired ClusterProviderConfig — proves the kubeconfig works.
                  properties:
                    namespace:
                      type: string
                      description: "Namespace to bootstrap on the downstream cluster."
                      default: crossplane-bootstrap
                    labels:
                      type: object
                      description: "Labels for the downstream bootstrap namespace."
                      additionalProperties:
                        type: string
                  default:
                    namespace: crossplane-bootstrap
                argocd:
                  type: object
                  description: >-
                    Optional: register the provisioned cluster in Argo CD via
                    the clusterbook-operator. Mints a non-expiring argocd-manager
                    ServiceAccount token on the downstream cluster, extracts it +
                    the downstream CA to the control plane, auto-discovers the
                    cluster's direct API endpoint, and assembles a direct-endpoint
                    kubeconfig (no Rancher proxy dependency). Emits the kubeconfig
                    Secret + a ClusterbookCluster on the cluster that runs Argo CD
                    + clusterbook-operator (providerConfigRef).
                  properties:
                    register:
                      type: boolean
                      description: "Enable Argo CD registration via clusterbook-operator."
                      default: false
                    namespace:
                      type: string
                      description: >-
                        Argo CD namespace — holds the assembled kubeconfig
                        Secret and the generated cluster Secret. Falls back to the
                        EnvironmentConfig `argocdNamespace`, then `argocd`.
                    providerConfigRef:
                      type: string
                      description: >-
                        ClusterProviderConfig for the cluster running Argo CD +
                        clusterbook-operator (where the kubeconfig Secret and
                        ClusterbookCluster are created). Falls back to the
                        EnvironmentConfig `argocdProviderConfigRef`, then
                        spec.rancherProviderConfigRef — in the stuttgart-things
                        lab Argo CD + clusterbook run on the Rancher cluster, not
                        the Crossplane control plane.
                    server:
                      type: string
                      description: >-
                        Optional override for the downstream cluster's direct API
                        endpoint (https://<host>:6443). Normally left UNSET — the
                        Composition auto-discovers it from the downstream
                        `kubernetes` Endpoints. Set this only for HA clusters
                        where you want a stable VIP/LB instead of a node IP.
                    labels:
                      type: object
                      description: >-
                        Labels for the ClusterbookCluster / Argo CD cluster
                        Secret (e.g. for ApplicationSet cluster selectors —
                        the platform profile toggles like
                        `cicd-platform/crossplane: 'true'`).
                      additionalProperties:
                        type: string
                    annotations:
                      type: object
                      description: >-
                        Annotations for the ClusterbookCluster / Argo CD
                        cluster Secret. Platform ApplicationSets read component
                        parameters from these (e.g.
                        `clusterbook.stuttgart-things.com/vault-server`,
                        `storage-platform.stuttgart-things.com/nfs-server`).
                        Set only the `[user]` annotations here; `[auto]` ones
                        (ip/fqdn/…) are stamped by the clusterbook controller
                        from the reservation and are absent when
                        skipReservation is true.
                      additionalProperties:
                        type: string
                  default:
                    register: false
              # providerConfigRef, kubernetesVersion and the Harvester infra
              # fields are resolved from the EnvironmentConfig when unset, so they
              # are not `required` here (CEL cannot see EnvironmentConfig values).
              # spec.argocd.server is auto-discovered, not required.
              required:
                - name
            status:
              type: object
              properties:
                kubeconfigSecret:
                  type: string
                  description: "Name of the Rancher-managed kubeconfig Secret."
                clusterProviderConfig:
                  type: string
                  description: "Name of the emitted downstream ClusterProviderConfig."
                argocdClusterSecret:
                  type: string
                  description: "Name of the Argo CD cluster Secret clusterbook-operator generates (cluster-<name>)."
                ready:
                  type: boolean
