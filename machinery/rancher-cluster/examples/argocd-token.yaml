---
# Cluster precondition for Argo CD registration (spec.argocd.register=true):
# a dedicated, NON-EXPIRING Rancher API token for a least-privilege service
# user (e.g. `service-argo` with the cluster's `Cluster Owner`/`Member` role).
#
# Create the token out-of-band (Rancher GUI: API & Keys -> Add Key with no
# expiry, or POST /v3/tokens with ttl=0), then store it here. In production
# prefer sourcing this Secret from Vault/ESO rather than committing it.
#
# rancher-cluster reads server + CA from Rancher's `<name>-kubeconfig` Secret
# and combines them with THIS token to build the kubeconfig clusterbook-operator
# hands to Argo CD.
apiVersion: v1
kind: Secret
metadata:
  name: rancher-argocd-token
  namespace: crossplane-system
type: Opaque
stringData:
  # Rancher API token in `token-id:token-secret` form (the `u-xxxx:yyyy` value
  # shown in a Rancher kubeconfig's `users[].user.token`).
  token: "u-xxxxxxxxxx:replace-with-non-expiring-rancher-api-token" # pragma: allowlist secret
