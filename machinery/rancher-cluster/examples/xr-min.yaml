---
# Minimal RancherCluster: only `name` is required. Everything else
# (providerConfigRef, kubernetesVersion, distro, rancherNamespace, …) comes from
# the EnvironmentConfig selected by `environmentConfig`. See
# examples/environment-config.yaml.
apiVersion: resources.stuttgart-things.com/v1alpha1
kind: RancherCluster
metadata:
  name: k3s-min
  namespace: default
spec:
  name: k3s-min
  environmentConfig: default
