---
# Harvester cluster, split control plane — minimal form.
#
# All the lab-constant config (providerConfigRef + rancherProviderConfigRef,
# rancherNamespace, distro, kubernetesVersion, the Harvester image/network/
# credential/vmNamespace/sshUser, and the Argo CD target) comes from the
# EnvironmentConfig `rancher-cluster-defaults` selected by `environmentConfig`.
# This XR only carries per-cluster values: name, sizing, and the Argo CD toggle.
#
# Anything below overrides the EnvironmentConfig. To register in Argo CD, the
# server endpoint is auto-discovered from the downstream cluster — you do NOT
# provide it. See examples/environment-config.yaml and MIXED-CLUSTER.md.
apiVersion: resources.stuttgart-things.com/v1alpha1
kind: RancherCluster
metadata:
  name: k3s-xp
  namespace: default
spec:
  name: k3s-xp
  environmentConfig: default      # -> rancher-cluster-defaults
  infrastructure: harvester
  harvester:                      # per-cluster sizing (infra fields from env)
    cpuCount: 6
    memorySize: 6
    quantity: 1
  argocd:
    register: true                # target + server resolved automatically
