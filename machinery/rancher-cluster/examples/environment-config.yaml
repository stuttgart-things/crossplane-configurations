---
# Shared per-environment defaults for RancherCluster XRs.
#
# The `rancher-cluster` Composition selects this EnvironmentConfig via the
# config-scoped label `rancher-cluster.resources.stuttgart-things.com/environment`,
# matched against the XR's `spec.environmentConfig` (default "default"). The key
# is namespaced to this Configuration so it never collides with another
# Configuration's EnvironmentConfig (function-environment-configs requires
# exactly one Selector match). The `data` values become defaults in the pipeline;
# anything set explicitly on the XR spec wins over them.
#
# This holds the lab-constant fields so a RancherCluster XR shrinks to per-cluster
# values (name, sizing, argocd.register). NOTE: values below are PLACEHOLDERS
# matching the stuttgart-things split lab — replace with your environment.
apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: rancher-cluster-defaults
  labels:
    rancher-cluster.resources.stuttgart-things.com/environment: default
data:
  # Control-plane cluster where Crossplane runs (wired CPC + bridged Secret land here)
  providerConfigRef: in-cluster
  # Rancher management cluster (provisioning.cattle.io + Harvester)
  rancherProviderConfigRef: rancher-mgmt
  # Namespace of the provisioning Cluster + Rancher-managed kubeconfig Secret
  rancherNamespace: fleet-default
  # Distro + Kubernetes version (lab standard; override per XR if needed)
  distro: k3s
  kubernetesVersion: v1.35.4+k3s1

  # --- Harvester infrastructure defaults (infrastructure: harvester) ---
  # Harvester cloud credential, cattle-global-data:<name>
  cloudCredentialSecretName: cattle-global-data:cc-cl944  # pragma: allowlist secret
  # Harvester VM image, <namespace>/<image>
  imageName: default/sthings-u26-k3s
  # Harvester network, <namespace>/<network>
  networkName: default/vms
  # Harvester namespace the VMs are created in
  vmNamespace: default
  # SSH user baked into the image
  sshUser: sthings

  # --- Argo CD registration defaults (argocd.register: true) ---
  # Namespace + cluster running Argo CD + clusterbook-operator
  argocdNamespace: argocd
  argocdProviderConfigRef: rancher-mgmt

  # --- Default platform labels for the ClusterbookCluster / Argo CD cluster
  # Secret. BASE values; spec.argocd.labels on the XR overrides per key.
  # auto-project on by default (creates the per-cluster AppProject the platform
  # AppSets reference). Every profile toggle defaults to 'false' so a bare XR
  # deploys nothing — enable a component by setting only its umbrella + that
  # toggle to 'true' on the XR; the 'false' siblings the AppSet NotIn-selectors
  # need come from here (no manual pinning). A matching defaultAnnotations map
  # is supported too (merged the same way with spec.argocd.annotations).
  defaultLabels:
    auto-project: 'true'
    allow-all: 'false'
    # cicd-platform
    cicd-platform: 'false'
    cicd-platform/crossplane: 'false'
    cicd-platform/kro: 'false'
    cicd-platform/tekton: 'false'
    cicd-platform/machinery: 'false'
    cicd-platform/dapr: 'false'
    cicd-platform/kargo: 'false'
    cicd-platform/argo-rollouts: 'false'
    cicd-platform/openebs: 'false'
    # network-platform
    network-platform: 'false'
    network-platform/cilium-lb: 'false'
    network-platform/cilium-gateway: 'false'
    network-platform/cilium-gateway-secondary: 'false'
    network-platform/cert-manager-install: 'false'
    network-platform/cert-manager-selfsigned: 'false'
    network-platform/cert-manager-cluster-ca: 'false'
    network-platform/cert-manager-vault-pki: 'false'
    network-platform/trust-manager-install: 'false'
    network-platform/trust-manager-bundle: 'false'
    # storage-platform
    storage-platform: 'false'
    storage-platform/openebs: 'false'
    storage-platform/longhorn: 'false'
    storage-platform/nfs-csi-install: 'false'
    storage-platform/nfs-csi-storageclasses: 'false'
    # security-platform
    security-platform: 'false'
    security-platform/external-secrets: 'false'
    security-platform/kyverno: 'false'
