---
# Realistic "standard" usage: a generic k3s cluster driven by the
# EnvironmentConfig (providerConfigRef, distro, kubernetesVersion,
# rancherNamespace, …), with a per-cluster override + bootstrap namespace.
apiVersion: resources.stuttgart-things.com/v1alpha1
kind: RancherCluster
metadata:
  name: k3s-test
  namespace: default
spec:
  name: k3s-test
  environmentConfig: default
  kubernetesVersion: v1.34.7+k3s1   # override the env default for this cluster
  bootstrap:
    namespace: crossplane-bootstrap
