---
# OPTIONAL — ESO ExternalSecret that materializes the `vsphere-creds` Secret from
# Vault, instead of secret.yaml.tmpl / `kubectl create secret`. Lives in
# crossplane-system so the cluster-scoped ProviderConfig (2-...) can reference it.
#
# Renders the provider's expected `credentials` JSON blob. NOTE the key is `user`
# (NOT `username`) — the provider reads creds["user"]; a wrong key yields a
# misleading vCenter "incorrect user name or password".
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vsphere-creds
  namespace: crossplane-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-cicd-vsphere-labda
  target:
    name: vsphere-creds
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        credentials: |
          {"user":"{{ .vsphere_user }}","password":"{{ .vsphere_password }}","server":"{{ .vsphere_server }}","allow_unverified_ssl":"true"}
  dataFrom:
    - extract:
        key: default
