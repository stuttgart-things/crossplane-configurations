---
# Maximum example: every spec field set, selecting the `labda` EnvironmentConfig
# and overriding placement MOIDs + tunables per VM (XR spec wins over the
# EnvironmentConfig). Catches templating breakage.
apiVersion: resources.stuttgart-things.com/v1alpha1
kind: NativeVsphereVM
metadata:
  name: vspherevm-max
  namespace: default
spec:
  environmentConfig: labda
  providerConfigRef:
    name: default
  vm:
    name: vspherevm-max
    cpu: "8"
    ram: "16384"
    disk: "96"
    waitForGuestNetTimeout: "5"
    guestId: ubuntu64Guest
    firmware: bios
    scsiType: pvscsi
    adapterType: vmxnet3
    annotation: "VSPHERE-VM BUILD w/ CROSSPLANE (native) FOR STUTTGART-THINGS"
    # placement MOID overrides (otherwise inherited from the labda EnvironmentConfig)
    templateUuid: 4221ffec-016e-5533-0435-1103fb1a611e
    datastoreId: datastore-12
    resourcePoolId: resgroup-8
    networkId: dvportgroup-2048
    folder: stuttgart-things/testing
  # Optional base-OS provisioning: once the VM is Ready with an IP, an AnsibleRun
  # is emitted with the inventory auto-populated to the VM IP. Requires the
  # ansible-run cluster preconditions (Tekton, ansible-credentials Secret, an
  # in-cluster provider-kubernetes config).
  ansible:
    enabled: true
    playbooks:
      - sthings.baseos.setup
    varsFile:
      - manage_filesystem+-true
      - update_packages+-true
    crossplaneProviderConfig: in-cluster
