---
apiVersion: meta.pkg.crossplane.io/v1
kind: Configuration
metadata:
  name: vspherevm
  annotations:
    # Local convention used by `task push` to bump and re-publish.
    # Not a Crossplane-standard field — the true package version is the OCI tag.
    meta.crossplane.io/version: v0.5.0
    meta.crossplane.io/maintainer: patrick.hermann@sva.de
    meta.crossplane.io/source: github.com/stuttgart-things/crossplane-configurations
    meta.crossplane.io/license: Apache-2.0
    meta.crossplane.io/description: |
      Provisions a VMware vSphere virtual machine from a namespaced
      `NativeVsphereVM` XR using the NATIVE `provider-vspherevm` managed
      `VirtualMachine` resource (no Terraform/OpenTofu). Per-environment
      placement MOIDs (templateUuid, datastoreId, resourcePoolId, networkId,
      folder) are loaded from a Crossplane `EnvironmentConfig`, so an XR only
      states intent (name/cpu/ram/disk) and the topology is injected.
    meta.crossplane.io/readme: |
      # vspherevm

      A Crossplane v2 Configuration that provisions a vSphere VM from a
      namespaced `NativeVsphereVM` XR (group `resources.stuttgart-things.com`)
      via the native [`provider-vspherevm`](https://github.com/stuttgart-things/provider-vspherevm)
      managed `VirtualMachine` resource.

      This is the NATIVE-provider sibling of the OpenTofu-based `vsphere-vm`
      Configuration. The two differ in what the EnvironmentConfig carries:
      `vsphere-vm` uses inventory PATHS/NAMES (`/LabDA/network/...`,
      `sthings-u24`) for a Terraform module; `vspherevm` uses opaque vCenter
      MOIDs (`dvportgroup-2048`, `templateUuid`, `datastore-12`, `resgroup-8`)
      that the native provider consumes directly.

      The Composition is a `function-kcl` pipeline:

      - `load-environment` (`function-environment-configs`) loads the
        per-environment topology, selected by the config-scoped label
        `vspherevm.resources.stuttgart-things.com/environment`
        (value from `spec.environmentConfig`).
      - `render` (`function-kcl`) emits a native `VirtualMachine`, taking
        per-VM fields from the XR and placement MOIDs from the loaded
        EnvironmentConfig (XR spec overrides the EnvironmentConfig). When
        `spec.ansible.enabled`, it also emits an `AnsibleRun` once the VM is
        Ready with an IP (inventory auto-populated with the VM IP).
      - `patch-status` surfaces the VM IP / MOID / power state / ansibleReady.

      ## Cluster preconditions

      - `provider-vspherevm` installed (declared as `dependsOn`).
      - A `ClusterProviderConfig` (`vspherevm.m.stuttgart-things.com/v1beta1`)
        named per the XR's `spec.providerConfigRef` (default kind
        `ClusterProviderConfig`, name `default`) pointing at a `vsphere-creds`
        Secret. The composed VirtualMachine is the namespaced (`.m`) variant, so
        it references a `.m` (Cluster)ProviderConfig. The credentials JSON key
        MUST be `user` (not `username`).
      - The `EnvironmentConfig`(s) for the target environment(s).

      See the per-Configuration README for ready-to-apply manifests.
spec:
  crossplane:
    version: ">=v2.1.3"
  dependsOn:
    # Native vSphere VM provider (published to GHCR).
    - provider: ghcr.io/stuttgart-things/provider-vspherevm-xpkg
      version: ">=v0.8.1,<v0.9.0"
    # Functions used by this Configuration's Composition pipeline.
    - function: xpkg.crossplane.io/crossplane-contrib/function-environment-configs
      version: ">=v0.7.0,<v0.8.0"
    - function: xpkg.crossplane.io/crossplane-contrib/function-kcl
      version: ">=v0.12.0,<v0.13.0"
    - function: xpkg.crossplane.io/crossplane-contrib/function-auto-ready
      version: ">=v0.6.5,<v0.7.0"
    # Optional base-OS provisioning: when spec.ansible.enabled, the Composition
    # emits an AnsibleRun (from this Configuration) wired to the VM IP.
    - configuration: ghcr.io/stuttgart-things/crossplane-configurations/ansible-run
      version: ">=v0.1.4"
