---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: vspherevm
  labels:
    crossplane.io/xrd: nativevspherevms.resources.stuttgart-things.com
spec:
  compositeTypeRef:
    apiVersion: resources.stuttgart-things.com/v1alpha1
    kind: NativeVsphereVM
  mode: Pipeline
  pipeline:
    # -------------------------------------------------------------------------
    # Step 0: load the per-environment placement MOIDs from an EnvironmentConfig
    # into the pipeline context. Selected by the CONFIG-SCOPED label
    # `vspherevm.resources.stuttgart-things.com/environment`, value from the XR's
    # `spec.environmentConfig` (default "default"). The key is namespaced to this
    # Configuration so it never collides with another Configuration's
    # EnvironmentConfig (function-environment-configs requires EXACTLY ONE
    # Selector match). Offline `crossplane render` needs the EnvironmentConfig
    # supplied via --extra-resources (the verify harness does this).
    # -------------------------------------------------------------------------
    - step: load-environment
      functionRef:
        name: function-environment-configs
      input:
        apiVersion: environmentconfigs.fn.crossplane.io/v1beta1
        kind: Input
        spec:
          environmentConfigs:
            - type: Selector
              selector:
                matchLabels:
                  - key: vspherevm.resources.stuttgart-things.com/environment
                    type: FromCompositeFieldPath
                    valueFromFieldPath: spec.environmentConfig
                    fromFieldPathPolicy: Optional

    # -------------------------------------------------------------------------
    # Step 1: render the native provider-vspherevm VirtualMachine. Per-VM fields
    # come from the XR; placement MOIDs default from the loaded EnvironmentConfig
    # and are overridable per XR. Numeric provider fields are int()-converted.
    # -------------------------------------------------------------------------
    - step: render
      functionRef:
        name: function-kcl
      input:
        apiVersion: krm.kcl.dev/v1alpha1
        kind: KCLInput
        metadata:
          name: render
        spec:
          source: | # pragma: allowlist secret
            oxr = option("params").oxr
            _ctx = option("params").ctx or {}
            ocds = option("params").ocds or {}

            _spec = oxr.spec
            _name = oxr.metadata.name
            _namespace = oxr.metadata.namespace or "default"
            _vm = _spec?.vm or {}

            # function-environment-configs merges the matched EnvironmentConfig
            # data into the context under this well-known key.
            _env = _ctx["apiextensions.crossplane.io/environment"] or {}

            # --- per-VM intent (XRD defaults already applied for cpu/ram/disk) ---
            _cpu = _vm?.cpu or "2"
            _ram = _vm?.ram or "4096"
            _disk = _vm?.disk or "40"
            _wait = _vm?.waitForGuestNetTimeout or "5"
            _waitIp = _vm?.waitForGuestIpTimeout or "5"

            # --- fields that fall back to the EnvironmentConfig, then a builtin ---
            _guestId = _vm?.guestId or _env?.guestId or "ubuntu64Guest"
            _firmware = _vm?.firmware or _env?.firmware or "bios"
            _scsiType = _vm?.scsiType or _env?.scsiType or "pvscsi"
            _adapterType = _vm?.adapterType or _env?.adapterType or "vmxnet3"
            _annotation = _vm?.annotation or _env?.annotation or "VSPHERE-VM BUILD w/ CROSSPLANE FOR STUTTGART-THINGS"

            # --- placement MOIDs (EnvironmentConfig default, XR override) ---
            _templateUuid = _vm?.templateUuid or _env?.templateUuid or ""
            _datastoreId = _vm?.datastoreId or _env?.datastoreId or ""
            _resourcePoolId = _vm?.resourcePoolId or _env?.resourcePoolId or ""
            _networkId = _vm?.networkId or _env?.networkId or ""
            _folder = _vm?.folder or _env?.folder or ""
            # Optional host pin. The terraform vSphere provider clones onto the
            # TEMPLATE's current host when this is unset — which fails if the
            # template has drifted onto a host too old for its VM hardware version
            # ("virtual machine version is not compatible with the version of the
            # host"). Set hostSystemId (per-env via EnvironmentConfig, or per-XR)
            # to a compatible ESXi host MOID to pin placement. Empty = unset =
            # current DRS/template-host behaviour.
            _hostSystemId = _vm?.hostSystemId or _env?.hostSystemId or ""

            _providerConfigName = _spec?.providerConfigRef?.name or _env?.providerConfigName or "default"
            _providerConfigKind = _spec?.providerConfigRef?.kind or _env?.providerConfigKind or "ClusterProviderConfig"

            # Cloud-init metadata (single-line JSON) injected via the VMware
            # guestinfo datasource — sets the guest hostname (= VM name) on the
            # RAW VM at first boot, independent of GOSC and of the optional
            # ansible run. Requires the template's cloud-init to enable the
            # VMware datasource and to be `cloud-init clean`ed at build time (see
            # the packer ubuntu26 base-os build). instance-id = VM name so each
            # clone is a fresh cloud-init instance that applies the hostname.
            _ciMeta = "{{\"local-hostname\":\"{}\",\"instance-id\":\"{}\"}}".format(_name, _name)

            # Namespaced (".m") managed resource: a namespaced composite cannot
            # compose a cluster-scoped resource, so emit the namespaced variant
            # carrying the XR's namespace.
            _vmResource = {
                apiVersion = "virtualmachine.vspherevm.m.stuttgart-things.com/v1alpha1"
                kind = "VirtualMachine"
                metadata = {
                    name = _name
                    namespace = _namespace
                    annotations = {
                        "crossplane.io/composition-resource-name" = "vspherevm"
                    }
                }
                spec = {
                    forProvider = {
                        name = _name
                        annotation = _annotation
                        folder = _folder
                        firmware = _firmware
                        guestId = _guestId
                        numCpus = int(_cpu)
                        memory = int(_ram)
                        datastoreId = _datastoreId
                        resourcePoolId = _resourcePoolId
                        # Pin the clone to a specific ESXi host when set (see above).
                        if _hostSystemId != "":
                            hostSystemId = _hostSystemId
                        clone = [{
                            templateUuid = _templateUuid
                            timeout = 30
                            # No `customize` block on purpose. VMware guest
                            # customization (GOSC) leaves the cloned NIC
                            # startConnected=false on Ubuntu 26.04 guests, so the
                            # VM boots networkless (verified 2026-07-07: dropping
                            # customize -> NIC connected + DHCP immediately; u24
                            # tolerates GOSC, u26 does not). Hostname / OS config
                            # is handled by the optional ansible baseos run, not
                            # by GOSC. Networking needs nothing extra: the
                            # template's DHCP netplan works once the NIC is up.
                        }]
                        networkInterface = [{
                            adapterType = _adapterType
                            networkId = _networkId
                        }]
                        disk = [{
                            label = "disk0"
                            size = int(_disk)
                            thinProvisioned = True
                        }]
                        scsiType = _scsiType
                        waitForGuestNetTimeout = int(_wait)
                        waitForGuestIpTimeout = int(_waitIp)
                        # Raw-VM hostname via cloud-init VMware guestinfo (no GOSC,
                        # no ansible needed). encoding is omitted -> cloud-init
                        # reads guestinfo.metadata as raw (single-line JSON).
                        extraConfig = {
                            "guestinfo.metadata" = _ciMeta
                        }
                    }
                    providerConfigRef = {
                        kind = _providerConfigKind
                        name = _providerConfigName
                    }
                }
            }

            _resources = [_vmResource]

            # --- Optional Ansible base-OS provisioning ---
            # Gated on the composed VM being Ready with an IP (read from ocds),
            # so the AnsibleRun is only emitted once the VM can be reached. The
            # inventory auto-populates with the VM IP unless overridden. Shared
            # fields fall back to the EnvironmentConfig `ansible` sub-block.
            _ansible = _spec?.ansible or {}
            _envAnsible = _env?.ansible or {}
            _ansibleEnabled = _ansible?.enabled or False

            # Find the composed VM by KIND (ocds is keyed by composition-resource-name,
            # which function-kcl derives from the resource's metadata.name — not a
            # fixed key — so iterate rather than look up "vspherevm").
            _vmEntries = [v.Resource for _, v in ocds if v?.Resource?.kind == "VirtualMachine"]
            _vmObserved = _vmEntries[0]?.status or {} if len(_vmEntries) > 0 else {}
            _vmIP = _vmObserved?.atProvider?.defaultIpAddress or ""
            _vmConds = _vmObserved?.conditions or []
            _vmReady = len([c for c in _vmConds if c.type == "Ready" and c.status == "True"]) > 0

            if _ansibleEnabled and _vmReady and _vmIP != "":
                _playbooks = _ansible?.playbooks or _envAnsible?.playbooks or ["sthings.baseos.setup"]
                _varsFile = _ansible?.varsFile or _envAnsible?.varsFile or []
                _varsInventory = _ansible?.varsInventory or ['all+["{}"]'.format(_vmIP)]
                _pipelineRunName = "{}-ansible".format(_name)

                _ansibleRun = {
                    apiVersion = "resources.stuttgart-things.com/v1alpha1"
                    kind = "AnsibleRun"
                    metadata = {
                        name = "{}-ansible-run".format(_name)
                        namespace = _namespace
                        annotations = {
                            "crossplane.io/composition-resource-name" = "ansible-run"
                        }
                    }
                    spec = {
                        pipelineRunName = _pipelineRunName
                        namespace = _ansible?.pipelineNamespace or _envAnsible?.pipelineNamespace or "tekton-ci"
                        gitRepoUrl = _ansible?.gitRepoUrl or _envAnsible?.gitRepoUrl or "https://github.com/stuttgart-things/stage-time.git"
                        ansibleWorkingImage = _ansible?.ansibleWorkingImage or _envAnsible?.ansibleWorkingImage or "ghcr.io/stuttgart-things/sthings-ansible:13.5.0-test"
                        ansibleCredentialsSecretName = _ansible?.credentialsSecretName or _envAnsible?.credentialsSecretName or "ansible-credentials"
                        ansiblePlaybooks = _playbooks
                        if len(_varsFile) > 0:
                            ansibleVarsFile = _varsFile
                        ansibleVarsInventory = _varsInventory
                        wrapInCrossplane = _ansible?.wrapInCrossplane or True
                        crossplaneObjectName = _pipelineRunName
                        crossplaneNamespace = _namespace
                        crossplaneProviderConfig = _ansible?.crossplaneProviderConfig or _envAnsible?.crossplaneProviderConfig or "in-cluster"
                        if _ansible?.extraCollections and len(_ansible.extraCollections) > 0:
                            installExtraCollections = "true"
                            ansibleExtraCollections = _ansible.extraCollections
                        if _ansible?.extraRoles and len(_ansible.extraRoles) > 0:
                            installExtraRoles = "true"
                            ansibleExtraRoles = _ansible.extraRoles
                    }
                }
                _resources += [_ansibleRun]

            items = _resources

    # -------------------------------------------------------------------------
    # Step 2: surface the VirtualMachine IP / MOID / power state onto the XR.
    # -------------------------------------------------------------------------
    - step: patch-status
      functionRef:
        name: function-kcl
      input:
        apiVersion: krm.kcl.dev/v1alpha1
        kind: KCLInput
        metadata:
          name: patch-status
        spec:
          source: |
            oxr = option("params").oxr
            ocds = option("params").ocds

            _entries = [v.Resource?.status or {} for _, v in ocds if v.Resource?.kind == "VirtualMachine"]
            _st = _entries[0] if len(_entries) > 0 else {}
            _ap = _st?.atProvider or {}
            _ip = _ap?.defaultIpAddress or ""

            # Ansible readiness (if an AnsibleRun was composed)
            _ansibleEntries = [v.Resource?.status or {} for _, v in ocds if v.Resource?.kind == "AnsibleRun"]
            _ansibleSt = _ansibleEntries[0] if len(_ansibleEntries) > 0 else {}
            _ansibleConds = _ansibleSt?.conditions or []
            _ansibleReady = len([c for c in _ansibleConds if c.type == "Ready" and c.status == "True"]) > 0

            _oxr = oxr | {
                status = {
                    share = {
                        ip = [_ip] if _ip else []
                        moid = _ap?.moid or ""
                        powerState = _ap?.powerState or ""
                        ansibleReady = _ansibleReady
                    }
                }
            }

            items = [_oxr]

    - step: automatically-detect-ready-composed-resources
      functionRef:
        name: function-auto-ready
