---
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: nativevspherevms.resources.stuttgart-things.com
spec:
  group: resources.stuttgart-things.com
  defaultCompositeDeletePolicy: Foreground
  scope: Namespaced
  names:
    kind: NativeVsphereVM
    plural: nativevspherevms
    singular: nativevspherevm
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                vm:
                  type: object
                  description: |
                    Per-VM settings. Placement MOIDs (templateUuid,
                    datastoreId, resourcePoolId, networkId, folder) and the
                    guestId/firmware/scsiType/adapterType/annotation fields
                    default from the selected EnvironmentConfig when unset
                    here; set them explicitly to override per VM.
                  properties:
                    name:
                      type: string
                    cpu:
                      type: string
                      default: "2"
                    ram:
                      type: string
                      default: "4096"
                    disk:
                      type: string
                      default: "40"
                    waitForGuestNetTimeout:
                      type: string
                      description: |
                        Minutes to wait for guest networking so the IP is
                        captured into status. "-1" disables the wait.
                      default: "5"
                    # --- fields below default from the EnvironmentConfig ---
                    # No XRD default: leaving them unset lets the
                    # EnvironmentConfig value win; setting them overrides it.
                    guestId:
                      type: string
                    firmware:
                      type: string
                    scsiType:
                      type: string
                    adapterType:
                      type: string
                    annotation:
                      type: string
                    templateUuid:
                      type: string
                    datastoreId:
                      type: string
                    resourcePoolId:
                      type: string
                    networkId:
                      type: string
                    folder:
                      type: string
                  required:
                    - name
                providerConfigRef:
                  type: object
                  description: |
                    The provider-vspherevm provider config the (namespaced)
                    VirtualMachine runs through. `name` defaults from the
                    EnvironmentConfig (providerConfigName) or "default"; `kind`
                    defaults from the EnvironmentConfig (providerConfigKind) or
                    "ClusterProviderConfig".
                  properties:
                    name:
                      type: string
                    kind:
                      type: string
                      enum:
                        - ClusterProviderConfig
                        - ProviderConfig
                ansible:
                  type: object
                  description: |
                    Optional base-OS provisioning. When `enabled: true`, once the
                    VM is Ready with an IP the Composition emits an `AnsibleRun`
                    (Tekton) whose inventory is auto-populated with the VM IP.
                    Shared fields (playbooks, varsFile, gitRepoUrl,
                    ansibleWorkingImage, credentialsSecretName,
                    crossplaneProviderConfig, pipelineNamespace) default from the
                    EnvironmentConfig `ansible` sub-block when unset here.
                    Requires the ansible-run preconditions on the cluster (Tekton,
                    the credentials Secret, an in-cluster provider-kubernetes
                    config).
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    playbooks:
                      type: array
                      items:
                        type: string
                    varsFile:
                      type: array
                      items:
                        type: string
                    varsInventory:
                      type: array
                      items:
                        type: string
                    extraCollections:
                      type: array
                      items:
                        type: string
                    extraRoles:
                      type: array
                      items:
                        type: string
                    gitRepoUrl:
                      type: string
                    pipelineNamespace:
                      type: string
                    ansibleWorkingImage:
                      type: string
                    credentialsSecretName:
                      type: string
                    crossplaneProviderConfig:
                      type: string
                    wrapInCrossplane:
                      type: boolean
                environmentConfig:
                  type: string
                  description: |
                    Selects the Crossplane EnvironmentConfig that provides the
                    shared per-environment placement MOIDs. The Composition
                    matches an EnvironmentConfig carrying the config-scoped
                    label
                    `vspherevm.resources.stuttgart-things.com/environment=<value>`.
                    Supported `data` keys: templateUuid, datastoreId,
                    resourcePoolId, networkId, folder, firmware, guestId,
                    scsiType, adapterType, annotation, providerConfigName, and an
                    optional `ansible` sub-block. Any value set explicitly on this
                    XR's spec overrides the EnvironmentConfig.
                  default: default
              required:
                - vm
            status:
              description: A Status represents the observed state.
              type: object
              properties:
                share:
                  description: Freeform field containing status information.
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
