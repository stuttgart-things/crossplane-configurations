---
# Cross-cluster test for the vault-pki-secrets Configuration.
#
# Runs on the crossplane-mgmt control plane but pushes onto the REMOTE k3s-xp
# downstream cluster (NOT in-cluster) via the `k3s-xp` ClusterProviderConfig.
#
# Reads the LIVE source secrets on the mgmt cluster — cert-manager-vault-token
# (token) + vault-pki-ca (ca.crt) in the cert-manager namespace — and pushes
# them onto k3s-xp's `cert-manager` namespace under the real issuer-referenced
# names (from the EnvironmentConfig: vault-pki-ca + cert-manager-vault-token).
# The Composition ensures the `cert-manager` namespace exists on k3s-xp first
# ([Observe, Create] — adopt if present, create if missing, never delete), so
# this works even on a brand-new cluster before cert-manager is installed.
#
# providerConfigRef: k3s-xp overrides the EnvironmentConfig in-cluster default;
# everything else (namespace cert-manager + Secret names) comes from the
# EnvironmentConfig `vault-pki-secrets-defaults`.
apiVersion: config.stuttgart-things.com/v1alpha1
kind: VaultPkiSecret
metadata:
  name: vault-pki-test
  namespace: default
spec:
  environmentConfig: default        # -> vault-pki-secrets-defaults

  # Push onto the REMOTE k3s-xp cluster (overrides env-config in-cluster).
  providerConfigRef: k3s-xp
  providerConfigKind: ClusterProviderConfig

  # Live source secrets on the MGMT cluster (cert-manager namespace).
  tokenSecretRef:
    name: cert-manager-vault-token # pragma: allowlist secret
    namespace: cert-manager
    key: token
  caBundleSecretRef:
    name: vault-pki-ca
    namespace: cert-manager
    key: ca.crt
