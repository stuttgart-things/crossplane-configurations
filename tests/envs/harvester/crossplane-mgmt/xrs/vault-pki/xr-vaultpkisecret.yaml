---
# Smoke test for the vault-pki-secrets Configuration on crossplane-mgmt.
#
# Reads the LIVE source secrets on this cluster — cert-manager-vault-token
# (token) + vault-pki-ca (ca.crt) in the cert-manager namespace — and copies
# them into the SCRATCH namespace `vault-pki-test`, NOT cert-manager. This keeps
# the run from adopting/overwriting the live, Argo/Terraform-managed issuer
# secrets while still proving the read-and-copy path end to end.
#
# Target Secret names + providerConfigRef come from the EnvironmentConfig
# `vault-pki-secrets-defaults` (providerConfigRef: in-cluster,
# caSecretName: vault-pki-ca, tokenSecretName: cert-manager-vault-token); only
# the target namespace is overridden to the scratch namespace here.
apiVersion: config.stuttgart-things.com/v1alpha1
kind: VaultPkiSecret
metadata:
  name: vault-pki-test
  namespace: default
spec:
  environmentConfig: default        # -> vault-pki-secrets-defaults

  # SCRATCH target namespace (overrides the env-config cert-manager default).
  namespace: vault-pki-test

  # Live source secrets on this cluster (cert-manager namespace).
  tokenSecretRef:
    name: cert-manager-vault-token # pragma: allowlist secret
    namespace: cert-manager
    key: token
  caBundleSecretRef:
    name: vault-pki-ca
    namespace: cert-manager
    key: ca.crt
