---
# Showcase RancherCluster: a Harvester k3s cluster registered in Argo CD.
#
# Nearly everything comes from the EnvironmentConfig `rancher-cluster-defaults`
# (providerConfigRef + rancherProviderConfigRef, rancherNamespace, distro,
# kubernetesVersion, the Harvester image/network/credential/vmNamespace/sshUser,
# and the Argo CD target). This XR carries only per-cluster values: name, sizing,
# and the Argo CD toggle. The downstream API endpoint is auto-discovered — no
# server IP is provided here.
apiVersion: resources.stuttgart-things.com/v1alpha1
kind: RancherCluster
metadata:
  name: k3s-xp
  namespace: default
spec:
  name: k3s-xp
  environmentConfig: default      # -> rancher-cluster-defaults
  infrastructure: harvester
  harvester:                      # per-cluster sizing (infra fields from env)
    cpuCount: 6
    memorySize: 6
    quantity: 1
  argocd:
    register: true                # target + server resolved automatically
    # Platform profile toggles → copied onto the ClusterbookCluster /
    # Argo CD cluster Secret; the platforms/<profile> AppSets select on them.
    # Every toggle is explicit ('true'/'false') so this XR fully documents
    # what gets deployed.
    #
    # FIRST TEST: storage-platform/openebs ONLY. All other umbrellas are
    # 'false', and every storage sibling is explicitly 'false' — the AppSet
    # component selectors are `<component> NotIn ['false']`, so an *omitted*
    # label would still match and deploy. Under an enabled umbrella, pin
    # siblings to 'false' or they fire too.
    labels:
      # ---- core / project ----
      env: lab
      role: dev
      auto-project: 'true'                              # per-cluster AppProject (proj-k3s-xp) for the app to live in
      allow-all: 'false'

      # ---- cicd-platform (OFF) ----
      cicd-platform: 'false'
      cicd-platform/crossplane: 'false'
      cicd-platform/kro: 'false'
      cicd-platform/tekton: 'false'
      cicd-platform/machinery: 'false'
      cicd-platform/dapr: 'false'
      cicd-platform/kargo: 'false'
      cicd-platform/argo-rollouts: 'false'
      cicd-platform/openebs: 'false'

      # ---- network-platform (OFF) ----
      network-platform: 'false'
      network-platform/cilium-lb: 'false'
      network-platform/cilium-gateway: 'false'
      network-platform/cilium-gateway-secondary: 'false'
      network-platform/cert-manager-install: 'false'
      network-platform/cert-manager-selfsigned: 'false'
      network-platform/cert-manager-cluster-ca: 'false'
      network-platform/cert-manager-vault-pki: 'false'
      network-platform/trust-manager-install: 'false'
      network-platform/trust-manager-bundle: 'false'

      # ---- storage-platform (ON — openebs only) ----
      storage-platform: 'true'
      storage-platform/openebs: 'true'                  # openebs-hostpath = default SC + snapshot CRDs
      storage-platform/longhorn: 'false'                # pinned false (umbrella on → NotIn selector would fire it)
      storage-platform/nfs-csi-install: 'false'         # pinned false
      storage-platform/nfs-csi-storageclasses: 'false'  # pinned false

      # ---- security-platform (OFF) ----
      security-platform: 'false'
      security-platform/external-secrets: 'false'
      security-platform/kyverno: 'false'

    # Component parameters (newly supported via spec.argocd.annotations).
    # Uncomment a block AND flip the matching label above to 'true' to enable.
    # annotations:
    #   # cert-manager Vault-PKI ClusterIssuer (network-platform/cert-manager-vault-pki)
    #   clusterbook.stuttgart-things.com/vault-server: https://vault.example/
    #   clusterbook.stuttgart-things.com/vault-pki-path: pki/sign/sthings
    #   clusterbook.stuttgart-things.com/vault-token-secret: cert-manager-vault-token
    #   # NFS StorageClass (storage-platform/nfs-csi-storageclasses; also add the gate label)
    #   storage-platform.stuttgart-things.com/nfs-server: '10.31.101.26'
    #   storage-platform.stuttgart-things.com/nfs-share: /data/col1/sthings
    #   storage-platform.stuttgart-things.com/nfs-version: '3'
