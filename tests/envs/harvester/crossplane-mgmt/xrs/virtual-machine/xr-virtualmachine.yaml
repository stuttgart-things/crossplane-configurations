---
# Example XVirtualMachine driven through the high-level `virtual-machine`
# Configuration. provider: harvester routes to a HarvesterVM (KubeVirt) on the
# remote Harvester via the EnvironmentConfig `virtualmachine-harvester` above.
#
# size: small -> cpu 2 / 2Gi RAM / 32Gi disk (inline size table in the
# Composition). os: ubuntu24 -> imageId default/u26-dev. volume.volumeMode is
# Block (virtual-machine v0.1.1 default) so the image-backed boot disk boots.
# ansible: false keeps this a plain VM for the first end-to-end test.
#
# Lives in `default` (always present) so Argo doesn't need to create a namespace
# for the XR object on the management cluster; the VM's resources land in the
# `vms` namespace on Harvester (from the EnvironmentConfig).
apiVersion: resources.stuttgart-things.com/v1alpha1
kind: XVirtualMachine
metadata:
  name: vm-harvester-1
  namespace: default
spec:
  size: medium
  provider: harvester
  environment: harvester
  os: ubuntu24
  ansible: false
