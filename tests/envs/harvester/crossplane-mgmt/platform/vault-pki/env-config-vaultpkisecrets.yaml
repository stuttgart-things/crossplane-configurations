---
# Per-environment defaults for VaultPkiSecret XRs in the crossplane-mgmt split lab.
#
# Selected by the config-scoped label
# `vault-pki-secrets.config.stuttgart-things.com/environment` matched against the
# XR's `spec.environmentConfig` (default "default"). `data` values become defaults
# in the Composition pipeline; anything set on the XR spec wins over them.
#
# These mirror what the live, Vault-verified `vault-pki` ClusterIssuer on this
# cluster references (kubectl get clusterissuer vault-pki -o jsonpath='{.spec.vault}'):
#   tokenSecretRef -> cert-manager-vault-token / token
#   caBundleSecretRef -> vault-pki-ca / ca.crt
#   namespace -> cert-manager
# Note the token Secret is `cert-manager-vault-token` here, NOT the chart default
# `vault-pki-token` — exactly the per-cluster variation this EnvironmentConfig
# (and the clusterbook.stuttgart-things.com/vault-token-secret annotation) exists
# to capture.
apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: vault-pki-secrets-defaults
  labels:
    vault-pki-secrets.config.stuttgart-things.com/environment: default
data:
  # Target cluster: provider-kubernetes (Cluster)ProviderConfig name.
  # "in-cluster" = push onto crossplane-mgmt itself; set to a bridged-kubeconfig
  # ClusterProviderConfig to push onto a remote/managed cluster.
  providerConfigRef: in-cluster
  # cert-manager controller namespace on the target cluster.
  namespace: cert-manager
  # CA-bundle Secret (the chart's caBundleSecretRef.name).
  caSecretName: vault-pki-ca
  caSecretKey: ca.crt
  # Vault-token Secret — matches THIS cluster's ClusterIssuer tokenSecretRef.name.
  tokenSecretName: cert-manager-vault-token # pragma: allowlist secret
  tokenSecretKey: token # pragma: allowlist secret
