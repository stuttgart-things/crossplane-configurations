---
# vault-pki-secrets Configuration package — provisions the prerequisite Secrets
# (CA bundle + Vault token) a Vault-backed cert-manager ClusterIssuer references,
# pushing them onto a target cluster via provider-kubernetes. The ClusterIssuer
# itself stays owned by the cert-manager-vault-pki Argo CD ApplicationSet.
#
# Standalone install (NOT pulled by any other Configuration's dependsOn), so an
# explicit type-(2) install here is correct — it will not spawn a short-named
# duplicate package-lock node.
apiVersion: pkg.crossplane.io/v1
kind: Configuration
metadata:
  name: vault-pki-secrets
spec:
  package: ghcr.io/stuttgart-things/crossplane-configurations/vault-pki-secrets:v0.1.3
