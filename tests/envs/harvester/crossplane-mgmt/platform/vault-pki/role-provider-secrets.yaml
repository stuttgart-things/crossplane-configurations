---
# Grant provider-kubernetes permission to manage Secrets in the scratch target
# namespace via the in-cluster ClusterProviderConfig.
#
# The vault-pki-secrets Composition wraps each copied Secret in a
# provider-kubernetes Object (providerConfig: in-cluster), so the provider's
# ServiceAccount must be allowed to manage secrets in the target namespace.
# Crossplane's rbac-manager only populates a provider's :system ClusterRole with
# the provider's OWN CRD groups, not core/v1 secrets, so this must be granted
# explicitly (same rationale as platform/ansible-run/clusterrole-provider-tekton.yaml
# and platform/namespaces/clusterrole-provider-namespaces.yaml).
#
# Scoped to a namespaced Role (not a cluster-wide ClusterRole) because the grant
# is for SECRETS — keep the blast radius to the scratch test namespace. Reading
# the SOURCE secrets in cert-manager needs no grant here: that read is done by
# the crossplane core ServiceAccount (which already can get secrets) via
# function-go-templating ExtraResources, not by provider-kubernetes.
#
# Bound to the crossplane-system ServiceAccount GROUP rather than the provider's
# ServiceAccount because that SA name is revision-hashed (changes on every
# provider-kubernetes upgrade) and the dependency-managed Provider can't carry a
# runtimeConfigRef from git. The group binding is revision-independent.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: crossplane-provider-secrets
  namespace: vault-pki-test
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: crossplane-provider-secrets
  namespace: vault-pki-test
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: crossplane-provider-secrets
subjects:
  - kind: Group
    name: system:serviceaccounts:crossplane-system
    apiGroup: rbac.authorization.k8s.io
