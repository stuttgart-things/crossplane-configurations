---
# virtual-machine Configuration package — the high-level VM entrypoint
# (XVirtualMachine: size/provider/environment/os). For provider: harvester it
# emits a HarvesterVM into the harvester-vm Configuration above. v0.1.1 emits
# volume.volumeMode: Block on that HarvesterVM, matching the proven Harvester
# image-backed boot disk (a Filesystem PVC yields a non-booting disk). v0.1.2
# adds `harvester` to the spec.environment enum. v0.1.3 drops ubuntu22, exposes
# all available Harvester images as os values, and selects the per-image
# storage class from the env `images` {imageId, storageClassName} map. v0.1.4
# pins dependsOn harvester-vm >=v0.1.4 (single place harvester-vm's version is
# managed, since there's no explicit harvester-vm install); harvester-vm v0.1.4
# adds Usage deletion-ordering protection for the boot disk + cloud-init.
# v0.1.6 makes the Ansible playbooks + varsFile env-overridable: they are read
# from the EnvironmentConfig `ansible` block instead of being hardcoded, so a
# host without an LVM data disk (manage_filesystem=false) or a different Vault
# (vault_instances) is configured per environment. The target inventory stays
# auto-set to the VM's resolved IP by harvester-vm.
# v0.1.7 sets cloud-init sshPasswordAuth: true when ansible is enabled, so the
# ansible-run pipeline (which authenticates with the ANSIBLE_USER/ANSIBLE_PASSWORD
# from the ansible-credentials Secret, no SSH key) can log into the freshly
# created VM. Without it cloud-init defaults ssh_pwauth: false and the run fails
# with "Permission denied (publickey)".
#
# Driving an XVirtualMachine also needs an EnvironmentConfig labelled
# `virtual-machine.resources.stuttgart-things.com/environment=<env>` carrying a
# nested `harvester` sub-block (+ cross-provider `ansible` block) — not added
# here yet (the existing env-config-harvestervm.yaml is for the harvester-vm
# label, a different selector).
apiVersion: pkg.crossplane.io/v1
kind: Configuration
metadata:
  name: virtual-machine
spec:
  package: ghcr.io/stuttgart-things/crossplane-configurations/virtual-machine:v0.1.7
