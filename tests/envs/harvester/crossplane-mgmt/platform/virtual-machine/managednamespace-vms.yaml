---
apiVersion: resources.stuttgart-things.com/v1alpha1
kind: ManagedNamespace
metadata:
  name: vms
  namespace: default
spec:
  # kubernetes ClusterProviderConfig on crossplane-mgmt that targets the remote
  # Harvester cluster (same one provider-kubernetes Objects use for Harvester).
  providerConfigRef: harvester
  # Namespace name created/adopted on the Harvester cluster.
  name: vms
  annotations:
    # Assign to the Rancher "Default" project so the Harvester UI lists the VMs.
    # Value = <clusterId>:<projectId>, matching the `default` namespace.
    field.cattle.io/projectId: c-cxgxd:p-sfgv4
