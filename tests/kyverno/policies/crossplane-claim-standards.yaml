---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: crossplane-claim-standards
  annotations:
    policies.kyverno.io/title: Crossplane test-claim standards
    policies.kyverno.io/category: crossplane
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: XR claims
    policies.kyverno.io/description: >-
      Validates the stuttgart-things Crossplane XR claims committed under tests/.
      Runs offline in CI via the dagger kyverno module (kyverno apply) as a lint
      gate for the test claims — it is NOT deployed to a cluster. Enforces an
      allowlist of XR kinds, RFC-1123 claim names, and required spec fields for
      ManagedNamespace.
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    # ── 1. Allowed templates only ──────────────────────────────────────────
    # Catch stray/unknown XR kinds in the stuttgart-things XRD groups. Matches
    # every loaded resource, then the precondition narrows to our two API groups
    # (by group prefix, version-agnostic) so catalog-info.yaml (Component) and
    # kustomization.yaml are ignored. The allowlist is every XR kind defined by
    # a CompositeResourceDefinition in this repo — keep it in sync when adding a
    # new Configuration.
    - name: only-known-xr-kinds
      match:
        any:
          - resources:
              kinds:
                - "*"
      preconditions:
        all:
          - key: "{{ split(request.object.apiVersion, '/')[0] }}"
            operator: AnyIn
            value:
              - resources.stuttgart-things.com
              - config.stuttgart-things.com
      validate:
        message: >-
          Unknown XR kind '{{ request.object.kind }}' under tests/. Add new kinds
          to the crossplane-claim-standards Kyverno policy allowlist.
        deny:
          conditions:
            all:
              - key: "{{ request.object.kind }}"
                operator: AnyNotIn
                value:
                  # resources.stuttgart-things.com
                  - AnsibleRun
                  - CloudInit
                  - HarvesterVM
                  - ManagedNamespace
                  - ProxmoxVM
                  - RancherCluster
                  - VMProvision
                  - VolumeClaim
                  - VsphereVM
                  - XVirtualMachine
                  # config.stuttgart-things.com
                  - VaultConfig
                  - VaultIssuer
                  - VaultK8sAuth

    # ── 2. Naming convention ───────────────────────────────────────────────
    # metadata.name must be a lowercase RFC-1123 label.
    - name: claim-name-rfc1123
      match:
        any:
          - resources:
              kinds:
                - "*"
      preconditions:
        all:
          - key: "{{ split(request.object.apiVersion, '/')[0] }}"
            operator: AnyIn
            value:
              - resources.stuttgart-things.com
              - config.stuttgart-things.com
      validate:
        message: >-
          Claim name '{{ request.object.metadata.name }}' must be a lowercase
          RFC-1123 label (a-z, 0-9 and '-'; start and end alphanumeric).
        deny:
          conditions:
            all:
              - key: "{{ regex_match('^[a-z0-9]([-a-z0-9]*[a-z0-9])?$', request.object.metadata.name) }}"
                operator: Equals
                value: false

    # ── 3. Required spec fields (ManagedNamespace) ─────────────────────────
    - name: managednamespace-required-fields
      match:
        any:
          - resources:
              kinds:
                - ManagedNamespace
      validate:
        message: >-
          ManagedNamespace must set spec.name and spec.providerConfigRef
          (non-empty).
        pattern:
          spec:
            name: "?*"
            providerConfigRef: "?*"
